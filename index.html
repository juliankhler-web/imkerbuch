    ernten: { label: 'Ernten', store: 'ernten', refs: { volk: 'voelker' }, felder: [
      { key: 'volk', label: 'Volk (Name)', required: true, aliases: ['volk', 'name', 'colony', 'hive'] },
      { key: 'datum', label: 'Datum', required: true, type: 'date', aliases: ['datum', 'date', 'tag', 'erntedatum'] },
      { key: 'sorte', label: 'Sorte', aliases: ['sorte', 'honig', 'variety', 'tracht', 'honigsorte'] },
      { key: 'mengeKg', label: 'Menge (kg)', required: true, type: 'num', aliases: ['menge', 'kg', 'ertrag', 'amount', 'gewicht', 'mengekg'] },
      { key: 'notiz', label: 'Notiz', aliases: ['notiz', 'bemerkung', 'note'] },
    ], build: (v, refs) => ({ zielTyp: 'volk', zielId: refs.volk, datum: v.datum, produktart: 'Honig', sorte: v.sorte || 'Honig', mengeKg: v.mengeKg, trachtId: null, notiz: v.notiz || '' }) },
    kontakte: { label: 'Kunden/Lieferanten', store: 'kontakte', felder: [
      { key: 'name', label: 'Name/Firma', required: true, aliases: ['name', 'firma', 'kunde', 'kontakt', 'company'] },
      { key: 'strasse', label: 'Straße', aliases: ['strasse', 'straße', 'street', 'adresse'] },
      { key: 'plz', label: 'PLZ', aliases: ['plz', 'zip', 'postleitzahl'] },
      { key: 'ort', label: 'Ort', aliases: ['ort', 'stadt', 'city'] },
      { key: 'email', label: 'E-Mail', aliases: ['email', 'mail', 'e-mail'] },
      { key: 'telefon', label: 'Telefon', aliases: ['telefon', 'tel', 'phone', 'handy'] },
    ], build: (v) => ({ typ: 'kunde', name: v.name, strasse: v.strasse || '', plz: v.plz || '', ort: v.ort || '', email: v.email || '', telefon: v.telefon || '', notiz: '' }) },
    kassenbuch: { label: 'Kassenbuch', store: 'kassenbuch', felder: [
      { key: 'datum', label: 'Datum', required: true, type: 'date', aliases: ['datum', 'date', 'tag'] },
      { key: 'betrag', label: 'Betrag (€)', required: true, type: 'num', aliases: ['betrag', 'summe', 'amount', 'euro', 'preis', 'wert'] },
      { key: 'typ', label: 'Art (Einnahme/Ausgabe)', aliases: ['art', 'typ', 'type', 'einnahmeausgabe'] },
      { key: 'kategorie', label: 'Kategorie', aliases: ['kategorie', 'category', 'gruppe'] },
      { key: 'beschreibung', label: 'Beschreibung', aliases: ['beschreibung', 'text', 'zweck', 'description', 'notiz', 'bemerkung'] },
    ], build: (v) => { const t = /aus|ausgab|expense|-/.test(String(v.typ || '').toLowerCase()) || v.betrag < 0 ? 'ausgabe' : 'einnahme'; return { datum: v.datum, typ: t, kategorie: v.kategorie || 'Sonstiges', betrag: Math.abs(v.betrag), steuersatz: 0, kontaktId: null, beschreibung: v.beschreibung || '', rechnungId: null }; } },
  },
  _norm: (s) => String(s || '').toLowerCase().replace(/[^a-z0-9äöü]/g, '').replace(/ä/g, 'a').replace(/ö/g, 'o').replace(/ü/g, 'u'),
  /** flexibles Datum → ISO (TT.MM.JJJJ, JJJJ-MM-TT, TT/MM/JJJJ, Excel-Serial) */
  parseDate(v) {
    if (v === null || v === undefined || v === '') return null;
    if (v instanceof Date) return `${v.getFullYear()}-${String(v.getMonth() + 1).padStart(2, '0')}-${String(v.getDate()).padStart(2, '0')}`;
    const s = String(v).trim();
    let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/); if (m) return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
    m = s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{2,4})/); if (m) { const y = m[3].length === 2 ? '20' + m[3] : m[3]; return `${y}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`; }
    if (/^\d{4,5}$/.test(s)) { const d = new Date(Date.UTC(1899, 11, 30) + Number(s) * 86400000); return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-${String(d.getUTCDate()).padStart(2, '0')}`; }
    return null;
  },
  async start(entityKey, file, zone) {
    zone.innerHTML = `<div class="small muted">Datei wird gelesen …</div>`;
    let rows;
    try {
      const XLSX = await Xlsx.lib();
      const wb = XLSX.read(await file.arrayBuffer(), { cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      rows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
    } catch (e) { zone.innerHTML = `<div class="banner danger">${icon('warn')} <span class="b-msg">Datei konnte nicht gelesen werden: ${U.esc(e.message)}</span></div>`; return; }
    if (!rows.length) { zone.innerHTML = `<div class="banner warn">${icon('warn')} <span class="b-msg">Keine Datenzeilen gefunden.</span></div>`; return; }
    const spalten = Object.keys(rows[0]);
    const ent = Importer.ENTITIES[entityKey];
    // Auto-Zuordnung: je Zielfeld die am besten passende Spalte raten
    const guess = {};
    for (const f of ent.felder) {
      const treffer = spalten.find((sp) => { const n = Importer._norm(sp); return f.aliases.some((a) => n === a || n.includes(a) || a.includes(n)); });
      guess[f.key] = treffer || '';
    }
    zone.innerHTML = `
      <div class="banner info mb12">${icon('info')} <span class="b-msg"><b>${rows.length}</b> Zeilen in „${U.esc(file.name)}“ gefunden. Ordne die Spalten den Feldern zu (Vorschläge sind schon gesetzt):</span></div>
      <div class="rows mb12">${ent.felder.map((f) => `<div class="row" style="min-height:46px">
        <span class="r-main" style="flex:1"><span class="r-title">${U.esc(f.label)}${f.required ? ' <span class="req">*</span>' : ''}</span></span>
        <select class="inp" data-map="${f.key}" style="width:auto;min-width:150px;max-width:60%">
          <option value="">– nicht übernehmen –</option>
          ${spalten.map((sp) => `<option value="${U.esc(sp)}" ${guess[f.key] === sp ? 'selected' : ''}>${U.esc(sp)}</option>`).join('')}
        </select></div>`).join('')}</div>
      <div id="imp-preview" class="mb12"></div>
      <div class="flex-wrap no-print"><button class="btn btn-primary" id="imp-go">${icon('merge')} ${rows.length} Zeilen importieren</button><button class="btn btn-ghost" id="imp-cancel">Abbrechen</button></div>`;
    const readMap = () => { const map = {}; $$('[data-map]', zone).forEach((s) => { if (s.value) map[s.dataset.map] = s.value; }); return map; };
    const preview = () => {
      const map = readMap();
      const p = $('#imp-preview', zone);
      p.innerHTML = `<div class="small muted mb8">Vorschau (erste 3 Zeilen):</div><div class="tbl-wrap"><table class="tbl"><thead><tr>${ent.felder.filter((f) => map[f.key]).map((f) => `<th>${U.esc(f.label)}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0, 3).map((r) => `<tr>${ent.felder.filter((f) => map[f.key]).map((f) => `<td>${U.esc(String(r[map[f.key]] ?? ''))}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
    };
    preview();
    zone.addEventListener('change', (e) => { if (e.target.matches('[data-map]')) preview(); });
    $('#imp-cancel', zone).onclick = () => { zone.innerHTML = ''; };
    $('#imp-go', zone).onclick = async () => {
      const map = readMap();
      const fehlend = ent.felder.filter((f) => f.required && !map[f.key]);
      if (fehlend.length) return UI.toast('Bitte Pflichtfelder zuordnen: ' + fehlend.map((f) => f.label).join(', '), 'err');
      await Importer.run(entityKey, rows, map, zone);
    };
  },
  /** Namens-Index für Referenzauflösung (Stand/Volk per Name → id) */
  async _nameIndex(store) { const m = new Map(); for (const r of await DB.getAll(store)) m.set(Importer._norm(r.name), r.id); return m; },
  async run(entityKey, rows, map, zone) {
    const ent = Importer.ENTITIES[entityKey];
    const refIdx = {};
    for (const rk of Object.keys(ent.refs || {})) refIdx[rk] = await Importer._nameIndex(ent.refs[rk]);
    let ok = 0, uebersprungen = 0; const probleme = [];
    for (const r of rows) {
      // Rohwerte je Zielfeld ziehen + typisieren
      const v = {};
      for (const f of ent.felder) {
        if (!map[f.key]) continue;
        let raw = r[map[f.key]];
        if (raw === '' || raw === null || raw === undefined) { v[f.key] = undefined; continue; }
        if (f.type === 'num') { const n = U.parseNum(raw); v[f.key] = isNaN(n) ? undefined : n; }
        else if (f.type === 'date') v[f.key] = Importer.parseDate(raw);
        else v[f.key] = String(raw).trim();
      }
      // Pflichtfelder prüfen
      if (ent.felder.some((f) => f.required && (v[f.key] === undefined || v[f.key] === null || v[f.key] === ''))) { uebersprungen++; continue; }
      // Referenzen auflösen (Volk→Stand, Durchsicht→Volk): fehlt der Bezug, ggf. anlegen bzw. überspringen
      const refs = {};
      let skip = false;
      for (const rk of Object.keys(ent.refs || {})) {
        const name = v[rk];
        if (!name) { refs[rk] = null; continue; }
        const key = Importer._norm(name);
        let id = refIdx[rk].get(key);
        if (!id) {
          if (rk === 'stand') { const st = await DB.put('staende', { name, lat: null, lng: null, notizen: '' }); id = st.id; refIdx[rk].set(key, id); }
          else { // Volk-Referenz fehlt → Zeile überspringen (Volk muss existieren)
            skip = true; if (!probleme.includes(name)) probleme.push(name);
          }
        }
        refs[rk] = id || null;
      }
      if (skip) { uebersprungen++; continue; }
      const rec = ent.build(v, refs);
      const saved = await DB.put(ent.store, rec);
      // neu angelegte Stände/Völker sofort in den Namensindex (für Folgezeilen)
      if (entityKey === 'staende' || entityKey === 'voelker') { /* eigener Index nicht nötig hier */ }
      ok++;
    }
    if (entityKey === 'staende' || entityKey === 'voelker') { /* Referenz-Caches anderer Importe veralten – egal, sie werden je Import neu gebaut */ }
    let msg = `${ok} ${ent.label} importiert`;
    if (uebersprungen) msg += `, ${uebersprungen} übersprungen`;
    zone.innerHTML = `<div class="banner ${ok ? 'info' : 'warn'}">${icon(ok ? 'check' : 'warn')} <span class="b-msg"><b>${msg}.</b>${probleme.length ? ` Nicht gefundene Völker (erst Völker importieren): ${U.esc(probleme.slice(0, 8).join(', '))}${probleme.length > 8 ? ' …' : ''}.` : ''}</span></div>`;
    UI.toast(msg);
    window._changedSinceBackup = true;
  },
};

/* =====================================================================
   MODUL: REPORTING (Völkerentwicklung, Ertrag, Behandlungen, Finanzen)
   ===================================================================== */
const Reporting = {
  /** aktive Völker zum Jahresende je Jahr */
  async voelkerEntwicklung() {
    const voelker = await DB.getAll('voelker');
    if (!voelker.length) return { labels: [], values: [] };
    const start = (v) => (v.historie && v.historie[0] ? v.historie[0].datum : (v.createdAt || '').slice(0, 10)) || U.todayIso();
    const ende = (v) => (v.status === 'aktiv' ? null : (v.historie && v.historie.length ? v.historie[v.historie.length - 1].datum : null));
    const years = [...new Set(voelker.map((v) => +start(v).slice(0, 4)))];
    const y0 = Math.min(...years), y1 = +U.todayIso().slice(0, 4);
    const labels = [], values = [];
    for (let y = y0; y <= y1; y++) {
      const stichtag = `${y}-12-31`;
      labels.push(String(y));
      values.push(voelker.filter((v) => start(v) <= stichtag && (!ende(v) || ende(v) > stichtag)).length);
    }
    return { labels, values };
  },
  /** Honigertrag gruppiert nach volk|stand|tracht|jahr */
  async ertrag(gruppe) {
    const ernten = await DB.getAll('ernten');
    const voelker = await idMap('voelker'), staende = await idMap('staende');
    const key = (e) => {
      if (gruppe === 'jahr') return (e.datum || '').slice(0, 4) || '?';
      if (gruppe === 'sorte') return e.sorte || 'ohne Sorte';
      if (gruppe === 'stand') { if (e.zielTyp === 'stand') return staende.get(e.zielId)?.name || 'gelöscht'; const v = voelker.get(e.zielId); return v && v.standId ? staende.get(v.standId)?.name || 'gelöscht' : 'ohne Stand'; }
      return e.zielTyp === 'volk' ? voelker.get(e.zielId)?.name || 'gelöscht' : `Stand: ${staende.get(e.zielId)?.name || 'gelöscht'}`;
    };
    const g = U.groupBy(ernten, key);
    const rows = [...g.entries()].map(([k, items]) => ({ k, kg: U.sum(items, (e) => e.mengeKg), n: items.length })).sort((a, b) => b.kg - a.kg);
    return rows;
  },
  async behandlungsUebersicht() {
    const list = await DB.getAll('behandlungen');
    const g = U.groupBy(list, (b) => `${(b.datum || '').slice(0, 4)}|${b.mittel}`);
    return [...g.entries()].map(([key, items]) => { const [jahr, mittel] = key.split('|'); return { jahr, mittel, n: items.length, menge: U.sum(items, (b) => b.menge), einheit: items[0].einheit || '' }; }).sort((a, b) => b.jahr.localeCompare(a.jahr));
  },
  /** Fahrten → Kilometer und Anzahl je Jahr (absteigend) */
  fahrtStatistik(fahrten) {
    const g = U.groupBy(fahrten.filter((f) => f.datum), (f) => f.datum.slice(0, 4));
    return [...g.entries()]
      .map(([jahr, items]) => ({ jahr, anzahl: items.length, km: Math.round(U.sum(items, (f) => f.km) * 10) / 10 }))
      .sort((a, b) => b.jahr.localeCompare(a.jahr));
  },
  /** erledigte Aufgaben mit Zeit → Stunden je Tätigkeit (für Tortendiagramm) */
  zeiten(aufgaben) {
    const g = U.groupBy(aufgaben, (a) => a.kategorie || 'Sonstiges');
    return [...g.entries()]
      .map(([label, items]) => ({ label, wert: Math.round((U.sum(items, (a) => a.zeitMinuten) / 60) * 10) / 10 }))
      .sort((a, b) => b.wert - a.wert);
  },
  async finanzen() {
    const list = await DB.getAll('kassenbuch');
    const years = [...new Set(list.map((k) => (k.datum || '').slice(0, 4)))].filter(Boolean).sort();
    return years.map((y) => ({
      jahr: y,
      ein: U.sum(list.filter((k) => k.typ === 'einnahme' && k.datum.startsWith(y)), (k) => k.betrag),
      aus: U.sum(list.filter((k) => k.typ === 'ausgabe' && k.datum.startsWith(y)), (k) => k.betrag),
    }));
  },
};

/* =====================================================================
   BACKUP & DATENSICHERHEIT (höchste Priorität)
   Export/Teilen, Import (Ersetzen/Merge), interne Snapshots (10),
   Auto-Sicherung (Ordner/Download), Reminder-Banner, storage.persist
   ===================================================================== */
window._changedSinceBackup = false;
const Backup = {
  /* ---------- Datenpaket bauen ---------- */
  async buildData(mitAnhaengen = true) {
    const out = { app: 'ImkerBuch', formatVersion: 1, exportiert: U.nowIso(), stores: {} };
    for (const store of DB.DATA_STORES) {
      const rows = await DB.getAll(store);
      if (store === 'anhaenge') {
        out.stores[store] = [];
        for (const r of rows) {
          const { blob, ...rest } = r;
          if (mitAnhaengen && blob) rest.datenUrl = await U.blobToDataURL(blob);
          out.stores[store].push(rest);
        }
      } else out.stores[store] = rows;
    }
    return out;
  },
  dateiname() {
    const d = new Date();
    const p = (n) => String(n).padStart(2, '0');
    return `imkerbuch-backup-${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}.json`;
  },
  async buildBlob() { return new Blob([JSON.stringify(await this.buildData(true))], { type: 'application/json' }); },

  /* ---------- Export: Download & Teilen ---------- */
  async exportDownload() {
    const name = this.dateiname();
    // Chrome/Edge (Desktop): echten „Speichern unter“-Dialog zeigen, damit der Ordner frei wählbar ist.
    // Wichtig: den Datei-Dialog ZUERST öffnen (solange der Klick noch „frisch“ ist), dann erst die Datei bauen.
    let handle = null;
    if (window.showSaveFilePicker) {
      try {
        handle = await window.showSaveFilePicker({ suggestedName: name, types: [{ description: 'ImkerBuch-Sicherung', accept: { 'application/json': ['.json'] } }] });
      } catch (err) {
        if (err && err.name === 'AbortError') return; // Nutzer hat den Dialog abgebrochen
        handle = null; // sonst: klassischer Download als Fallback
      }
    }
    const blob = await this.buildBlob();
    if (handle) {
      const w = await handle.createWritable();
      await w.write(blob);
      await w.close();
      await this.markExternal(); UI.toast('Backup gespeichert');
      return;
    }
    U.download(blob, name);
    await this.markExternal(); UI.toast('Backup heruntergeladen (Ordner „Downloads“)');
  },
  /** „Sicherung senden“: Web Share API Level 2 mit Datei, sonst Download + mailto */
  async share() {
    const blob = await this.buildBlob();
    const file = new File([blob], this.dateiname(), { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'ImkerBuch-Sicherung', text: `ImkerBuch-Sicherung vom ${U.fmtDate(U.todayIso())}` });
        await this.markExternal(); UI.toast('Sicherung geteilt');
      } catch (e) { if (e.name !== 'AbortError') UI.toast('Teilen abgebrochen', 'err'); }
    } else {
      U.download(blob, this.dateiname());
      await this.markExternal();
      const subject = encodeURIComponent(`ImkerBuch-Sicherung vom ${U.fmtDate(U.todayIso())}`);
      const body = encodeURIComponent('Anbei die aktuelle ImkerBuch-Sicherung.\n\nHinweis: Die soeben heruntergeladene Datei bitte manuell als Anhang hinzufügen.');
      UI.modal({
        title: 'Sicherung heruntergeladen',
        body: `<p>Dein Browser unterstützt das direkte Teilen von Dateien nicht. Die Sicherung wurde <b>heruntergeladen</b>.</p>
          <p class="mt8 small muted">Über den Button öffnet sich eine E-Mail mit vorbereitetem Betreff – hänge die heruntergeladene Datei dort manuell an.</p>`,
        footer: `<button class="btn btn-ghost" data-close2>Fertig</button><a class="btn btn-primary" href="mailto:?subject=${subject}&body=${body}">E-Mail öffnen</a>`,
      });
      $$('[data-close2]').forEach((b) => b.onclick = () => b.closest('.modal-back').remove());
    }
  },
  async markExternal() {
    await S.set('letzteExterneSicherung', U.nowIso());
    window._changedSinceBackup = false;
    this.updateBanners();
  },

  /* ---------- Reminder ---------- */
  reminderInfo() {
    const t = S.get('letzteExterneSicherung');
    if (!t) return { tage: null, stufe: S.get('wizardDone') ? 'gelb' : 'ok' };
    const tage = U.daysBetween(t, U.nowIso());
    return { tage, stufe: tage >= 14 ? 'rot' : tage >= 7 ? 'gelb' : 'ok' };
  },
  _dismissed: { persist: false, gelb: false },
  _persistDenied: false,
  updateBanners() {
    const box = $('#banners'); if (!box) return;
    const info = this.reminderInfo();
    let html = '';
    if (info.stufe === 'rot') {
      html += `<div class="banner danger">${icon('warn')} <span class="b-msg"><b>Backup dringend nötig:</b> letzte externe Sicherung ${info.tage === null ? 'noch nie' : `vor ${info.tage} Tagen`}. Deine Daten liegen nur auf diesem Gerät!</span>
        <span class="spacer"></span><button class="btn btn-primary btn-sm" onclick="Backup.share()">${icon('share')} Jetzt sichern</button></div>`;
    } else if (info.stufe === 'gelb' && !this._dismissed.gelb) {
      html += `<div class="banner warn">${icon('info')} <span class="b-msg">Letzte externe Sicherung: ${info.tage === null ? 'noch nie' : `vor ${info.tage} Tagen`}. Zeit für ein Backup.</span>
        <span class="spacer"></span><button class="btn btn-ghost btn-sm" onclick="Backup.share()">Sichern</button>
        <button class="icon-btn" onclick="Backup._dismissed.gelb=true;Backup.updateBanners()">${icon('x')}</button></div>`;
    }
    // Als installierte App (Home-Bildschirm) ist der Speicher ohnehin geschützt –
    // WebKit lehnt persist() dort trotzdem oft still ab, der Hinweis wäre nur Lärm.
    const installiert = matchMedia('(display-mode: standalone)').matches || navigator.standalone === true || IST_NATIVE_APP;
    if (this._persistDenied && !this._dismissed.persist && !installiert) {
      html += `<div class="banner info">${icon('info')} <span class="b-msg">Der Browser hat <b>dauerhaften Speicher abgelehnt</b>. Bei Speicherplatzmangel könnte er die App-Daten löschen – bitte regelmäßig extern sichern (und die App ggf. als PWA installieren, das erhöht die Chance auf dauerhaften Speicher).</span>
        <span class="spacer"></span><button class="icon-btn" onclick="Backup._dismissed.persist=true;Backup.updateBanners()">${icon('x')}</button></div>`;
    }
    box.innerHTML = html;
  },
  async requestPersist() {
    try {
      if (!navigator.storage || !navigator.storage.persist) return;
      const already = await navigator.storage.persisted();
      if (already) return;
      const ok = await navigator.storage.persist();
      if (!ok) { this._persistDenied = true; this.updateBanners(); }
    } catch (e) { /* egal */ }
  },

  /* ---------- Interne Snapshots (rollierend 10, ohne Anhang-Blobs) ---------- */
  async snapshotInternal(grund) {
    const data = await this.buildData(false);
    const json = JSON.stringify(data);
    await DB.put('snapshots', { datum: U.nowIso(), grund, daten: json, groesse: json.length });
    const alle = U.sortBy(await DB.getAll('snapshots'), (s) => s.datum, true);
    for (const s of alle.slice(10)) await DB.del('snapshots', s.id);
  },
  async restoreSnapshot(id) {
    const snap = await DB.get('snapshots', id);
    if (!snap) return;
    const ok1 = await UI.confirm({ title: 'Snapshot wiederherstellen?', text: `Der Stand vom ${U.fmtDateTime(snap.datum)} ersetzt ALLE aktuellen Daten. Vorher wird automatisch ein Snapshot des jetzigen Stands angelegt.`, confirmText: 'Weiter', danger: true });
    if (!ok1) return;
    const ok2 = await UI.confirm({ title: 'Wirklich sicher?', text: 'Letzte Bestätigung: aktuelle Daten werden überschrieben.', confirmText: 'Wiederherstellen', danger: true });
    if (!ok2) return;
    await this.snapshotInternal('vor-wiederherstellung');
    const data = JSON.parse(snap.daten);
    await this.applyReplace(data, { blobsBehalten: true });
    UI.toast('Snapshot wiederhergestellt');
    await S.load(); applyTheme(); renderRoute(); this.updateBanners();
  },

  /* ---------- Import (Datei): Ersetzen / Zusammenführen ---------- */
  async importFile(file) {
    let data;
    try { data = JSON.parse(await file.text()); } catch (e) { return UI.toast('Datei ist kein gültiges JSON', 'err'); }
    if (data.app !== 'ImkerBuch' || !data.stores) return UI.toast('Das ist keine ImkerBuch-Sicherung', 'err');
    const counts = Object.entries(data.stores).map(([s, rows]) => rows.length ? `${rows.length} × ${STORE_LABELS[s] || s}` : null).filter(Boolean).slice(0, 8).join(', ');
    const m = UI.modal({
      title: 'Sicherung importieren',
      body: `<p class="small">Sicherung vom <b>${U.fmtDateTime(data.exportiert)}</b></p><p class="small muted mt8">${counts || 'leer'}</p>
        <div class="mt16">
          <button class="btn btn-primary btn-block" data-merge>${icon('merge')} Zusammenführen (empfohlen)</button>
          <div class="hint mb12 mt8">Neue Einträge werden ergänzt, bei Konflikten gewinnt der neuere Stand (keine Duplikate dank UUIDs).</div>
          <button class="btn btn-danger btn-block" data-replace>${icon('warn')} Ersetzen (kompletter Restore)</button>
          <div class="hint mt8">Alle aktuellen Daten werden überschrieben. Vorher wird automatisch ein interner Snapshot angelegt.</div>
        </div>`,
      footer: `<button class="btn btn-ghost" data-cancel>Abbrechen</button>`,
    });
    $('[data-cancel]', m.el).onclick = () => m.close();
    $('[data-merge]', m.el).onclick = async () => {
      m.close(true);
      const n = await this.applyMerge(data);
      UI.toast(`Zusammengeführt: ${n} Einträge übernommen`);
      await S.load(); applyTheme(); renderRoute(); this.updateBanners();
    };
    $('[data-replace]', m.el).onclick = async () => {
      m.close(true);
      const ok1 = await UI.confirm({ title: 'Alle Daten ersetzen?', text: 'Der komplette aktuelle Datenbestand wird durch die Sicherung ersetzt.', confirmText: 'Weiter' });
      if (!ok1) return;
      const ok2 = await UI.confirm({ title: 'Letzte Bestätigung', text: 'Zum Schutz vor Versehen bitte bestätigen.', confirmText: 'Endgültig ersetzen', requirePhrase: 'ERSETZEN' });
      if (!ok2) return;
      await this.snapshotInternal('vor-import');
      await this.applyReplace(data, { blobsBehalten: false });
      UI.toast('Sicherung wiederhergestellt');
      await S.load(); applyTheme(); renderRoute(); this.updateBanners();
    };
  },
  _rowsAusImport(store, rows) {
    return rows.map((r) => {
      if (store === 'anhaenge' && r.datenUrl) { const { datenUrl, ...rest } = r; rest.blob = U.dataURLToBlob(datenUrl); return rest; }
      return r;
    });
  },
  async applyReplace(data, { blobsBehalten }) {
    const alteBlobs = new Map();
    if (blobsBehalten) for (const a of await DB.getAll('anhaenge')) alteBlobs.set(a.id, a.blob);
    for (const store of DB.DATA_STORES) {
      await DB.clear(store);
      let rows = this._rowsAusImport(store, data.stores[store] || []);
      if (store === 'anhaenge' && blobsBehalten) rows = rows.map((r) => (r.blob ? r : { ...r, blob: alteBlobs.get(r.id) })).filter((r) => r.blob);
      await DB.bulkPut(store, rows, true);
    }
  },
  /** Merge über UUID + lastModified – neuere Einträge gewinnen */
  async applyMerge(data) {
    let uebernommen = 0;
    for (const store of DB.DATA_STORES) {
      const importRows = this._rowsAusImport(store, data.stores[store] || []);
      if (!importRows.length) continue;
      const keyOf = (r) => (store === 'settings' ? r.key : r.id);
      const vorhanden = new Map((await DB.getAll(store)).map((r) => [keyOf(r), r]));
      const zuSchreiben = [];
      for (const r of importRows) {
        if (store === 'anhaenge' && !r.blob) continue; // Metadaten ohne Datei nutzen nichts
        const alt = vorhanden.get(keyOf(r));
        if (!alt || (r.lastModified || '') > (alt.lastModified || '')) zuSchreiben.push(r);
      }
      await DB.bulkPut(store, zuSchreiben, true);
      uebernommen += zuSchreiben.length;
    }
    return uebernommen;
  },

  /* ---------- Automatische Sicherung ---------- */
  async chooseDir() {
    if (!window.showDirectoryPicker) { UI.toast('Ordner-Auswahl nur in Chrome/Edge am Desktop (File System Access API)', 'err'); return false; }
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      await S.set('backupDirHandle', handle);
      await S.set('backupDirName', handle.name);
      UI.toast(`Backup-Ordner „${handle.name}“ gewählt`); return true;
    } catch (e) { return false; }
  },
  async writeToDir() {
    const handle = S.get('backupDirHandle');
    if (!handle) return false;
    try {
      if ((await handle.queryPermission({ mode: 'readwrite' })) !== 'granted' &&
          (await handle.requestPermission({ mode: 'readwrite' })) !== 'granted') return false;
      const fh = await handle.getFileHandle(this.dateiname(), { create: true });
      const w = await fh.createWritable();
      await w.write(await this.buildBlob()); await w.close();
      return true;
    } catch (e) { console.error('Ordner-Backup fehlgeschlagen', e); return false; }
  },
  /** fällige Auto-Sicherung ausführen (Snapshot + extern) */
  async runAuto(quelle = 'intervall') {
    await this.snapshotInternal('auto');
    let extern = false;
    if (S.get('backupDirHandle')) extern = await this.writeToDir();
    else { U.download(await this.buildBlob(), this.dateiname()); extern = true; }
    await S.set('letzteAutoSicherung', U.nowIso());
    if (extern) await this.markExternal();
    UI.toast('Automatische Sicherung erstellt');
  },
  initAuto() {
    const tick = async () => {
      const f = S.get('features');
      if (!f.autoBackup.aktiv || f.autoBackup.intervall === 'schliessen') return;
      const last = S.get('letzteAutoSicherung');
      const tage = f.autoBackup.intervall === 'taeglich' ? 1 : 7;
      if (!last || U.daysBetween(last, U.nowIso()) >= tage) await this.runAuto();
    };
    setTimeout(tick, 4000);
    setInterval(tick, 30 * 60 * 1000);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'hidden') return;
      const f = S.get('features');
      if (f.autoBackup.aktiv && f.autoBackup.intervall === 'schliessen' && window._changedSinceBackup) {
        this.snapshotInternal('auto'); // Ordner-Schreiben ist beim Schließen nicht zuverlässig, Snapshot schon
        this.writeToDir().then((ok) => { if (ok) S.set('letzteExterneSicherung', U.nowIso()); });
        S.set('letzteAutoSicherung', U.nowIso());
      }
    });
    window.addEventListener('beforeunload', (e) => {
      if (S.get('features').backupBeimSchliessen && window._changedSinceBackup) { e.preventDefault(); e.returnValue = ''; }
    });
  },
};
/* =====================================================================
   MHD-WÄCHTER: legt automatisch Aufgaben an, wenn das Mindesthaltbarkeits-
   datum einer Charge mit Restbestand näher rückt oder überschritten ist.
   ===================================================================== */
async function pruefeMhd() {
  const offeneMhdAufgaben = (await DB.getAll('aufgaben')).filter((a) => a.quelle === 'mhd' && !a.erledigt);
  const heute = U.todayIso();
  const schonErinnert = (refId) => offeneMhdAufgaben.some((a) => a.refId === refId);
  // Honig-Chargen mit Restbestand (Gläser im Bestand ODER noch nicht abgefüllte Menge)
  const abfAlle = await DB.getAll('abfuellungen');
  for (const c of (await DB.getAll('chargen')).filter((c) => c.mhd)) {
    const glaeser = U.sum(abfAlle.filter((a) => a.chargeId === c.id), (a) => a.bestand);
    const restKg = chargeRestKg(c, abfAlle);
    if ((glaeser <= 0 && restKg <= 0.0001) || U.daysBetween(heute, c.mhd) > MHD_WARN_TAGE || schonErinnert(c.id)) continue;
    const menge = glaeser > 0 ? `${glaeser} Gläser` : `${U.fmtNum(restKg, 1)} kg`;
    const titel = c.mhd < heute
      ? `MHD überschritten: Los ${c.losnummer} (${menge})`
      : `MHD läuft ab: Los ${c.losnummer} am ${U.fmtDate(c.mhd)} (${menge})`;
    await DB.put('aufgaben', { titel, faellig: c.mhd, erledigt: false, quelle: 'mhd', refId: c.id, notiz: 'Restbestand vor Ablauf abverkaufen oder verwerten.' });
  }
  // Betriebsmittel/Inventar: Ablaufdatum (MHD) und Mindestbestand
  for (const it of await DB.getAll('inventar')) {
    if (schonErinnert(it.id)) continue;
    if (it.ablauf && U.daysBetween(heute, it.ablauf) <= MHD_WARN_TAGE) {
      const titel = it.ablauf < heute ? `Abgelaufen: ${it.bezeichnung}` : `Läuft ab: ${it.bezeichnung} am ${U.fmtDate(it.ablauf)}`;
      await DB.put('aufgaben', { titel, faellig: it.ablauf, erledigt: false, quelle: 'mhd', refId: it.id, notiz: 'Betriebsmittel vor Ablauf ersetzen (z. B. Varroa-Mittel).' });
    } else if (it.mindestbestand > 0 && (it.stueckzahl || 0) <= it.mindestbestand) {
      await DB.put('aufgaben', { titel: `Bestand niedrig: ${it.bezeichnung} (${it.stueckzahl} ≤ ${it.mindestbestand})`, faellig: heute, erledigt: false, quelle: 'mhd', refId: it.id, notiz: 'Nachbestellen.' });
    }
  }
}

/* Änderungs-Flag für „seit letzter Sicherung“ */
const _origPut = DB.put.bind(DB);
DB.put = async function (store, obj, keepStamp) { if (store !== 'settings' && store !== 'snapshots') window._changedSinceBackup = true; return _origPut(store, obj, keepStamp); };

/* =====================================================================
   ERINNERUNGEN: System-Benachrichtigung + App-Icon-Badge bei fälligen
   Aufgaben (lokal, ohne Server) + Kalender-Export (.ics) für echte
   Erinnerungen auch bei geschlossener App.
   Plattform-Grenze: ohne Push-Server kann das Web bei komplett
   geschlossener App nichts zustellen – dafür ist der ICS-Weg da.
   ===================================================================== */
const Notif = {
  unterstuetzt: () => 'Notification' in window && 'serviceWorker' in navigator,
  status() {
    if (!this.unterstuetzt()) return 'unsupported';
    return Notification.permission; // 'default' | 'granted' | 'denied'
  },
  async anfordern() {
    if (!this.unterstuetzt()) return 'unsupported';
    try { return await Notification.requestPermission(); } catch (e) { return 'denied'; }
  },
  /** überfällige + heute fällige, offene Aufgaben */
  faellige(aufgaben, heute = U.todayIso()) {
    return aufgaben.filter((a) => !a.erledigt && a.faellig && a.faellig <= heute);
  },
  /** Badge setzen + höchstens 1× täglich (bzw. bei mehr Fälligen) benachrichtigen */
  async check(erzwingen = false) {
    const f = S.get('features');
    if (!f.benachrichtigungen) { this.badge(0); return 0; }
    const faellig = this.faellige(await DB.getAll('aufgaben'));
    this.badge(faellig.length);
    if (!faellig.length) return 0;
    const heute = U.todayIso();
    const letzte = S.get('letzteNotif') || {};
    if (!erzwingen && letzte.tag === heute && (letzte.anzahl || 0) >= faellig.length) return faellig.length;
    if (this.status() !== 'granted') return faellig.length;
    const reg = await navigator.serviceWorker.getRegistration();
    if (!reg) return faellig.length;
    try {
      await reg.showNotification(faellig.length === 1 ? '🐝 1 Aufgabe fällig' : `🐝 ${faellig.length} Aufgaben fällig`, {
        body: faellig.slice(0, 4).map((a) => `• ${a.titel}`).join('\n') + (faellig.length > 4 ? '\n…' : ''),
        tag: 'imkerbuch-aufgaben', icon: 'icon-192.png', badge: 'icon-192.png',
      });
      await S.set('letzteNotif', { tag: heute, anzahl: faellig.length });
    } catch (e) { console.warn('Benachrichtigung fehlgeschlagen', e); }
    return faellig.length;
  },
  /** App-Icon-Badge (iOS-Homescreen/Chrome), still scheitern wenn nicht unterstützt */
  badge(n) {
    try { if ('setAppBadge' in navigator) (n > 0 ? navigator.setAppBadge(n) : navigator.clearAppBadge()); } catch (e) {}
  },
  init() {
    setTimeout(() => this.check(), 2500);
    setInterval(() => this.check(), 30 * 60 * 1000);
    document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') this.check(); });
  },
  /** offene terminierte Aufgaben als iCalendar (Apple/Google Kalender, mit Alarm 08:00) */
  icsFuerAufgaben(aufgaben) {
    const esc = (s) => String(s || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\r?\n/g, '\\n');
    const stamp = U.nowIso().replace(/[-:]/g, '').replace(/\.\d+/, '');
    const events = aufgaben.filter((a) => !a.erledigt && a.faellig).map((a) => [
      'BEGIN:VEVENT',
      `UID:${a.id}@imkerbuch`,
      `DTSTAMP:${stamp}`,
      `DTSTART:${a.faellig.replace(/-/g, '')}T080000`,
      `SUMMARY:${esc('🐝 ' + a.titel)}`,
      a.notiz ? `DESCRIPTION:${esc(a.notiz)}` : '',
      'BEGIN:VALARM', 'ACTION:DISPLAY', `DESCRIPTION:${esc(a.titel)}`, 'TRIGGER:-PT0M', 'END:VALARM',
      'END:VEVENT',
    ].filter(Boolean).join('\r\n'));
    return ['BEGIN:VCALENDAR', 'VERSION:2.0', 'PRODID:-//ImkerBuch//DE', 'CALSCALE:GREGORIAN',
      'X-WR-CALNAME:ImkerBuch Aufgaben', ...events, 'END:VCALENDAR'].join('\r\n') + '\r\n';
  },
  async icsExport() {
    const aufgaben = await DB.getAll('aufgaben');
    const offen = this.faellige(aufgaben, '9999-12-31');
    if (!offen.length) return UI.toast('Keine offenen Aufgaben mit Datum', 'err');
    U.download(new Blob([this.icsFuerAufgaben(aufgaben)], { type: 'text/calendar;charset=utf-8' }), `imkerbuch-aufgaben-${U.todayIso()}.ics`);
    UI.toast(`${offen.length} Termine exportiert – Datei in den Kalender importieren`);
  },
};

/* =====================================================================
   QR-CODES (qrcode-generator): Text → PNG-DataURL (für <img> und jsPDF)
   ===================================================================== */
async function makeQr(text) {
  await U.loadScript(...CDN.qrcode);
  window.qrcode.stringToBytes = window.qrcode.stringToBytesFuncs['UTF-8']; // Umlaute korrekt kodieren
  const qr = window.qrcode(0, 'M');
  qr.addData(text, 'Byte'); qr.make();
  const gif = qr.createDataURL(8, 4);
  const img = new Image();
  await new Promise((res, rej) => { img.onload = res; img.onerror = () => rej(new Error('QR-Bild fehlgeschlagen')); img.src = gif; });
  const c = document.createElement('canvas'); c.width = img.width; c.height = img.height;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, c.width, c.height); ctx.drawImage(img, 0, 0);
  return c.toDataURL('image/png');
}

      XLSX.writeFile(wb, `imkerbuch-export-${U.todayIso()}.xlsx`, { cellDates: true });

      const XLSX = await this.lib();

      const def = defs[store]; if (!def) return UI.toast('Modul nicht exportierbar', 'err');
      const rows = await def.rows();
      const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{}]);
      if (fmt === 'csv') {
        U.download(new Blob(['﻿' + XLSX.utils.sheet_to_csv(ws, { FS: ';' })], { type: 'text/csv;charset=utf-8' }), `imkerbuch-${store}-${U.todayIso()}.csv`);

/* =====================================================================
   PDF-ERZEUGUNG (jsPDF + AutoTable): einheitlicher Kopf mit Logo,
   Imkereidaten, Tabellen, Seitenzahlen
   ===================================================================== */
const Pdf = {
  async lib() {
    await U.loadScript(...CDN.jspdf);
    await U.loadScript(...CDN.autotable);
    return window.jspdf.jsPDF;
  },
  _logoCache: null,
  /** eigenes Logo (Einstellungen) oder ImkerBuch-Waben-Logo als PNG-DataURL */
  async logoDataUrl() {
    const eigenes = S.get('logo');
    if (eigenes) return eigenes;
    if (this._logoCache) return this._logoCache;
    const svg = logoSvg(128).replace('currentColor', '#26262B').replace('currentColor', '#26262B');
    const url = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
    const img = new Image();
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
    c.getContext('2d').drawImage(img, 0, 0, 128, 128);
    URL.revokeObjectURL(url);
    this._logoCache = c.toDataURL('image/png');
    return this._logoCache;
  },
  /** neues A4-Dokument mit Kopfbereich; gibt {doc, y} zurück */
  async newDoc(titel, untertitel = '') {
    const jsPDF = await this.lib();
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const y = await this.header(doc, titel, untertitel);
    return { doc, y };
  },
  async header(doc, titel, untertitel = '') {
    const imk = S.get('imkerei');
    const W = doc.internal.pageSize.getWidth(); // seiten-maß-abhängig → Hoch- und Querformat
    const usable = W - 28; // 2×14 mm Rand
    try { doc.addImage(await this.logoDataUrl(), 'PNG', 14, 12, 16, 16); } catch (e) {}
    doc.setFont('helvetica', 'bold').setFontSize(13).setTextColor(38, 38, 43);
    doc.text(imk.name || 'ImkerBuch', 34, 18, { maxWidth: usable - 20 });
    doc.setFont('helvetica', 'normal').setFontSize(8.5).setTextColor(120);
    const adr = [imk.strasse, [imk.plz, imk.ort].filter(Boolean).join(' '), imk.telefon, imk.email, imk.registriernummer ? 'Betriebs-Nr. ' + imk.registriernummer : ''].filter(Boolean).join(' · ');
    if (adr) doc.text(adr, 34, 23, { maxWidth: usable - 20 });
    doc.setDrawColor(232, 160, 19).setLineWidth(0.8).line(14, 31, W - 14, 31);
    // Titel und Untertitel umbrechen, damit nichts über den rechten Rand hinausläuft
    doc.setFont('helvetica', 'bold').setFontSize(16).setTextColor(38, 38, 43);
    const tLines = doc.splitTextToSize(String(titel || ''), usable);
    doc.text(tLines, 14, 40);
    let y = 40 + tLines.length * 6.6;
    if (untertitel) {
      doc.setFont('helvetica', 'normal').setFontSize(9.5).setTextColor(110);
      const sLines = doc.splitTextToSize(String(untertitel), usable);
      doc.text(sLines, 14, y + 1);
      y += 1 + sLines.length * 4.6;
    }
    return y + 3;
  },
  table(doc, { head, body, startY, widths, margin }) {
    doc.autoTable({
      head: [head], body, startY,
      styles: { font: 'helvetica', fontSize: 8.5, cellPadding: 2, textColor: [40, 37, 30], overflow: 'linebreak', valign: 'middle', lineWidth: 0.1, lineColor: [226, 216, 196] },
      headStyles: { fillColor: [232, 160, 19], textColor: [36, 26, 5], fontStyle: 'bold', overflow: 'linebreak' },
      alternateRowStyles: { fillColor: [250, 246, 239] },
      columnStyles: widths || {}, margin: margin || { left: 14, right: 14 },
      tableWidth: 'auto', rowPageBreak: 'avoid',
    });
    return doc.lastAutoTable.finalY;
  },
  /** Fußzeile mit Seitenzahlen auf allen Seiten, dann ausgeben */
  finish(doc, dateiname) {
    const W = doc.internal.pageSize.getWidth(), H = doc.internal.pageSize.getHeight();
    const n = doc.getNumberOfPages();
    for (let i = 1; i <= n; i++) {
      doc.setPage(i);
      doc.setFont('helvetica', 'normal').setFontSize(8).setTextColor(150);
      doc.text(`Seite ${i} von ${n}`, W - 14, H - 7, { align: 'right' });
      doc.text(`Erstellt mit ImkerBuch am ${U.fmtDate(U.todayIso())}`, 14, H - 7);
    }
    if (this.noDownloadForTest) { this.lastDocForTest = doc; return; } // Test-Seam: kein Download
    this.ausgeben(doc, dateiname);
  },
  /** PDF ausgeben – zuverlässig über Browser hinweg (Firefox öffnete den Download nicht).
      Mobil/App: System-Teilen (Öffnen/Sichern/Teilen). Desktop: im neuen Tab ansehen ODER dort speichern. */
  async ausgeben(doc, dateiname) {
    const blob = doc.output('blob');
    const mobil = IST_NATIVE_APP || (window.matchMedia && matchMedia('(pointer:coarse)').matches);
    if (mobil && navigator.share) {
      try {
        const file = new File([blob], dateiname, { type: 'application/pdf' });
        if (!navigator.canShare || navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: dateiname }); return; }
      } catch (e) { if (e && e.name === 'AbortError') return; } // Nutzer hat abgebrochen
    }
    const url = URL.createObjectURL(blob);
    // Im neuen Tab öffnen → Firefox/Chrome zeigen die PDF mit eigenem „Speichern/Drucken"
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 60000);
    UI.toast('PDF geöffnet');
  },

      this.table(doc, { head: ['Datum', 'Bienenvolk/Stand', 'Arzneimittel', 'Menge', 'Anwendungsart', 'Wartezeit', 'Bemerkung/Charge'], body, startY: y });

      const herkunft = [s.linie, s.zuchtmutterId ? 'Zuchtmutter ' + zmLabel(s.zuchtmutterId) : '', anp].filter(Boolean).join(' · ');

  /* ---------- Honig-Chargenübersicht ---------- */
  async chargenuebersicht() {
    try {
      const chargen = U.sortBy(await DB.getAll('chargen'), (c) => c.losnummer);
      const abfAlle = await DB.getAll('abfuellungen');
      const ernten = await idMap('ernten');
      const { doc, y } = await this.newDoc('Honig-Chargenübersicht', 'Rückverfolgbarkeit: Charge → Abfüllung → Ernte');
      const body = [];
      const kopf = { fontStyle: 'bold', fillColor: [245, 236, 218] };
      for (const c of chargen) {
        const sorten = (c.ernteIds || []).map((id) => { const e = ernten.get(id); return e ? `${e.sorte || 'Ernte'} (${U.fmtDate(e.datum)})` : ''; }).filter(Boolean).join(', ');
        const abf = U.sortBy(abfAlle.filter((a) => a.chargeId === c.id), (a) => a.gebindeG, true);
        body.push([
          { content: `Los ${c.losnummer}`, styles: kopf },
          { content: `${U.fmtNum(c.mengeKg || 0, 1)} kg`, styles: kopf },
          { content: `${U.fmtNum(chargeRestKg(c, abfAlle), 1)} kg frei`, styles: kopf },
          { content: U.fmtDate(c.mhd) || '–', styles: kopf },
          { content: sorten, styles: kopf },
        ]);
        for (const a of abf) body.push([`↳ ${gebindeLabel(a.gebindeG)}`, `${a.anzahl} abgefüllt`, `${a.bestand} im Bestand`, U.fmtDate(a.datum), '']);
      }
      this.table(doc, { head: ['Los / Gebinde', 'Menge / Abgefüllt', 'Frei / Bestand', 'MHD / Datum', 'Ernten'], body, startY: y, widths: { 0: { cellWidth: 34 }, 1: { cellWidth: 32 }, 2: { cellWidth: 32 }, 3: { cellWidth: 24 } } });
      this.finish(doc, `chargen-${U.todayIso()}.pdf`);

  },

  /* ---------- Verkäufe-Übersicht ---------- */
  async verkaeufe(jahr) {
    try {
      const alle = U.sortBy(await DB.getAll('verkaeufe'), (v) => v.datum);
      const list = jahr ? alle.filter((v) => (v.datum || '').startsWith(String(jahr))) : alle;
      const abf = await idMap('abfuellungen'), chargen = await idMap('chargen'), kontakte = await idMap('kontakte'), ernten = await idMap('ernten');
      const umsatz = U.sum(list, (v) => v.betrag), stueck = U.sum(list, (v) => v.anzahl);
      const { doc, y } = await this.newDoc(`Verkäufe${jahr ? ' ' + jahr : ' – Übersicht'}`, `${list.length} ${list.length === 1 ? 'Verkauf' : 'Verkäufe'} · ${stueck} Gebinde · Umsatz ${U.fmtEur(umsatz)}`);

        const a = abf.get(v.abfuellungId), c = a ? chargen.get(a.chargeId) : null;

      });
      body.push([
        { content: 'Summe', styles: { fontStyle: 'bold' } }, '', '',
        { content: String(stueck), styles: { fontStyle: 'bold', halign: 'right' } }, '',
        { content: U.fmtEur(umsatz), styles: { fontStyle: 'bold', halign: 'right' } }, '',
      ]);
      this.table(doc, { head: ['Datum', 'Produkt', 'Los', 'Anzahl', 'à (€)', 'Betrag (€)', 'Käufer'], body, startY: y, widths: { 0: { cellWidth: 20 }, 2: { cellWidth: 20 }, 3: { cellWidth: 16, halign: 'right' }, 4: { cellWidth: 18, halign: 'right' }, 5: { cellWidth: 22, halign: 'right' } } });

    } catch (e) { UI.toast('PDF fehlgeschlagen: ' + e.message, 'err'); }

  /* ---------- Inventar / Verbrauchsmaterial (Gesamtübersicht + Liste) ---------- */
  async inventar(jahr, art, typ, titel) {
    try {
      const staende = await idMap('staende'), voelker = await idMap('voelker');
      let alle = U.sortBy(await DB.getAll('inventar'), (i) => `${i.kategorie || 'zzz'}·${i.bezeichnung.toLowerCase()}`);
      if (typ) alle = alle.filter((i) => inventarTyp(i) === typ);
      const passt = (i) => (!jahr || (jahr === '__ohne' ? !i.anschaffung : (i.anschaffung || '').startsWith(jahr))) && (!art || i.kategorie === art);
      const list = alle.filter(passt);
      const wertVon = (i) => (i.preis || 0) * (i.stueckzahl || 1);
      const wert = U.sum(list, wertVon), stueck = U.sum(list, (i) => i.stueckzahl || 1);
      const filterTxt = [jahr ? (jahr === '__ohne' ? 'ohne Datum' : 'Jahr ' + jahr) : '', art ? 'Art: ' + art : ''].filter(Boolean).join(' · ');
      const { doc, y } = await this.newDoc(titel || 'Inventar', `${list.length} Positionen · ${stueck} Stück · Gesamtwert ${U.fmtEur(wert)}${filterTxt ? ' · ' + filterTxt : ''}`);
      // Übersicht nach Art
      const proArt = [...U.groupBy(list, (i) => i.kategorie || 'Ohne Kategorie').entries()]
        .map(([k, items]) => [k, String(items.length), String(U.sum(items, (i) => i.stueckzahl || 1)), U.fmtEur(U.sum(items, wertVon))])
        .sort((a, b) => a[0].localeCompare(b[0], 'de'));
      proArt.push([{ content: 'Gesamt', styles: { fontStyle: 'bold' } }, { content: String(list.length), styles: { fontStyle: 'bold' } }, { content: String(stueck), styles: { fontStyle: 'bold' } }, { content: U.fmtEur(wert), styles: { fontStyle: 'bold' } }]);
      let yy = this.table(doc, { head: ['Art', 'Positionen', 'Stück', 'Wert'], body: proArt, startY: y, widths: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' } } });
      // Detailliste
      const body = list.map((i) => [i.bezeichnung, i.kategorie || '–', String(i.stueckzahl || 1), U.fmtEur(i.preis), U.fmtEur(wertVon(i)), staende.get(i.standId)?.name || voelker.get(i.volkId)?.name || '–', U.fmtDate(i.anschaffung) || '–']);
      this.table(doc, { head: ['Bezeichnung', 'Kategorie', 'Stück', 'Preis', 'Wert', 'Zuordnung', 'Anschaffung'], body, startY: yy + 8, widths: { 2: { cellWidth: 14, halign: 'right' }, 3: { cellWidth: 20, halign: 'right' }, 4: { cellWidth: 20, halign: 'right' }, 6: { cellWidth: 24 } } });
      this.finish(doc, `${(titel || 'inventar').toLowerCase()}-${U.todayIso()}.pdf`);
    } catch (e) { UI.toast('PDF fehlgeschlagen: ' + e.message, 'err'); }
  },

  /* ---------- Honig-Etiketten (Honigverordnungs-Pflichtangaben) ---------- */
  async honigEtikett(a, c, opts) {
    try {
      const jsPDF = await this.lib();
      const imk = S.get('imkerei');
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      const anzahl = Math.max(1, Math.round(opts.anzahl || 1));
      const los = c ? c.losnummer : '?', mhd = c ? c.mhd : null;
      // Etikett 90×54 mm, 2 Spalten × 5 Zeilen = 10 pro A4-Seite
      const LW = 90, LH = 54, cols = 2, rows = 5, mx = 12, my = 14, gapx = 6, gapy = 3.6;
      const qr = opts.mitQr ? await makeQr(`Los: ${los}\n${opts.bezeichnung}\n${imk.name || ''}`).catch(() => null) : null;
      for (let i = 0; i < anzahl; i++) {
        const posOnPage = i % (cols * rows);
        if (i > 0 && posOnPage === 0) doc.addPage();
        const col = posOnPage % cols, row = Math.floor(posOnPage / cols);
        const x = mx + col * (LW + gapx), yy = my + row * (LH + gapy);
        doc.setDrawColor(210, 195, 160).setLineWidth(0.3).roundedRect(x, yy, LW, LH, 3, 3);
        // Logo-Ecke
        try { doc.addImage(await this.logoDataUrl(), 'PNG', x + 4, yy + 4, 9, 9); } catch (e) {}
        doc.setFont('helvetica', 'bold').setFontSize(13).setTextColor(120, 80, 0);
        doc.text(imk.name || 'Imkerei', x + 16, yy + 10, { maxWidth: LW - 20 });
        doc.setFont('helvetica', 'bold').setFontSize(15).setTextColor(38, 38, 43);
        doc.text(opts.bezeichnung, x + 6, yy + 22, { maxWidth: LW - 12 });
        doc.setFont('helvetica', 'normal').setFontSize(11).setTextColor(40);
        doc.text(`Nettofüllmenge: ${gebindeLabel(a.gebindeG)}`, x + 6, yy + 30);
        doc.setFontSize(8.5).setTextColor(90);
        let ly = yy + 37;
        const zeile = (t) => { doc.text(t, x + 6, ly, { maxWidth: LW - 12 - (qr ? 18 : 0) }); ly += 3.8; };
        zeile(`Ursprungsland: ${opts.ursprung}`);
        zeile(`mind. haltbar bis: ${U.fmtDate(mhd) || '__________'}   Los: ${los}`);
        zeile([imk.strasse, [imk.plz, imk.ort].filter(Boolean).join(' ')].filter(Boolean).join(', ') || 'Anschrift in Einstellungen ergänzen');
        // Bio-Zertifizierung: Kontrollstellen-Code (Pflichtangabe) + EU-Bio/Verband
        if (imk.bio === 'ja') {
          const bioCode = (imk.bioKontrollstelle || '').split('–')[0].trim();
          const bioVerb = (imk.bioVerbandJN === 'ja' && (imk.bioVerband || []).length) ? imk.bioVerband.join('/') : 'EU-Bio';
          doc.setFont('helvetica', 'bold').setTextColor(60, 110, 40);
          zeile(`Öko: ${[bioCode, bioVerb].filter(Boolean).join(' · ')}`);
          doc.setFont('helvetica', 'normal').setTextColor(90);
          // hochgeladene Bio-Logos klein unten links (nur Rastergrafiken)
          let lx = x + 6; const lyImg = yy + LH - 12, grenze = qr ? (x + LW - 20) : (x + LW - 7);
          for (const lg of (imk.bioLogos || []).slice(0, 3)) {
            if (typeof lg !== 'string' || lg.startsWith('data:image/svg')) continue;
            if (lx + 10 > grenze) break;
            try { doc.addImage(lg, lg.includes('image/jpeg') ? 'JPEG' : 'PNG', lx, lyImg, 9, 9); lx += 11; } catch (e) {}
          }
        }
        if (qr) doc.addImage(qr, 'PNG', x + LW - 17, yy + LH - 17, 13, 13);
      }
      this.finish(doc, `etiketten-los-${los}-${gebindeLabel(a.gebindeG).replace(/\s/g, '')}.pdf`);
    } catch (e) { UI.toast('PDF fehlgeschlagen: ' + e.message, 'err'); }
  },

  /* ---------- Rechnung ---------- */
  async rechnung(id) {
    try {
      const r = await DB.get('rechnungen', id);
      const kunde = r.kundeId ? await DB.get('kontakte', r.kundeId) : null;
      const imk = S.get('imkerei');
      const jsPDF = await this.lib();
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });
      // Falz- und Lochmarken (DIN 676) fürs Fensterkuvert – Falten bei 105/210 mm, Lochung bei 148,5 mm
      doc.setDrawColor(180).setLineWidth(0.2);
      doc.line(2, 105, 6, 105); doc.line(2, 210, 6, 210); doc.line(2, 148.5, 7, 148.5);
      // Logo oben rechts, größer – KEIN Absendertext am oberen Rand
      try { doc.addImage(await this.logoDataUrl(), 'PNG', 156, 12, 34, 34); } catch (e) {}
      // Anschriftfeld DIN 5008 (Form B): kleine Rücksendeangabe, darunter der Empfänger – sichtbar im Umschlagfenster
      doc.setFont('helvetica', 'normal').setFontSize(7).setTextColor(120);
      const absender = [imk.name, imk.strasse, [imk.plz, imk.ort].filter(Boolean).join(' ')].filter(Boolean).join(' · ');
      if (absender) doc.text(absender, 25, 45);
      doc.setDrawColor(150).setLineWidth(0.1); doc.line(25, 46.5, 105, 46.5);
      doc.setFont('helvetica', 'normal').setFontSize(11).setTextColor(25, 25, 25);
      const empf = kunde ? [kunde.name, kunde.strasse || '', [kunde.plz, kunde.ort].filter(Boolean).join(' ')].filter(Boolean) : ['(kein Kunde ausgewählt)'];
      doc.text(empf, 25, 53);
      // Infoblock rechts, auf Höhe der Anschrift
      doc.setFontSize(9.5);
      let iy = 53;
      const infoRows = [['Rechnungsnr.', r.nummer || '(Entwurf)'], ['Datum', U.fmtDate(r.datum)]];
      if (imk.registriernummer) infoRows.push(['Betriebs-Nr.', imk.registriernummer]);
      for (const [label, val] of infoRows) { doc.setTextColor(120).text(label, 140, iy); doc.setTextColor(30).text(String(val), 190, iy, { align: 'right' }); iy += 5; }
      // Betreff (unter dem Anschriftfeld)
      doc.setFont('helvetica', 'bold').setFontSize(14).setTextColor(38, 38, 43);
      doc.text(`Rechnung ${r.nummer || '(Entwurf)'}`, 25, 96);
      if (r.status !== 'festgeschrieben') {
        doc.saveGraphicsState(); doc.setGState(new doc.GState({ opacity: 0.13 }));
        doc.setFont('helvetica', 'bold').setFontSize(60).setTextColor(180, 60, 40);
        doc.text(r.status === 'storniert' ? 'STORNIERT' : 'ENTWURF', 105, 160, { align: 'center', angle: 30 });
        doc.restoreGraphicsState();
      }
      const { brutto, steuern } = rechnungSummen(r);
      const zeigtUst = rechnungSteuerart(r) === 'regel';
      const body = r.positionen.map((p, i) => [String(i + 1), p.text, U.fmtNum(p.menge, 0), U.fmtEur(p.einzelpreis), zeigtUst ? `${p.steuersatz || 0} %` : '', U.fmtEur(p.menge * p.einzelpreis)]);
      const head = zeigtUst ? ['Pos.', 'Bezeichnung', 'Menge', 'Einzelpreis', 'USt.', 'Summe'] : ['Pos.', 'Bezeichnung', 'Menge', 'Einzelpreis', '', 'Summe'];
      let y = this.table(doc, { head, body, startY: 104, margin: { left: 25, right: 14 }, widths: { 1: { cellWidth: 74 }, 5: { halign: 'right' }, 3: { halign: 'right' }, 2: { halign: 'right' } } });
      y += 8;
      doc.setFont('helvetica', 'bold').setFontSize(12).setTextColor(38, 38, 43);
      doc.text(`Gesamtbetrag: ${U.fmtEur(brutto)}`, 196, y, { align: 'right' });
      y += 6;
      doc.setFont('helvetica', 'normal').setFontSize(8.5).setTextColor(110);
      for (const [satz, val] of Object.entries(steuern)) { doc.text(`Im Gesamtbetrag enthaltene USt (${U.fmtNum(+satz, 1)} %): ${U.fmtEur(val)}`, 196, y, { align: 'right' }); y += 4.5; }
      const hinweis = rechnungHinweis(r);
      if (hinweis) { const lines = doc.splitTextToSize(hinweis, 150); doc.text(lines, 196, y, { align: 'right' }); y += lines.length * 4.2 + 1; }
      y += 8;
      doc.setFont('helvetica', 'normal').setFontSize(9.5).setTextColor(60);
      doc.text('Vielen Dank für Ihren Einkauf!', 25, y);
      if (r.qrAufDruck) {
        try {
          const eigenes = S.get('rechnungQr'); // hochgeladenes QR-Bild bevorzugen
          const qr = eigenes || await makeQr(`Rechnung ${r.nummer || 'Entwurf'}\n${imk.name || ''}\nBetrag: ${U.fmtEur(brutto)}\nDatum: ${U.fmtDate(r.datum)}`);
          const fmt = eigenes && /image\/jpe?g/.test(eigenes) ? 'JPEG' : 'PNG';
          doc.addImage(qr, fmt, 170, y - 4, 24, 24);
        } catch (e) {}
      }
      // Fußzeile mit Absenderangaben (da oben kein Absendertext steht)
      const foot = [imk.name, imk.strasse, [imk.plz, imk.ort].filter(Boolean).join(' '), imk.telefon, imk.email].filter(Boolean).join('   ·   ');
      if (foot) {
        doc.setDrawColor(210).setLineWidth(0.2); doc.line(25, 285, 196, 285);
        doc.setFont('helvetica', 'normal').setFontSize(7.5).setTextColor(140);
        doc.text(doc.splitTextToSize(foot, 171), 110.5, 289, { align: 'center' });
      }
      this.finish(doc, `rechnung-${r.nummer || 'entwurf'}.pdf`);
    } catch (e) { UI.toast('PDF fehlgeschlagen: ' + e.message, 'err'); }
  },

        for (const [gruppe, label] of [['volk', 'je Volk'], ['stand', 'je Stand'], ['sorte', 'je Sorte'], ['jahr', 'je Jahr']]) {

      if (typ === 'behandlungen') {

      }
      const rows = await Reporting.finanzen();
      const { doc, y } = await this.newDoc('Report: Einnahmen & Ausgaben', 'je Jahr');
      this.table(doc, { head: ['Jahr', 'Einnahmen', 'Ausgaben', 'Saldo'], body: rows.map((r) => [r.jahr, U.fmtEur(r.ein), U.fmtEur(r.aus), U.fmtEur(r.ein - r.aus)]), startY: y });

  /* ---------- Komplettausdruck (Deckblatt, Inhaltsverzeichnis, alle Module) ---------- */
  async komplett() {
    try {
      UI.toast('Komplettausdruck wird erstellt …');
      const jsPDF = await this.lib();
      const imk = S.get('imkerei');
      // Querformat: viele Module (z. B. Königinnen mit 18 Spalten) sind sonst zu gequetscht
      const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'landscape' });
      const cx = doc.internal.pageSize.getWidth() / 2;
      // Deckblatt
      try { doc.addImage(await this.logoDataUrl(), 'PNG', cx - 22, 40, 44, 44); } catch (e) {}
      doc.setFont('helvetica', 'bold').setFontSize(26).setTextColor(38, 38, 43);
      doc.text(imk.name || 'Meine Imkerei', cx, 100, { align: 'center' });
      doc.setFont('helvetica', 'normal').setFontSize(12).setTextColor(110);
      doc.text('Komplettausdruck der Imkerei-Verwaltung', cx, 110, { align: 'center' });
      doc.text(`Stand: ${U.fmtDate(U.todayIso())}`, cx, 118, { align: 'center' });
      doc.setFontSize(9).setTextColor(150);
      doc.text([imk.strasse || '', [imk.plz, imk.ort].filter(Boolean).join(' '), imk.registriernummer ? 'Betriebs-Nr. ' + imk.registriernummer : ''].filter(Boolean).join(' · '), cx, 130, { align: 'center' });
      doc.addPage(); // Seite 2 = Inhaltsverzeichnis (wird am Ende gefüllt)
      const toc = [];
      const defs = await Xlsx.defs();
      const kapitel = ['staende', 'voelker', 'stockkarten', 'varroa', 'koeniginnen', 'zuchtserien', 'behandlungen', 'trachten', 'wanderungen', 'ernten', 'chargen', 'verkaeufe', 'fahrten', 'kassenbuch', 'kontakte', 'rechnungen', 'inventar', 'aufgaben'];
      for (const key of kapitel) {
        const def = defs[key];
        const rows = await def.rows();
        doc.addPage();
        toc.push({ titel: def.blatt, seite: doc.getNumberOfPages() });
        const y = await this.header(doc, def.blatt, `${rows.length} Einträge`);
        if (rows.length) {
          const head = Object.keys(rows[0]);
          const body = rows.map((r) => head.map((h) => { const v = r[h]; return v instanceof Date ? U.fmtDate(v.toISOString()) : (v ?? ''); }));
          this.table(doc, { head, body, startY: y });
        } else {
          doc.setFont('helvetica', 'italic').setFontSize(10).setTextColor(150);
          doc.text('Keine Einträge vorhanden.', 14, y + 4);
        }
      }
      // Inhaltsverzeichnis auf Seite 2 nachtragen
      doc.setPage(2);
      doc.setFont('helvetica', 'bold').setFontSize(18).setTextColor(38, 38, 43);
      doc.text('Inhaltsverzeichnis', 14, 30);
      doc.setFontSize(11);
      let ty = 44;
      for (const t of toc) {
        doc.setFont('helvetica', 'normal').setTextColor(60);
        doc.text(t.titel, 18, ty);
        doc.setTextColor(140);
        doc.text(String(t.seite), 190, ty, { align: 'right' });
        doc.setDrawColor(230, 222, 205).setLineWidth(0.2).line(18 + doc.getTextWidth(t.titel) + 3, ty - 1, 185, ty - 1);
        ty += 8;
      }
      this.finish(doc, `imkerbuch-komplett-${U.todayIso()}.pdf`);
    } catch (e) { console.error(e); UI.toast('Komplettausdruck fehlgeschlagen: ' + e.message, 'err'); }
  },
};

/* =====================================================================
   PDF AUSLESEN (pdf.js): Text extrahieren + Übernahme-Vorschläge
   ===================================================================== */
const PdfImport = {
  async read(file, outEl) {
    outEl.innerHTML = `<div class="small muted">PDF wird gelesen …</div>`;
    try {
      const gewinner = await U.loadScript(...CDN.pdfjs);
      // Worker vom selben CDN beziehen, das für die Hauptbibliothek funktioniert hat
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = gewinner.replace('pdf.min.js', 'pdf.worker.min.js');
      const pdf = await window.pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const content = await (await pdf.getPage(i)).getTextContent();
        text += content.items.map((it) => it.str).join(' ') + '\n';
      }
      const vorschlaege = this.parse(text);
      outEl.innerHTML = `
        <div class="field"><label>Extrahierter Text (${pdf.numPages} Seiten)</label><textarea class="inp" rows="7" readonly>${U.esc(text.trim().slice(0, 8000))}</textarea></div>
        ${vorschlaege.length ? `<h3 class="mb8">Erkannte Einträge (${vorschlaege.length})</h3>
          <div class="rows">${vorschlaege.map((v, i) => `<div class="row"><span class="r-ic" style="width:34px;height:34px">${icon(v.typ === 'behandlung' ? 'flask' : 'honig')}</span>
            <span class="r-main"><span class="r-title">${v.typ === 'behandlung' ? 'Behandlung' : 'Ernte'}: ${U.esc(v.stichwort)}</span>
            <span class="r-sub">${U.fmtDate(v.datum)} · „${U.esc(v.kontext.slice(0, 90))}…“</span></span>
            <button class="btn btn-sm btn-ghost" data-take="${i}">Übernehmen</button></div>`).join('')}</div>`
        : `<div class="hint">Keine Behandlungs- oder Ernteeinträge automatisch erkannt.</div>`}`;
      outEl.querySelectorAll('[data-take]').forEach((b) => b.onclick = () => {
        const v = vorschlaege[+b.dataset.take];
        if (v.typ === 'behandlung') Views.behandlungen.form({ datum: v.datum, mittel: v.stichwort, notiz: `Aus PDF übernommen: ${v.kontext.slice(0, 140)}` });
        else PdfImport.ernteQuickForm({ datum: v.datum, sorte: v.stichwort, notiz: `Aus PDF übernommen: ${v.kontext.slice(0, 140)}` });
      });
    } catch (e) { outEl.innerHTML = `<div class="banner danger">${icon('warn')} PDF konnte nicht gelesen werden: ${U.esc(e.message)}</div>`; }
  },
  /** einfache Heuristik: Datum + Stichwort im Umfeld */
  parse(text) {
    const BEHANDLUNG = ['Oxalsäure', 'Ameisensäure', 'Milchsäure', 'Thymol', 'Apiguard', 'VarroMed', 'Oxuvar', 'Oxybee', 'FormicPro', 'MAQS', 'Behandlung'];
    const ERNTE = ['Ernte', 'geschleudert', 'Schleuderung', 'Honigernte', 'Frühtracht', 'Sommertracht', 'Raps', 'Linde', 'Robinie', 'Waldhonig'];
    const out = [], seen = new Set();
    const re = /(\d{1,2})\.(\d{1,2})\.(\d{2,4})/g;
    let m;
    while ((m = re.exec(text)) !== null) {
      const kontext = text.slice(Math.max(0, m.index - 90), m.index + 90).replace(/\s+/g, ' ');
      let jahr = m[3].length === 2 ? '20' + m[3] : m[3];
      const iso = `${jahr}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
      for (const [typ, liste] of [['behandlung', BEHANDLUNG], ['ernte', ERNTE]]) {
        const hit = liste.find((w) => kontext.toLowerCase().includes(w.toLowerCase()));
        if (hit) { const key = typ + iso + hit; if (!seen.has(key)) { seen.add(key); out.push({ typ, datum: iso, stichwort: hit, kontext }); } }
      }
    }
    return out.slice(0, 20);
  },
  async ernteQuickForm(prefill) {
    const ziel = await zielFelder({}, 'Geerntet wurde');
    UI.formModal({
      title: 'Ernte übernehmen', wide: true,
      fields: [
        ...ziel,
        { key: 'datum', label: 'Erntedatum', type: 'date', required: true },
        { key: 'sorte', label: 'Honigsorte', type: 'suggest', options: await gelernteWerte(S.get('honigsorten'), 'ernten', 'sorte'), placeholder: 'optional – ggf. später vom Labor' },
        { key: 'mengeKg', label: 'Menge (kg)', type: 'number', required: true },
        { key: 'notiz', label: 'Notiz', type: 'textarea' },
      ],
      values: prefill,
      async onSave(v) {
        const zielId = zielIdAus(v);
        await DB.put('ernten', { zielTyp: v.zielTyp, zielId, datum: v.datum, produktart: 'Honig', sorte: v.sorte || '', mengeKg: v.mengeKg, wassergehalt: null, schleuderung: null, notiz: v.notiz });
        UI.toast('Ernte übernommen');
      },
    });
  },
};
