ircle cx="278" cy="47" r="2" fill="#fff" opacity=".85"/><text x="245" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#7a5a1e">Drohn</text><text x="245" y="105" text-anchor="middle" font-size="10.5" fill="#9a7c46">für die Paarung</text></g></svg>`, h: 'Drei Bewohner, drei Aufgaben', p: 'In jedem Volk leben drei Sorten Bienen: eine Königin, viele tausend Arbeiterinnen und im Sommer einige hundert Drohnen. Jede hat ihre klare Rolle.', note: 'Nur EINE Königin pro Volk – sie ist die Mutter aller anderen. In Spitzenzeiten legt sie bis zu 2.000 Eier am Tag, mehr als ihr eigenes Körpergewicht.' },
    { h: 'Die Arbeiterin wechselt den Beruf', p: 'Eine Arbeiterin macht im Lauf ihres Lebens fast alles – aber der Reihe nach: erst putzen, dann die Brut füttern (Ammenbiene), dann Waben bauen, dann am Eingang Wache halten, und ganz zuletzt fliegt sie als Sammlerin aus.', note: 'Im Sommer lebt eine Arbeiterin nur etwa 6 Wochen. Die „Winterbienen" dagegen leben mehrere Monate und bringen das Volk durch die kalte Zeit.' },
    { svg: `<svg viewBox="0 0 315 116" width="100%" style="max-height:150px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Entwicklung vom Ei über Larve und Puppe zur Biene"><g fill="none" stroke="#E9A21C" stroke-width="3" stroke-linejoin="round"><polygon points="75,48 60,74 30,74 15,48 30,22 60,22"/><polygon points="150,48 135,74 105,74 90,48 105,22 135,22"/><polygon points="225,48 210,74 180,74 165,48 180,22 210,22"/><polygon points="300,48 285,74 255,74 240,48 255,22 285,22"/></g><rect x="43" y="40" width="4.5" height="17" rx="2.2" fill="#4a3410"/><path d="M129 40 q-16 1 -15 15 q1 11 15 11" fill="none" stroke="#e6d7b4" stroke-width="7" stroke-linecap="round"/><polygon points="225,48 210,74 180,74 165,48 180,22 210,22" fill="#E9A21C" opacity=".85"/><ellipse cx="266" cy="49" rx="15" ry="9" fill="#E9A21C"/><g fill="#6b4d12"><ellipse cx="261" cy="49" rx="2.2" ry="8"/><ellipse cx="270" cy="49" rx="2.2" ry="8"/></g><circle cx="285" cy="47" r="7" fill="#4a3410"/><g text-anchor="middle" font-weight="bold" fill="#7a5a1e" font-size="12.5"><text x="45" y="92">Ei</text><text x="120" y="92">Larve</text><text x="195" y="92">Puppe</text><text x="270" y="92">Biene</text></g><g text-anchor="middle" fill="#9a7c46" font-size="10"><text x="45" y="107">Tag 1–3</text><text x="120" y="107">Tag 4–9</text><text x="195" y="107">verdeckelt</text><text x="270" y="107">Tag ~21</text></g></svg>`, h: 'Vom Ei zur Biene', p: 'Die Königin legt ein Ei in eine Wabenzelle. Daraus wird eine Made (Larve), die von den Ammenbienen gefüttert wird. Dann verdeckeln die Bienen die Zelle mit Wachs, die Larve verpuppt sich – und heraus schlüpft eine fertige Biene.', note: 'Eine Arbeiterin braucht dafür rund 21 Tage, die Königin nur 16, der Drohn 24. Merk dir „21 Tage" – das brauchst du später bei der Schwarmkontrolle wieder.' },
    { h: 'So verständigen sie sich', p: 'Findet eine Sammlerin eine gute Blütenquelle, „tanzt" sie im dunklen Stock: Mit dem berühmten Schwänzeltanz zeigt sie den anderen Richtung und Entfernung zur Tracht. Vieles läuft außerdem über Duftstoffe (Pheromone).', note: 'Auch die Königin „spricht" per Duft: Ihr Pheromon hält das ganze Volk zusammen. Fehlt es plötzlich, merken die Bienen schon nach Stunden, dass etwas nicht stimmt.' },
    { h: 'Warum dir das hilft', p: 'Wenn du das Volk als EIN Lebewesen begreifst, ergibt später fast jede Handlung von selbst Sinn: warum du ruhig und ohne Hektik arbeitest, warum eine gesunde Königin so wichtig ist und warum du nie einzelne Bienen, sondern immer das ganze Volk betrachtest.', note: 'Das war der wichtigste Grundstein. Ab jetzt wird es Schritt für Schritt praktischer.' },
  ] },
  { id: 3, titel: 'Ausrüstung & Beute', steps: [
    { svg: `<svg viewBox="0 0 170 196" width="100%" style="max-height:184px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Magazin-Bienenbeute auf einem Ständer"><ellipse cx="85" cy="188" rx="62" ry="7" fill="#000" opacity=".06"/><rect x="42" y="150" width="10" height="32" rx="2" fill="#8a6a3a"/><rect x="118" y="150" width="10" height="32" rx="2" fill="#8a6a3a"/><rect x="32" y="144" width="106" height="10" rx="2" fill="#9a7a48"/><rect x="40" y="130" width="90" height="16" rx="2" fill="#b98d4e"/><rect x="70" y="137" width="30" height="7" rx="3.5" fill="#2a1c0c"/><rect x="40" y="86" width="90" height="45" rx="3" fill="#cb9c56"/><rect x="40" y="41" width="90" height="45" rx="3" fill="#cb9c56"/><g fill="#a87f3e"><rect x="52" y="104" width="66" height="8" rx="2"/><rect x="52" y="59" width="66" height="8" rx="2"/></g><g stroke="#a67d3c" stroke-width="1" opacity=".45"><line x1="40" y1="97" x2="130" y2="97"/><line x1="40" y1="52" x2="130" y2="52"/></g><rect x="33" y="27" width="104" height="15" rx="3" fill="#c2c7cc"/><rect x="38" y="20" width="94" height="9" rx="2.5" fill="#dadee2"/><g fill="#E9A21C" stroke="#5a3f12" stroke-width=".6"><ellipse cx="60" cy="151" rx="3.2" ry="2.1"/><ellipse cx="108" cy="152" rx="3.2" ry="2.1"/><ellipse cx="86" cy="160" rx="3" ry="2"/></g></svg>`, h: 'Die Beute – das Zuhause der Bienen', p: 'Die „Beute" ist die Bienenwohnung. Meistens ist es ein Magazin: stapelbare Kästen (Zargen), oben ein Deckel mit Blechdach, unten ein Boden mit dem Flugloch, durch das die Bienen ein- und ausfliegen.', note: 'In jeder Zarge hängen Rähmchen nebeneinander wie in einem Hängeregister – die kannst du einzeln herausnehmen und anschauen.' },
    { h: 'Erst das System wählen', p: 'Beuten gibt es in verschiedenen Maßen – die bekanntesten sind Zander, Deutsch-Normal (DNM) und Dadant. Für Anfänger gilt eine einfache Regel: Nimm genau das System, das dein Pate oder dein Verein vor Ort nutzt.', note: 'Region schlägt Theorie: Gleiches Maß heißt, ihr könnt Waben und Ableger tauschen und euch gegenseitig helfen. Ein „besseres" System nützt wenig, wenn es in deiner Nähe niemand hat.' },
    { h: 'Rähmchen, Waben und Mittelwände', p: 'In die Zargen hängst du Holz-Rähmchen. Darin bauen die Bienen aus Wachs ihre Waben. Damit sie gerade und schnell bauen, gibst du eine „Mittelwand" als Vorlage hinein – eine dünne Wachsplatte mit vorgeprägtem Sechseck-Muster.', note: 'Unten im Volk ist meist die Brut, oben lagern die Bienen den Honig – deshalb setzt du später oben einen eigenen „Honigraum" auf.' },
    { h: 'Dein Werkzeug', p: 'Viel brauchst du nicht: einen Stockmeißel (zum Lösen der verklebten Teile), einen Smoker (etwas Rauch beruhigt die Bienen), einen Abkehrbesen und deine Schutzkleidung – Schleier, hellen geschlossenen Anzug und Handschuhe.', note: 'Schleier zuerst! Die Honigschleuder brauchst du erst im ersten Sommer – viele Vereine verleihen eine, du musst sie nicht gleich kaufen.' },
    { svg: `<svg viewBox="0 0 230 150" width="100%" style="max-height:160px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Guter Standort: sonnig, Hecke vor dem Flugloch"><rect x="0" y="122" width="230" height="28" fill="#cfe3b8" opacity=".55"/><circle cx="34" cy="30" r="15" fill="#F6C24E"/><g stroke="#F6C24E" stroke-width="3" stroke-linecap="round"><line x1="34" y1="6" x2="34" y2="0"/><line x1="15" y1="15" x2="10" y2="10"/><line x1="53" y1="15" x2="58" y2="10"/><line x1="15" y1="45" x2="10" y2="50"/></g><rect x="150" y="88" width="46" height="34" rx="2" fill="#cb9c56"/><rect x="150" y="72" width="46" height="18" rx="2" fill="#cb9c56"/><rect x="146" y="63" width="54" height="9" rx="2" fill="#c2c7cc"/><rect x="166" y="114" width="16" height="6" rx="3" fill="#2a1c0c"/><g fill="#7cae4d"><ellipse cx="72" cy="120" rx="26" ry="20"/><ellipse cx="98" cy="122" rx="22" ry="17"/><ellipse cx="52" cy="124" rx="18" ry="14"/></g><path d="M152 110 C122 102 98 86 80 72 C68 62 60 54 54 46" fill="none" stroke="#b07f32" stroke-width="2.4" stroke-dasharray="5 5" stroke-linecap="round"/><path d="M54 46 l9 3 l-3 -10 z" fill="#b07f32"/></svg>`, h: 'Der richtige Platz (Standort)', p: 'Bienen mögen es ruhig, sonnig bis halbschattig und windgeschützt. Ideal zeigt das Flugloch nach Südosten – dann weckt die Morgensonne die Bienen früh. Der Boden sollte trocken sein, und hinter der Beute brauchst du etwas Platz zum Arbeiten.', note: 'Rücksicht auf die Nachbarn: Stell eine Hecke oder einen Zaun kurz vor das Flugloch. Das zwingt die Bienen sofort nach oben – dann fliegen sie über Kopfhöhe hinweg statt durch den Garten.' },
    { h: 'Worauf du beim Kauf achtest', p: 'Kaufe lieber robust und regional gängig als möglichst billig. Gebrauchtes Holz nur, wenn die Herkunft klar und krankheitsfrei ist – Stichwort Amerikanische Faulbrut, deren Sporen im alten Wachs jahrelang überdauern.', note: 'Am besten gehst du die erste Bestellung mit deinem Paten durch. Das erspart dir teure Fehlkäufe und Doppel-Anschaffungen.' },
  ] },
  { id: 4, titel: 'Das Bienenjahr', steps: [
    { svg: `<svg viewBox="0 0 200 200" width="100%" style="max-height:196px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Das Bienenjahr als Rad mit vier Jahreszeiten"><path d="M100 100 L100 20 A80 80 0 0 1 180 100 Z" fill="#a7cf6b"/><path d="M100 100 L180 100 A80 80 0 0 1 100 180 Z" fill="#efb43e"/><path d="M100 100 L100 180 A80 80 0 0 1 20 100 Z" fill="#d08a3c"/><path d="M100 100 L20 100 A80 80 0 0 1 100 20 Z" fill="#96bcd9"/><g text-anchor="middle" font-weight="bold" fill="#39301c" font-size="13"><text x="139" y="60">Frühjahr</text><text x="139" y="140">Sommer</text><text x="61" y="140">Herbst</text><text x="61" y="60">Winter</text></g><g text-anchor="middle" fill="#4a3d22" font-size="10"><text x="139" y="74">Start</text><text x="139" y="154">Ernte</text><text x="61" y="154">Varroa</text><text x="61" y="74">Ruhe</text></g><circle cx="100" cy="100" r="24" fill="#FCF4E1" stroke="#c9a24a" stroke-width="2"/><text x="100" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a5a1e">Bienen-</text><text x="100" y="109" text-anchor="middle" font-size="10" font-weight="bold" fill="#7a5a1e">jahr</text></svg>`, h: 'Alles folgt den Jahreszeiten', p: 'Was du tust, richtet sich nach der Jahreszeit. Das ganze Bienenjahr dreht sich einmal im Kreis – dieses Rad ist dein roter Faden durchs Jahr.', note: 'Vier Phasen: Frühjahr = Start, Sommer = Schwarm & Ernte, Spätsommer/Herbst = Varroa & Füttern, Winter = Ruhe.' },
    { h: 'Frühjahr – das Volk wächst', p: 'Sobald es wärmer wird, legt die Königin wieder kräftig los und das Volk wächst schnell. Du machst die erste Durchsicht, kontrollierst das Futter und gibst dem Volk Platz zum Wachsen.', note: 'Jetzt beginnt die aktive Saison – ab hier bist du regelmäßig am Volk.' },
    { h: 'Frühsommer – Schwarm & Honig', p: 'Die Zeit der vollen Völker: Du kontrollierst etwa wöchentlich auf Schwarmzellen, verhinderst das Schwärmen und erntest zur Haupttracht deinen ersten Honig.', note: 'Die Schwarmkontrolle ist die wichtigste Arbeit dieser Wochen – dazu kommt später eine eigene Lektion.' },
    { h: 'Spätsommer – Weichen für den Winter', p: 'Direkt nach der letzten Ernte kommt das Wichtigste fürs Überleben: die Varroa-Behandlung und das Auffüttern mit Zuckersirup für den Winter.', note: 'Merksatz: „Die Einwinterung beginnt im August." Wer hier schläft, verliert das Volk im Winter.' },
    { h: 'Winter – Ruhe (fast)', p: 'Die Bienen ziehen sich zur Wintertraube zusammen und ruhen. Du störst nicht – nur eine Restentmilbung im brutfreien Dezember und ab und zu ein Blick von außen, ob alles steht.', note: 'Erfolg im ersten Jahr = „gesund überwintert", nicht Kilogramm Honig.' },
  ] },
  { id: 5, titel: 'Formalitäten & Recht', steps: [
    { svg: `<svg viewBox="0 0 150 176" width="100%" style="max-height:176px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anmelde-Checkliste: Veterinäramt, Tierseuchenkasse, Verein"><rect x="20" y="20" width="110" height="146" rx="8" fill="#b98d4e"/><rect x="30" y="30" width="90" height="128" rx="4" fill="#fcfaf4"/><rect x="55" y="12" width="40" height="18" rx="5" fill="#8a6a3a"/><rect x="40" y="48" width="15" height="15" rx="3" fill="#eaf4e2" stroke="#4C8A2E" stroke-width="2"/><path d="M43 55 l4 4 l6 -8" fill="none" stroke="#4C8A2E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="62" y="60" font-size="10.5" font-weight="bold" fill="#3a2c14">Veterinäramt</text><rect x="40" y="78" width="15" height="15" rx="3" fill="#eaf4e2" stroke="#4C8A2E" stroke-width="2"/><path d="M43 85 l4 4 l6 -8" fill="none" stroke="#4C8A2E" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/><text x="62" y="86" font-size="10.5" font-weight="bold" fill="#3a2c14">Tierseuchen-</text><text x="62" y="98" font-size="10.5" font-weight="bold" fill="#3a2c14">kasse</text><rect x="40" y="116" width="15" height="15" rx="3" fill="none" stroke="#b6ab97" stroke-width="2"/><text x="62" y="128" font-size="10.5" fill="#8B8478">Imkerverein</text><circle cx="104" cy="140" r="15" fill="#E9A21C" opacity=".92"/><path d="M104 130 l2.6 5.6 l6 .5 l-4.6 4 l1.4 6 l-5.4 -3.2 l-5.4 3.2 l1.4 -6 l-4.6 -4 l6 -.5 z" fill="#fff"/></svg>`, h: 'Anmelden ist Pflicht', p: 'Bevor die Bienen kommen: Melde deine Bienenhaltung beim Veterinäramt deiner Gemeinde an (kostenlos) und bei der Tierseuchenkasse deines Bundeslands.', note: 'Die Tierseuchenkasse gibt dir eine Registriernummer und meldet ans Veterinäramt weiter.' },
    { h: 'Das Veterinäramt', p: 'Melde deine Bienen beim Veterinäramt (Amtstierarzt) deines Landkreises an. Das ist eine reine Anzeige – kostenlos und meist mit einem kurzen Formular erledigt.', note: 'So weiß das Amt, wo Bienen stehen – wichtig, falls in deiner Region einmal eine Seuche auftaucht.' },
    { h: 'Die Tierseuchenkasse', p: 'Danach meldest du dich bei der Tierseuchenkasse deines Bundeslands an. Sie vergibt dir eine Registriernummer und leitet deine Anmeldung oft direkt ans Veterinäramt weiter.', note: 'Es fällt ein kleiner Pflichtbeitrag pro Volk und Jahr an – dafür gibt es im Seuchenfall Unterstützung. Deine Registriernummer trägst du später in ImkerBuch ein.' },
    { h: 'Verein & Versicherung', p: 'Eine Vereinsmitgliedschaft ist freiwillig, aber Gold wert: Schulung, ein Pate und meist eine Halter-Haftpflicht (falls doch einmal jemand gestochen wird) sind inklusive.', note: 'Über den Imkerverband bist du oft günstig mitversichert – frag im Verein einfach danach.' },
    { h: 'Kranke Bienen melden', p: 'Einige Bienenkrankheiten sind anzeigepflichtig – vor allem die Amerikanische Faulbrut (AFB). Hast du einen Verdacht, meldest du das dem Veterinäramt. Als Anfänger lernst du früh, worauf du achten musst.', note: 'AFB ist für Menschen völlig harmlos, für Bienenvölker aber gefährlich – daher die Meldepflicht.' },
    { h: 'Wenn du wandern willst', p: 'Möchtest du deine Völker später an einen anderen Ort bringen (etwa zur Rapsblüte), brauchst du dafür meist ein Gesundheitszeugnis vom Amtstierarzt. Für den festen Standort im ersten Jahr ist das noch kein Thema.', note: 'Erst einmal bleibt dein Volk einfach an seinem Platz stehen – Wandern kommt später.' },
  ] },
  { id: 6, titel: 'Dein erstes Volk', steps: [
    { svg: `<svg viewBox="0 0 180 150" width="100%" style="max-height:160px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dein erstes Volk zieht ein"><ellipse cx="92" cy="140" rx="55" ry="6" fill="#000" opacity=".06"/><rect x="57" y="60" width="70" height="34" rx="3" fill="#cb9c56"/><rect x="57" y="44" width="70" height="18" rx="3" fill="#cb9c56"/><rect x="51" y="34" width="82" height="11" rx="3" fill="#c2c7cc"/><g fill="#a87f3e"><rect x="66" y="72" width="52" height="7" rx="2"/></g><rect x="80" y="96" width="24" height="7" rx="3.5" fill="#2a1c0c"/><rect x="62" y="104" width="60" height="10" rx="2" fill="#b98d4e"/><g fill="#E9A21C" stroke="#5a3f12" stroke-width=".6"><ellipse cx="92" cy="110" rx="3.4" ry="2.2"/><ellipse cx="105" cy="109" rx="3" ry="2"/></g><path d="M22 60 C30 52 36 48 44 42" fill="none" stroke="#b07f32" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round"/><g transform="translate(46,40)" stroke="#5a3f12" stroke-width=".5"><ellipse cx="0" cy="0" rx="8" ry="5.2" fill="#E9A21C"/><g fill="#4a3410" stroke="none"><ellipse cx="-2.6" cy="0" rx="1.5" ry="4.6"/><ellipse cx="1.4" cy="0" rx="1.5" ry="4.6"/></g><circle cx="8" cy="-1.2" r="3.8" fill="#4a3410" stroke="none"/><ellipse cx="-1" cy="-6" rx="7" ry="3.4" fill="#dce9f6" fill-opacity=".7" stroke="none"/></g></svg>`, h: 'Starte mit einem Ableger', p: 'Am besten beginnst du mit einem Ableger – einem kleinen Jungvolk, meist vom Imkerpaten aus deinem Verein.', note: 'Ein Ableger ist ruhiger und leichter zu führen als ein großes Wirtschaftsvolk – ideal fürs erste Jahr.' },
    { h: 'Woher bekommst du es?', p: 'Am sichersten ist ein Ableger von deinem Imkerpaten oder aus dem Verein – von jemandem, der die Bienen kennt und dir gesunde, faulbrutfreie Völker gibt. Kaufe nicht blind irgendwo im Internet.', note: 'Achte auf dasselbe Beutensystem wie dein Pate (Zander, DNM oder Dadant) – dann passen später alle Waben zusammen.' },
    { h: 'Wann geht es los?', p: 'Die beste Startzeit ist der Frühsommer, etwa Mai oder Juni. Dann gibt es genug Tracht, der Ableger kann sich in Ruhe aufbauen und wird bis zum Winter stark genug.', note: 'So hat dein Volk den ganzen Sommer Zeit, sich für seinen ersten Winter fit zu machen.' },
    { h: 'Aufstellen und Ruhe geben', p: 'Stell den Ableger an seinen vorbereiteten Platz, richte das Flugloch aus und lass die Bienen erst einmal ankommen. In den ersten Tagen schaust du nur von außen zu, wie fleißig sie ein- und ausfliegen.', note: 'Weniger ist mehr: Jedes Öffnen stört das Volk. Am Anfang reicht der Blick aufs Flugloch.' },
    { h: 'Jetzt wird es echt', p: 'Zeit, dein erstes Volk anzulegen! In ImkerBuch gehört jedes Volk zu einem Bienenstand. Gib ihm einen Namen, den du wiedererkennst – danach wartet die Stockkarte auf deine erste Durchsicht.', note: 'Namen wie „Volk Anna" oder „Linde 1" merkst du dir leichter als bloße Nummern.' },
  ], aktion: { label: 'Jetzt dein erstes Volk anlegen', run(onDone) { openVolkForm(null, {}, onDone); } } },
  { id: 7, titel: 'Deine erste Durchsicht (Frühjahr)', steps: [
    { svg: `<svg viewBox="0 0 200 150" width="100%" style="max-height:160px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Durchsicht: Wabe mit Lupe"><g fill="#f0c24e" stroke="#c99a3e" stroke-width="2"><polygon points="70,68 55,94 25,94 10,68 25,42 55,42"/><polygon points="120,68 105,94 75,94 60,68 75,42 105,42"/><polygon points="95,112 80,138 50,138 35,112 50,86 80,86"/></g><g fill="#7a5a2a"><circle cx="40" cy="68" r="4.5"/><circle cx="65" cy="112" r="4.5"/></g><circle cx="145" cy="58" r="30" fill="#bcd7ea" fill-opacity=".35" stroke="#5a6b7a" stroke-width="6"/><line x1="167" y1="80" x2="190" y2="108" stroke="#5a6b7a" stroke-width="9" stroke-linecap="round"/></svg>`, h: 'Die erste Durchsicht im Frühjahr', p: 'Wenn es tagsüber mild ist (ab etwa 12–15 °C) und die Bienen fliegen, machst du die erste richtige Durchsicht. Du schaust: Lebt die Königin? Ist genug Futter da? Wächst das Volk?', note: 'Wähle einen ruhigen, sonnigen Tag um die Mittagszeit – dann sind viele Flugbienen unterwegs und der Stock ist entspannter.' },
    { h: 'Ruhig und mit Rauch', p: 'Gib vor dem Öffnen etwas Rauch ans Flugloch und unter den Deckel – das beruhigt die Bienen. Arbeite langsam und ohne Hektik und stell die Rähmchen behutsam zurück.', note: 'Ruhe ist deine wichtigste Fähigkeit. Schnelle, ruckartige Bewegungen machen die Bienen nervös.' },
    { h: 'Woran erkennst du: alles gut?', p: 'Ein gutes Zeichen ist frische Brut in allen Stadien – kleine Eier, Maden und verdeckelte Zellen. Findest du Eier, war die Königin in den letzten Tagen da, auch wenn du sie selbst nicht siehst.', note: 'Du musst die Königin nicht jedes Mal finden. Eier = Königin da. Das reicht als Beweis.' },
    { h: 'Was du festhältst', p: 'Notiere kurz: Volksstärke, Brutbild, Futtervorrat und ob dir etwas auffällt. Genau dafür ist die Stockkarte in ImkerBuch da – so siehst du über die Wochen, wie sich dein Volk entwickelt.', note: 'Regelmäßige kurze Notizen sind Gold wert – du erkennst Probleme früh und lernst dein Volk kennen.' },
    { h: 'Jetzt bist du dran', p: 'Öffne deine Völker in ImkerBuch und trag deine erste Durchsicht in die Stockkarte ein. Schon eine kurze Notiz zählt.', note: 'Tipp: Du findest die Stockkarte, indem du unter „Völker" auf dein Volk tippst.' },
  ], aktion: { label: 'Zur Stockkarte – Durchsicht eintragen', route: 'voelker' } },
  { id: 8, titel: 'Schwarmkontrolle & Ableger', steps: [
    { svg: `<svg viewBox="0 0 180 160" width="100%" style="max-height:160px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bienenschwarm an einem Ast"><path d="M15 32 q70 -14 150 8" fill="none" stroke="#8a6a3a" stroke-width="7" stroke-linecap="round"/><path d="M92 36 C58 40 54 92 78 122 C90 137 102 137 114 122 C138 92 126 40 92 36 Z" fill="#7a5a2a"/><g fill="#5a3f1c" opacity=".85"><circle cx="80" cy="60" r="3"/><circle cx="100" cy="66" r="3"/><circle cx="88" cy="84" r="3"/><circle cx="104" cy="94" r="3"/><circle cx="82" cy="104" r="3"/><circle cx="96" cy="116" r="3"/></g><g stroke="#5a3f12" stroke-width=".5"><g transform="translate(40,58)"><ellipse cx="0" cy="0" rx="6" ry="4" fill="#E9A21C"/><circle cx="6" cy="-1" r="2.8" fill="#4a3410" stroke="none"/><ellipse cx="-1" cy="-4.6" rx="5" ry="2.6" fill="#dce9f6" fill-opacity=".7" stroke="none"/></g><g transform="translate(150,52)"><ellipse cx="0" cy="0" rx="5.4" ry="3.6" fill="#E9A21C"/><circle cx="5.4" cy="-1" r="2.6" fill="#4a3410" stroke="none"/></g></g></svg>`, h: 'Warum Bienen schwärmen', p: 'Im Frühsommer wollen sich starke Völker vermehren: Die Hälfte zieht mit der alten Königin als Schwarm aus. Für die Natur toll – für dich meist ungewollt, denn du verlierst Bienen und Honig.', note: 'Schwärmen ist kein Fehler des Volkes, sondern sein natürlicher Trieb. Deine Aufgabe ist, ihm zuvorzukommen.' },
    { h: 'Weiselzellen – das Warnsignal', p: 'Bevor ein Volk schwärmt, bauen die Bienen „Weiselzellen" – große, an Erdnüsse erinnernde Zellen am Wabenrand, aus denen neue Königinnen schlüpfen. Findest du sie, wird es ernst.', note: 'In der Schwarmzeit (Mai/Juni) kontrollierst du etwa alle 7 Tage – so verpasst du keine Weiselzelle.' },
    { h: 'So kommst du dem Schwarm zuvor', p: 'Der klassische Weg: Du bildest selbst einen Ableger. Du entnimmst dem starken Volk eine Brutwabe mit ansitzenden Bienen und setzt sie in eine eigene kleine Beute. Das nimmt Druck aus dem Volk – und du hast ein neues Jungvolk.', note: 'Zwei Fliegen mit einer Klappe: Schwarm verhindert UND dein Bestand wächst.' },
    { h: 'So wird der Ableger ein Volk', p: 'Der Ableger zieht sich aus einer jungen Made selbst eine neue Königin heran oder bekommt eine zugesetzt. Nach ein paar Wochen ist ein eigenständiges kleines Volk daraus geworden.', note: 'Genau so vermehren Imker ihre Völker – ganz ohne Zukauf. Mach das im ersten Jahr am besten mit deinem Paten zusammen.' },
    { h: 'Leg deinen Ableger an', p: 'Hast du einen Ableger gebildet, leg ihn gleich als neues Volk in ImkerBuch an – so behältst du beide im Blick.', note: 'Gib ihm einen Namen, an dem du erkennst, dass es ein Ableger aus diesem Jahr ist.' },
  ], aktion: { label: 'Ableger als neues Volk anlegen', run(onDone) { openVolkForm(null, {}, onDone); } } },
  { id: 9, titel: 'Honigraum & erste Ernte', steps: [
    { svg: `<svg viewBox="0 0 170 168" width="100%" style="max-height:166px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Honigglas mit Honiglöffel"><rect x="52" y="56" width="62" height="82" rx="12" fill="#f0c24e"/><rect x="52" y="56" width="62" height="18" rx="9" fill="#f7d778"/><rect x="49" y="42" width="68" height="16" rx="5" fill="#b98d4e"/><ellipse cx="83" cy="66" rx="24" ry="4.5" fill="#fbe6a8" opacity=".7"/><rect x="64" y="92" width="40" height="30" rx="3" fill="#fff" opacity=".85"/><g stroke="#b98d4e" stroke-width="1"><line x1="70" y1="102" x2="98" y2="102"/><line x1="70" y1="110" x2="98" y2="110"/></g><rect x="128" y="16" width="6" height="48" rx="3" fill="#a87f3e"/><ellipse cx="131" cy="70" rx="10" ry="11" fill="#e0a72e"/><path d="M131 80 q-3 12 0 22 q3 -10 0 -22" fill="#e0a72e"/></svg>`, h: 'Wo der Honig entsteht', p: 'Wenn im Frühsommer viel Nektar hereinkommt, gibst du dem Volk oben einen eigenen „Honigraum" – eine zusätzliche Zarge. Unten bleibt die Brut, oben sammeln die Bienen den Honig.', note: 'Zwischen Brut- und Honigraum liegt meist ein „Absperrgitter" – es hält die Königin unten, damit im Honig keine Brut landet.' },
    { h: 'Wann ist der Honig reif?', p: 'Honig ist reif, wenn die Bienen die Zellen mit Wachs verdeckelt haben und der Wassergehalt niedrig ist. Faustregel: mindestens zwei Drittel der Wabe verdeckelt.', note: 'Zu früh geernteter Honig hat zu viel Wasser und kann gären. Lieber ein paar Tage warten.' },
    { h: 'Ernten & Schleudern', p: 'Du nimmst die vollen Honigwaben ab, entdeckelst sie und schleuderst den Honig in einer Schleuder heraus. Danach wird er gesiebt und ruht kurz, bevor du ihn abfüllst.', note: 'Die Schleuder musst du nicht kaufen – die meisten Vereine verleihen eine an ihre Mitglieder.' },
    { h: 'Abfüllen & Losnummer', p: 'Zum Schluss füllst du den Honig in saubere Gläser. Für den Verkauf brauchst du ein Etikett mit den Pflichtangaben und eine Losnummer – so ist jede Charge nachvollziehbar.', note: 'In ImkerBuch erfasst du jede Ernte als Charge mit Losnummer – das macht das Etikett später kinderleicht.' },
    { h: 'Erfasse deine Ernte', p: 'Öffne „Ernte und Abfüllung" und trag deine erste Ernte ein – Menge, Sorte und das Volk, von dem sie stammt.', note: 'So weißt du immer, wie viel Honig von welchem Volk kam.' },
  ], aktion: { label: 'Zu Ernte und Abfüllung – Ernte erfassen', route: 'honig' } },
  { id: 10, titel: 'Varroa & Bienengesundheit', steps: [
    { svg: `<svg viewBox="0 0 180 150" width="100%" style="max-height:150px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Varroamilbe als Warnsymbol"><circle cx="90" cy="72" r="54" fill="none" stroke="#B3362B" stroke-width="4" stroke-dasharray="9 8"/><g stroke="#5a2610" stroke-width="4" stroke-linecap="round"><line x1="60" y1="58" x2="38" y2="46"/><line x1="57" y1="72" x2="32" y2="70"/><line x1="60" y1="86" x2="38" y2="98"/><line x1="66" y1="94" x2="54" y2="110"/><line x1="120" y1="58" x2="142" y2="46"/><line x1="123" y1="72" x2="148" y2="70"/><line x1="120" y1="86" x2="142" y2="98"/><line x1="114" y1="94" x2="126" y2="110"/></g><ellipse cx="90" cy="72" rx="34" ry="26" fill="#8a3b18"/><ellipse cx="90" cy="67" rx="25" ry="15" fill="#a4551f" opacity=".7"/><ellipse cx="80" cy="62" rx="6" ry="4" fill="#fff" opacity=".25"/></svg>`, h: 'Der wichtigste Gegner: die Varroamilbe', p: 'Die Varroamilbe ist eine winzige, rotbraune Milbe, die auf den Bienen und in der Brut sitzt und sie schwächt. Unbehandelt geht ein Volk daran im Winter fast sicher ein.', note: 'Fast jedes Volk in Deutschland hat Varroa. Die Frage ist nicht ob, sondern wie stark – und wann du behandelst.' },
    { h: 'Zählen statt raten', p: 'Wie stark der Befall ist, siehst du am „natürlichen Milbenfall": Du legst eine Bodeneinlage (Windel) ein und zählst nach ein paar Tagen die heruntergefallenen Milben pro Tag.', note: 'Steigt der tägliche Milbenfall im Sommer stark an, wird es Zeit zu handeln. ImkerBuch hat dafür sogar eine Ampel.' },
    { h: 'Behandeln nach der Ernte', p: 'Die Hauptbehandlung kommt direkt nach der letzten Honigernte im Spätsommer – meist mit Ameisensäure. Wichtig: erst ernten, dann behandeln, damit keine Säure in den Honig kommt.', note: '„Die Einwinterung beginnt im August" – die Sommerbehandlung entscheidet über den Winter.' },
    { h: 'Die Winterbehandlung', p: 'Im brutfreien Dezember folgt die Restentmilbung, meist mit Oxalsäure. Weil dann keine Brut da ist, sitzen fast alle Milben auf den Bienen und werden gut erreicht.', note: 'Halte dich immer genau an die Anleitung des Mittels – Dosierung und Zeitpunkt sind entscheidend. Unter „Rechner" findest du den Behandlungsrechner für die genaue Dosierung.' },
    { h: 'Dokumentiere die Behandlung', p: 'Jede Behandlung musst du festhalten (das schreibt auch das Arzneimittelrecht vor). Öffne „Behandlungen" und trag ein, was du wann womit gemacht hast.', note: 'Sauber dokumentiert bist du auf der sicheren Seite – und siehst nächstes Jahr, was gewirkt hat.' },
  ], aktion: { label: 'Zu Behandlungen – Varroa dokumentieren', route: 'behandlungen' } },
  { id: 11, titel: 'Einfüttern & Einwintern', steps: [
    { svg: `<svg viewBox="0 0 170 168" width="100%" style="max-height:166px" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bienenstock im Winter mit Schnee"><rect x="0" y="140" width="170" height="28" fill="#e8eef2"/><ellipse cx="85" cy="146" rx="60" ry="8" fill="#f2f6f9"/><rect x="55" y="80" width="60" height="60" rx="3" fill="#cb9c56"/><rect x="55" y="62" width="60" height="20" rx="3" fill="#cb9c56"/><rect x="74" y="128" width="22" height="7" rx="3" fill="#2a1c0c"/><path d="M46 58 h78 v6 a6 6 0 0 1 -6 6 h-66 a6 6 0 0 1 -6 -6 z" fill="#eef3f7"/><ellipse cx="85" cy="58" rx="42" ry="8" fill="#fff"/><g fill="#bcd0e0"><circle cx="28" cy="40" r="3"/><circle cx="132" cy="30" r="3"/><circle cx="44" cy="96" r="2.6"/><circle cx="140" cy="104" r="2.6"/><circle cx="24" cy="120" r="2.6"/><circle cx="150" cy="70" r="2.6"/></g></svg>`, h: 'Warum du füttern musst', p: 'Du hast dem Volk den Honig genommen – jetzt gibst du ihm Winterfutter zurück. Nach der Varroabehandlung im Spätsommer fütterst du mit Zuckersirup oder Futterteig auf, damit das Volk genug Vorrat hat.', note: 'Ein durchschnittliches Volk braucht je nach Region grob 15–20 kg Winterfutter. Unter „Rechner" berechnen dir der Sirup-Mischer und der Winterfutter-Rechner die richtige Menge.' },
    { h: 'In Ruhe auffüttern', p: 'Du gibst das Futter portionsweise über ein Futtergeschirr oben auf. Die Bienen tragen es ein und lagern es als Vorrat. Das machst du im Spätsommer bis Frühherbst, solange es noch mild ist.', note: 'Nicht zu spät füttern: Bei kaltem Wetter nehmen die Bienen das Futter nicht mehr gut ab.' },
    { h: 'Winterfest machen', p: 'Zum Einwintern verkleinerst du das Flugloch und legst ein Mäusegitter davor – damit sich keine Maus im warmen Stock einnistet. Der Stand sollte trocken stehen.', note: 'Bienen kommen mit Kälte gut klar. Feuchtigkeit und Mäuse sind die größeren Feinde im Winter.' },
    { h: 'Ruhe bis zum Frühjahr', p: 'Jetzt heißt es: Ruhe geben. Die Bienen bilden eine Wintertraube und wärmen sich gegenseitig. Nur die Restentmilbung im Dezember und ein gelegentlicher Blick von außen stehen noch an.', note: 'Nicht öffnen! Jedes Öffnen im Winter kostet die Bienen wertvolle Wärme.' },
    { h: 'Halte die Fütterung fest', p: 'Trag ein, wie viel du gefüttert hast – so weißt du, dass dein Volk gut versorgt in den Winter geht. Öffne dazu deine Völker und erfasse die Fütterung.', note: 'Geschafft: Bringst du dein Volk gesund über den Winter, hast du dein wichtigstes Ziel im ersten Jahr erreicht.' },
  ], aktion: { label: 'Zur Fütterung – Menge eintragen', route: 'voelker' } },
];
const ISchule = {
  st() { return S.get('imkerschule') || { level: 'anfaenger', done: {}, onboarded: false }; },
  isDone(id) { return !!this.st().done[id]; },
  async setDone(id) { const s = this.st(); s.done = s.done || {}; s.done[id] = true; await S.set('imkerschule', s); },
  doneCount() { return LERN_KAPITEL.filter((k) => this.isDone(k.id)).length; },
  pct() { return Math.round(this.doneCount() / LERN_KAPITEL.length * 100); },
  nextOpen() { return LERN_KAPITEL.find((k) => !k.comingSoon && !this.isDone(k.id)); },
  async setLevel(lv) { const s = this.st(); s.level = lv; s.onboarded = true; await S.set('imkerschule', s); },
  levelLabel() { return { anfaenger: 'Anfänger', fortgeschritten: 'Fortgeschritten', erfahren: 'Erfahren' }[this.st().level] || 'Anfänger'; },
  levelFromAnswers(jahre, voelker) {
    if (jahre === '3+' || (jahre === '1-2' && voelker === '6+')) return 'erfahren';
    if (jahre === '1-2' || voelker === '2-5' || voelker === '6+') return 'fortgeschritten';
    return 'anfaenger';
  },
  skipableIds() {
    const lv = this.st().level;
    if (lv === 'erfahren') return [1, 2, 3, 4, 5];
    if (lv === 'fortgeschritten') return [1, 2, 3];
    return [];
  },
};

/* --- FAQ-Daten „Frag ein Thema" --- */
const FAQ_THEMEN = [
  { id: 'voelker', label: 'Völkerführung', icon: 'home', fragen: [
    { f: 'Wie oft muss ich nach meinen Bienen schauen?', a: 'In der aktiven Saison (April–August) alle 7–10 Tage, in der Schwarmzeit sogar wöchentlich. Im Winter lässt du die Bienen in Ruhe – nur ein gelegentlicher Blick von außen reicht.' },
    { f: 'Woran erkenne ich, ob die Königin noch da ist?', a: 'Wenn du frische Eier (winzige weiße Stifte am Zellboden) findest, war die Königin in den letzten 3 Tagen da. Du musst sie nicht jedes Mal sehen.' },
    { f: 'Was mache ich, wenn mein Volk weisellos ist?', a: 'Prüfe genau: Gibt es Nachschaffungszellen? Dann ziehen die Bienen sich selbst eine neue Königin. Wenn nicht, hänge eine Brutwabe mit jüngsten Eiern aus einem anderen Volk ein – daraus können sie eine Königin nachziehen.' },
    { f: 'Wie erkenne ich ein gesundes Brutbild?', a: 'Geschlossenes, gleichmäßig verdeckeltes Brutnest ohne Lücken, leicht gewölbte Deckel. Löchriges Brutbild (viele leere Zellen dazwischen) kann auf eine schwache Königin oder Krankheit hindeuten.' },
    { f: 'Wie viele Völker soll ich als Anfänger halten?', a: 'Starte mit 2–3 Völkern. Eines allein ist riskant: Geht etwas schief, kannst du z. B. keine Brutwabe zum Retten entnehmen. Mehr als 5 im ersten Jahr überfordern schnell.' },
    { f: 'Wie stark sollte ein Volk sein?', a: 'Im Sommer besetzt ein starkes Volk 10–12 Dadant-Waben oder 20+ Zander-Rähmchen (ca. 40.000–60.000 Bienen). Im Winter schrumpft es auf 10.000–15.000 Bienen.' },
    { f: 'Was ist „einengen" und wann mache ich das?', a: 'Einengen heißt, leere Waben am Rand entfernen und das Brutnest mit einem Schied begrenzen. Das hält das Volk warm und kompakt – sinnvoll im Frühjahr bei schwachen Völkern oder nach Ablegerbildung.' },
    { f: 'Was bedeutet „erweitern"?', a: 'Wenn das Brutnest voll besetzt ist und die Bienen keinen Platz mehr haben, setzt du eine neue Zarge auf (Brutraum erweitern) oder gibst den Honigraum. Zu spätes Erweitern fördert Schwarmstimmung.' },
    { f: 'Wann setze ich den Honigraum auf?', a: 'Sobald die Bienen im Frühjahr die oberen Rähmchen belagern und die Kirsche blüht (ca. April). Absperrgitter dazwischen, damit die Königin nicht nach oben wandert.' },
    { f: 'Was ist ein Absperrgitter?', a: 'Ein Gitter zwischen Brut- und Honigraum mit Schlitzen, durch die nur Arbeiterinnen (4,2 mm) passen, nicht die größere Königin. So bleibt der Honigraum brutfrei und der Honig sauber.' },
    { f: 'Wie vereinige ich zwei Völker?', a: 'Zeitungspapier-Methode: Lege eine Lage Zeitungspapier (mit kleinen Schlitzen) auf das untere Volk und setze das obere darauf. Die Bienen nagen sich langsam durch und gewöhnen sich aneinander. Die schwächere Königin vorher entfernen.' },
  ] },
  { id: 'schwarm', label: 'Schwarm', icon: 'merge', fragen: [
    { f: 'Woran erkenne ich Schwarmstimmung?', a: 'Die Bienen bauen Weiselzellen (große, erdnussförmige Zellen am Wabenrand). Das Volk wird unruhig, viele Bienen hängen als „Bart" vor dem Flugloch. Weiselzellen sind das sicherste Zeichen.' },
    { f: 'Was mache ich mit Weiselzellen?', a: 'Nicht einfach ausbrechen – das verzögert den Schwarm nur. Besser: Bilde einen Ableger (Brutwabe mit Bienen in eigene Beute), das nimmt den Schwarmtrieb. Oder nutze eine gezielte Schwarmvorwegnahme.' },
    { f: 'Wie bilde ich einen Ableger?', a: 'Entnimm 1–2 Brutwaben mit ansitzenden Bienen und einer offenen Weiselzelle oder jüngsten Eiern. Setze sie in eine neue kleine Beute am neuen Standort. Futterwabe dazu, Flugloch klein halten.' },
    { f: 'Mein Schwarm hängt im Baum – was tun?', a: 'Ruhe bewahren. Stelle einen offenen Kasten darunter, schüttle oder kehre den Schwarm hinein. Wenn die Königin drin ist, marschieren die anderen nach. Am Abend ans Flugloch fegen und verschließen.' },
    { f: 'Kann ich einen Schwarm verhindern?', a: 'Ganz verhindern ist schwierig – aber du kannst den Trieb durch Raum geben (rechtzeitig Honigraum aufsetzen), Ablegerbildung und regelmäßige Kontrolle stark reduzieren.' },
    { f: 'Was ist eine Schwarmvorwegnahme?', a: 'Du simulierst den Schwarm selbst: Die alte Königin kommt mit Flugbienen in eine neue Beute (= „Kunstschwarm"), das Restvolk zieht sich eine neue Königin. Kein unkontrollierter Schwarmabgang.' },
    { f: 'Wann ist Schwarmzeit?', a: 'Typisch Mai bis Ende Juni, manchmal bis Mitte Juli. Bei warmem Wetter und starken Völkern kann es aber auch früher losgehen. In der Schwarmzeit wöchentlich kontrollieren!' },
    { f: 'Was ist ein Vorschwarm vs. Nachschwarm?', a: 'Der Vorschwarm geht mit der alten, begatteten Königin ab – er ist groß und stark. Nachschwärme gehen mit jungen, unbegatteten Königinnen ab, sind kleiner und weniger überlebensfähig.' },
    { f: 'Darf ich einen fremden Schwarm einfangen?', a: 'Rechtlich: Ja, ein herrenloser Schwarm darf eingefangen werden. Aber: Erst den Besitzer ermitteln (Nachbar-Imker fragen), der hat 2 Tage Vorrang. Melde den Fund im Verein oder bei der Feuerwehr.' },
    { f: 'Wie vermeide ich Schwarmverluste in meiner Abwesenheit?', a: 'Vor dem Urlaub: Schwarmkontrolle, alle Weiselzellen brechen (Notlösung!), Raum geben, Ableger bilden. Idealerweise einen Imkerkollegen bitten, in der Schwarmzeit wöchentlich reinzuschauen.' },
  ] },
  { id: 'koenigin', label: 'Königin', icon: 'crown', fragen: [
    { f: 'Wie finde ich die Königin?', a: 'Suche auf den Brutwaben – sie ist länger als die Arbeiterinnen, hat einen längeren Hinterleib und bewegt sich ruhig. Tipp: Farblich markierte Königinnen (Zeichenplättchen) sind viel leichter zu finden.' },
    { f: 'Muss ich die Königin zeichnen?', a: 'Nicht zwingend, aber es hilft enorm: Du findest sie schneller und erkennst am Farbcode das Geburtsjahr (international genormte Farben im 5-Jahres-Zyklus).' },
    { f: 'Wie alt sollte eine Königin sein?', a: 'Am leistungsfähigsten ist sie in den ersten 2 Jahren. Ab dem 3. Jahr lässt die Legeleistung oft nach. Viele Imker wechseln die Königin alle 2 Jahre oder bei schlechtem Brutbild.' },
    { f: 'Wie setze ich eine neue Königin zu?', a: 'Im Zusetzkäfig: Die alte Königin entfernen, die neue im verschlossenen Käfig zwischen die Brutwaben hängen. Die Bienen nehmen ihren Duft auf und befreien sie nach 2–3 Tagen durch den Futterteig-Verschluss.' },
    { f: 'Welche Zeichenfarben gibt es?', a: 'Internationaler 5-Jahres-Zyklus: Weiß (1/6), Gelb (2/7), Rot (3/8), Grün (4/9), Blau (5/0). 2026 = Weiß. Ein Opalith-Plättchen wird auf den Thorax geklebt.' },
    { f: 'Was ist stille Umweiselung?', a: 'Die Bienen ersetzen ihre alte Königin ohne Schwarm: Sie ziehen eine neue heran, die alte wird abgestoßen. Kommt bei älteren oder nachlassenden Königinnen vor – leicht zu übersehen, weil kein Schwarm abgeht.' },
    { f: 'Wie erkenne ich eine gut begattete Königin?', a: 'Am gleichmäßigen Brutbild: geschlossene Flächen verdeckelter Brut, wenig Lücken, Eier einzeln in Zellen (nicht mehrere). Eine schlecht begattete Königin legt lückig oder wird buckelbrütig (nur Drohnen).' },
    { f: 'Was ist Buckelbrütigkeit?', a: 'Wenn eine unbegattete Königin oder legende Arbeiterinnen nur unbefruchtete Eier legen: Es schlüpfen nur Drohnen aus Arbeiterinnenzellen (die Deckel wölben sich „buckelig"). Das Volk ist verloren – auflösen oder umweiseln.' },
    { f: 'Woher bekomme ich eine neue Königin?', a: 'Vom Züchter im Imkerverein, von zertifizierten Königinnenzüchtern (AGT, Buckfast), oder selbst nachziehen aus deinem besten Volk. Achte auf Gesundheitszeugnis und regionale Anpassung.' },
    { f: 'Kann ich Königinnen selbst nachziehen?', a: 'Ja, ab dem 2.–3. Jahr: Umlarven aus deinem besten Volk (jüngste Larven <1 Tag) in Weiselnäpfchen, Starter/Finisher-Volk pflegt sie. Nach 12 Tagen schlüpft die junge Königin, dann Begattungsflug.' },
  ] },
  { id: 'varroa', label: 'Varroa & Gesundheit', icon: 'varroa', fragen: [
    { f: 'Wie zähle ich den Milbenfall?', a: 'Lege die Bodeneinlage (Windel/Diagnosegitter) ein und lass sie 3 Tage liegen. Zähle die Milben und teile durch die Anzahl Tage → Milben pro Tag. ImkerBuch rechnet das automatisch.' },
    { f: 'Ab wann muss ich behandeln?', a: 'Richtwert im Hochsommer: ab ca. 5–10 Milben/Tag wird es kritisch. Im Frühjahr und Herbst gelten niedrigere Schwellen. ImkerBuch zeigt dir eine Ampel (grün/gelb/rot).' },
    { f: 'Welche Behandlungsmittel gibt es?', a: 'Zugelassen in Deutschland: Ameisensäure 60 % (Sommer, nach Ernte – 200 ml im Verdunster oder MAQS-Streifen), Oxalsäure 3,5 % Träufeln oder Sublimation (Winter, brutfrei – 5 ml/Gasse bzw. 1 g/Zarge), Milchsäure 15 % (Sprühen für Ableger – 8 ml/Wabenseite). Thymol-Produkte (Apiguard, ApiLife Var) als Sommer-Alternative. Alle verschreibungspflichtig und dokumentationspflichtig.', link: 'rechner' },
    { f: 'Was ist Amerikanische Faulbrut (AFB)?', a: 'Eine anzeigepflichtige Bienenseuche: Die Larven sterben ab, es riecht faulig, eine braune, fadenziehende Masse bleibt in den Zellen. Verdacht sofort dem Veterinäramt melden! Für Menschen harmlos.' },
    { f: 'Was tun bei Kalkbrut?', a: 'Kalkbrut (weiße, harte „Mumien" auf dem Bodenbrett) ist meistens ein Zeichen für ein geschwächtes oder kaltes Volk. Königin prüfen, Volk einengen, warmer Standort. Geht oft von selbst vorbei.' },
    { f: 'Was ist die Puderzucker-Methode?', a: 'Eine Diagnosemethode: Ca. 300 Bienen (½ Tasse) in ein Glas schütteln, Puderzucker drauf, schütteln – Milben lösen sich und fallen durch ein Gitter. Die Bienen kommen unversehrt zurück ins Volk.' },
    { f: 'Was ist die Auswaschmethode?', a: 'Ähnlich wie Puderzucker, aber mit Alkohol oder Spülmittel-Wasser: ½ Tasse Bienen in ein Glas mit Lösung schütteln, Milben zählen. Genauer als Puderzucker, aber die Bienen überleben nicht.' },
    { f: 'Wie funktioniert die Ameisensäure-Behandlung?', a: 'Nach der letzten Ernte im Juli/August: 200 ml Ameisensäure 60 % im Langzeitverdunster (z. B. Nassenheider Professional) – verdunstet über 14 Tage bei 15–25 °C. Einziges Mittel, das auch in verdeckelter Brut wirkt. Alternative: MAQS-Streifen (2 Gelplatten pro Volk, 7 Tage). Flugloch ganz öffnen, nicht bei über 30 °C anwenden. Handschuhe und Schutzbrille tragen!', link: 'rechner' },
    { f: 'Wie funktioniert die Oxalsäure-Behandlung?', a: 'Im brutfreien Dezember: Träufeln – 3,5 % OS-Dihydrat-Lösung (Fertigpräparat z. B. Oxuvar oder selbst: 35 g OS + 500 ml Wasser + 500 g Zucker), 5 ml pro besetzte Wabengasse, max. 50 ml pro Volk. Oder: Verdampfung mit Gerät (z. B. Varrox) – 1 g OS-Dihydrat pro Zarge, Flugloch 10–15 Min. verschließen, Atemschutz tragen! Nur 1× pro Winter. Wirksamkeit ca. 95 % bei Brutfreiheit.', link: 'rechner' },
    { f: 'Was ist Nosemose?', a: 'Eine Darmkrankheit durch den Einzeller Nosema. Zeichen: Kotflecken am Flugloch im Frühjahr, aufgeblähte Hinterleiber, flugunfähige Bienen. Vorbeugen: Starke Völker, frische Waben, nicht zu feucht überwintern.' },
    { f: 'Was sind Varroatoleranz und VSH?', a: 'Einige Bienenlinien (z. B. VSH = Varroa Sensitive Hygiene) erkennen befallene Zellen und räumen sie aus. Langfristiges Zuchtziel – aber aktuell kein Ersatz für die Behandlung.' },
  ] },
  { id: 'honig', label: 'Honig & Ernte', icon: 'honig', fragen: [
    { f: 'Wann ist der Honig reif?', a: 'Wenn mindestens 2/3 der Zellen verdeckelt sind und der Wassergehalt unter 18 % liegt (Refraktometer). Zu feuchter Honig kann gären.' },
    { f: 'Wie schleudere ich Honig?', a: 'Waben entdeckeln (Entdeckelungsgabel oder -messer), in die Schleuder stellen, erst langsam, dann schneller drehen. Honig läuft unten durch das Sieb in den Eimer.' },
    { f: 'Brauche ich ein Refraktometer?', a: 'Dringend empfohlen. Es kostet ca. 20–30 € und zeigt dir den Wassergehalt. Unter 18 % ist Pflicht für DIB-Honig, unter 20 % für Verkauf allgemein.' },
    { f: 'Was muss aufs Etikett?', a: 'Pflichtangaben: „Honig" (Sorte optional), Nettofüllmenge (g), Mindesthaltbarkeitsdatum, Name und Anschrift des Imkers, Losnummer, Herkunftsland „Deutscher Honig".' },
    { f: 'Wie lagere ich Honig richtig?', a: 'Dunkel, trocken, kühl (10–18 °C) in sauberen Gläsern. Honig ist praktisch unbegrenzt haltbar – aber Licht und Wärme zerstören Enzyme und Aroma. MHD üblicherweise 2 Jahre.' },
    { f: 'Was ist Cremehonig?', a: 'Fein gerührter Honig, der durch regelmäßiges Rühren während der Kristallisation eine cremige, streichfähige Konsistenz bekommt. Gleicher Honig, nur feiner kristallisiert – kein Zusatzstoff.' },
    { f: 'Warum kristallisiert mein Honig?', a: 'Das ist natürlich und ein Qualitätsmerkmal! Honig mit hohem Traubenzuckeranteil (z. B. Raps) kristallisiert schnell, Waldhonig langsam. Durch sanftes Erwärmen (max. 40 °C) wird er wieder flüssig.' },
    { f: 'Was ist der DIB-Einheitsdeckel?', a: 'Das grüne Imker-Honigglas des Deutschen Imkerbunds. Nur DIB-Mitglieder dürfen es nutzen. Vorteil: Wiedererkennungswert, strenge Qualitätsregeln (max. 18 % Wasser). Nachteil: teurer, mehr Auflagen.' },
    { f: 'Wie entdeckele ich richtig?', a: 'Mit der Entdeckelungsgabel von unten nach oben kratzen oder mit dem heißen Entdeckelungsmesser die Deckel abschneiden. Über einem Entdeckelungsgeschirr arbeiten – das Wachs abtropfen lassen.' },
    { f: 'Darf ich meinen Honig erwärmen?', a: 'Ja, aber vorsichtig: Maximal 40 °C, sonst gehen wertvolle Enzyme (Invertase, Diastase) kaputt. Honig nie in der Mikrowelle oder im kochenden Wasserbad erhitzen. DIB erlaubt max. 40 °C.' },

  { id: 'fuetterung', label: 'Fütterung', icon: 'flask', fragen: [
    { f: 'Wann muss ich füttern?', a: 'Nach der letzten Honigernte im Spätsommer (August/September). Das Volk braucht Wintervorrat – du fütterst auf, was du entnommen hast. Auch Ableger brauchen manchmal Futter.' },

    { f: 'Wie viel braucht ein Volk?', a: 'Je nach Region 15–20 kg Wintervorrat. 1 L Sirup (3:2) wiegt ca. 1,27 kg und ergibt nach Einlagerung ca. 1 kg Futter. Für 15 kg brauchst du also ca. 12–15 L Sirup. Wiege die Beute: Zander (2 Zargen) eingewintert ca. 30–35 kg, Dadant ca. 32–38 kg. Zu wenig Futter = häufigste Ursache für Winterverluste!', link: 'rechner' },
    { f: 'Woran erkenne ich Futtermangel?', a: 'Wenig verdeckelte Honig-/Futterzellen auf den Randwaben, leichte Beute, Bienen wirken unruhig. Im Extremfall findest du verhungerte Bienen mit dem Kopf in leeren Zellen.' },
    { f: 'Was ist Räuberei?', a: 'Wenn fremde Bienen versuchen, Futter aus deiner Beute zu stehlen – oft durch den Geruch von offenem Sirup ausgelöst. Zeichen: hektisches Fliegen, Kämpfe am Flugloch. Sofort Flugloch verengen und abends füttern!' },
    { f: 'Wie mische ich Zuckerlösung an?', a: 'Herbstfütterung 3:2 (dick): 3 kg Zucker + 2 L warmes Wasser = ca. 4 L Sirup. Für 10 L: 7,5 kg Zucker + 5 L Wasser. Zucker einrieseln lassen und rühren bis gelöst. Lauwarm geben, nie kochend. Reizfütterung im Frühjahr: 1:1 (gleiche Teile, dünn). Alternativ fertigen Invertzuckersirup (Apiinvert, Ambrosia) – gleich gebrauchsfertig.', link: 'rechner' },
    { f: 'Was ist Futterteig und wann nutze ich ihn?', a: 'Eine feste Zucker-Honig-Masse, die direkt auf die Rähmchen gelegt wird. Für Notfütterung im zeitigen Frühjahr oder beim Zusetzen einer Königin im Käfig. Wird langsamer abgenommen als Sirup.' },
    { f: 'Soll ich flüssig oder fest füttern?', a: 'Herbstauffütterung: Flüssig (Sirup) – wird schnell abgenommen und eingelagert. Notfütterung im Frühjahr: Fest (Futterteig) – kein Risiko von Räuberei, funktioniert auch bei Kälte.' },
    { f: 'Kann ich zu viel füttern?', a: 'Ja: Wenn das gesamte Brutnest mit Futter vollgetragen wird, hat die Königin keinen Platz mehr zum Legen. Im Herbst also dosiert füttern und wiegen, nicht blindlings auffüllen.' },

  { id: 'winter', label: 'Überwinterung', icon: 'wetter', fragen: [
    { f: 'Wann wintern die Bienen ein?', a: 'Ab etwa Oktober bilden sie die Wintertraube. Die Aktivität nimmt ab, die Königin stoppt die Eiablage. Die „Winterbienen" (langlebiger, mehr Fettpolster) übernehmen.' },

    { f: 'Was ist die Winterbehandlung?', a: 'Im brutfreien Dezember träufelst oder verdampfst du Oxalsäure – die Restentmilbung gegen Varroa. Weil keine Brut da ist, sitzen fast alle Milben auf den Bienen und werden erreicht.' },
    { f: 'Was mache ich bei Totenfall im Winter?', a: 'Ein schmaler Streifen toter Bienen auf dem Bodenbrett ist normal (natürlicher Totenfall). Beunruhigend: Massenhaft tote Bienen, nasser Bodenbrett oder Kotflecken am Flugloch.' },
    { f: 'Was sind Winterbienen?', a: 'Bienen, die ab September schlüpfen. Sie haben größere Fettpolster, mehr Speicherprotein (Vitellogenin) und leben 4–6 Monate statt 6 Wochen. Sie halten das Volk über den Winter am Leben.' },
    { f: 'Wie schütze ich vor Spechten und Mäusen?', a: 'Mäusegitter (Lochblech, 8 mm) vor das Flugloch – ab Oktober. Gegen Spechte: Netz oder Styroporplatten um die Beute. Mäuse bauen Nester im warmen Stock und zerstören Waben.' },
    { f: 'Brauche ich eine Isolierung im Winter?', a: 'Meistens nicht – ein gesundes Volk hält sich selbst warm (Wintertraube, 35 °C Kern). Wichtiger: Zugluft vermeiden, Kondenswasser-Abfluss sichern. In extremen Lagen kann eine leichte Isolierung helfen.' },
    { f: 'Wann beginnt der Reinigungsflug?', a: 'An den ersten warmen Tagen im Februar/März (ab ca. 10 °C) fliegen die Bienen aus, um ihren Darm zu entleeren. Ein gutes Zeichen: Volk hat überlebt! Danach kann man vorsichtig den ersten Blick wagen.' },
    { f: 'Was mache ich, wenn ein Volk tot ist?', a: 'Nicht sofort räumen: Schau dir das Bild an – wo sitzen die toten Bienen, wie sehen die Waben aus? Fotos machen. Häufigste Ursachen: Varroa (verkrüppelte Bienen/Flügel), Futtermangel (Köpfe in leeren Zellen), Königinnenverlust.' },

  { id: 'ausruestung', label: 'Ausrüstung', icon: 'gear', fragen: [
    { f: 'Was brauche ich zum Start?', a: 'Mindestens: 1–2 Beuten (Zargen + Boden + Deckel), Rähmchen + Mittelwände, Stockmeißel, Smoker, Abkehrbesen, Imkerschleier und helle Schutzkleidung.' },
    { f: 'Zander, DNM oder Dadant?', a: 'Alle funktionieren. Nimm das Maß, das dein Pate und dein Verein nutzen – dann könnt ihr Waben und Ableger tauschen. Region schlägt Theorie.' },

    { f: 'Handschuhe tragen oder nicht?', a: 'Anfänger: Ja, das gibt Sicherheit. Erfahrene arbeiten oft ohne – man spürt die Bienen besser und arbeitet feiner. Latexhandschuhe sind ein Mittelweg.' },

    { f: 'Was ist ein Stockmeißel?', a: 'DAS Werkzeug des Imkers: Ein flacher Metallhebel zum Lockern verkitteter Rähmchen, Abheben des Deckels und Abkratzen von Wachsbrücken. Ohne Stockmeißel geht nichts – immer griffbereit haben.' },
    { f: 'Wie benutze ich den Smoker richtig?', a: 'Brennmaterial (Holzspäne, Eierpappe, Smoker-Pellets) anzünden, langsam pumpen bis gleichmäßiger, kühler Rauch kommt. 2–3 Rauchstöße ins Flugloch oder von oben. Nie heißen Rauch direkt auf die Bienen!' },
    { f: 'Welche Schutzkleidung brauche ich?', a: 'Mindestens: Imkerschleier (Gesichtsschutz). Ideal: helle, langärmlige Kleidung, Gummistiefel (Hosenbeine drüber). Keine dunkle oder wollige Kleidung – das macht die Bienen aggressiv.' },
    { f: 'Was sind Mittelwände?', a: 'Wachsplatten mit vorgeprägtem Zellmuster, die du in die Rähmchen einlötest. Die Bienen bauen darauf ihre Waben aus. Kaufe nur rückstandsfreies Wachs (zertifiziert) oder recycele eigenes Wachs.' },
    { f: 'Wie löte ich Mittelwände ein?', a: 'Drähte im Rähmchen spannen (4 waagerechte Drähte), Mittelwand anlegen, mit einem Einlöttrafo oder Akku den Draht erhitzen – er schmilzt ins Wachs und fixiert die Mittelwand. Nicht zu heiß, sonst schmilzt die ganze Platte.' },

  { id: 'recht', label: 'Recht & Meldepflicht', icon: 'meldung', fragen: [

    { f: 'Was ist die Tierseuchenkasse?', a: 'Sie versichert dich im Seuchenfall (z. B. Faulbrut-Sperrgebiet) und gibt dir eine Registriernummer. Der Beitrag beträgt je nach Bundesland wenige Euro pro Volk.' },
    { f: 'Darf ich Honig einfach so verkaufen?', a: 'Kleine Mengen direkt an Endverbraucher (Haustürverkauf) ja. Aber: Etikett mit Pflichtangaben, Lebensmittelhygiene, eventuell Gewerbeanmeldung bei regelmäßigem Verkauf. Als § 24-Pauschallandwirt gelten besondere Steuerregeln.' },

    { f: 'Wann ist der beste Zeitpunkt für Ableger?', a: 'Mai bis Anfang Juli – dann ist die Tracht gut, die Völker stark, und der Ableger hat genug Zeit, sich bis zum Winter aufzubauen.' },
    { f: 'Was ist der Unterschied zwischen Nachschaffung und Schwarmzelle?', a: 'Schwarmzellen bauen die Bienen am Wabenrand, wenn sie schwärmen wollen (Vermehrungstrieb). Nachschaffungszellen bauen sie mitten in der Wabe, wenn die Königin fehlt (Notfall-Rettung).' },
    { f: 'Lohnt sich Zucht für Anfänger?', a: 'Im ersten Jahr nicht – lerne erst die Grundlagen. Ab dem 2.–3. Jahr kannst du gezielt von deinen besten Völkern (sanftmütig, ertragreich, schwarmträge) nachziehen.' },

  'faulbrut': ['afb', 'amerikanische faulbrut'],

function faqSuche(query) {
  const q = query.toLowerCase().trim();
  if (!q) return [];
  const tokens = q.split(/\s+/);
  const expanded = new Set(tokens);
  for (const t of tokens) {
    for (const [key, syns] of Object.entries(FAQ_SYNONYME)) {
      if (key.includes(t) || syns.some((s) => s.includes(t))) {
        expanded.add(key);
        syns.forEach((s) => expanded.add(s));
      }
    }
  }
  const results = [];
  for (const thema of FAQ_THEMEN) {
    for (const fq of thema.fragen) {
      const text = (fq.f + ' ' + fq.a).toLowerCase();
      if ([...expanded].some((e) => text.includes(e))) {
        results.push({ thema, f: fq.f, a: fq.a, link: fq.link });
      }
    }
  }
  return results;
}

async function jitEmpfehlungen() {
  const monat = new Date().getMonth() + 1;
  const tips = [];
  const saisonTipp = SAISON_EMPFEHLUNGEN.find((e) => e.monate.includes(monat));
  if (saisonTipp) tips.push({ typ: 'saison', ...saisonTipp });
  try {
    const varroas = await DB.getAll('varroa');
    const voelker = await DB.getAll('voelker');
    const aktive = voelker.filter((v) => v.status === 'aktiv');
    for (const v of aktive) {
      const letzte = U.sortBy(varroas.filter((x) => x.volkId === v.id), (x) => x.datum, true)[0];
      if (!letzte) continue;
      const m = varroaMetrik(letzte);
      if (m.ampel.stufe === 'rot') {
        tips.push({ typ: 'varroa', titel: `Varroa-Befall hoch bei „${v.name}"`, text: `${m.wert} Milben${m.einheit} – jetzt behandeln.`, kapitelId: 10, icon: 'alert-triangle', danger: true });
      }
    }
    if (aktive.length > 0 && [8, 9].includes(monat)) {
      const fuetterungen = await DB.getAll('fuetterungen');
      const diesesSaison = fuetterungen.filter((f) => { const m = +(f.datum || '').slice(5, 7); return m >= 7 && m <= 9 && (f.datum || '').slice(0, 4) === String(new Date().getFullYear()); });
      if (!diesesSaison.length) {
        tips.push({ typ: 'fuetterung', titel: 'Noch keine Auffütterung eingetragen', text: 'Hast du nach der Ernte schon gefüttert? Trag die Fütterung ein, damit du den Überblick behältst.', kapitelId: 11, icon: 'flask' });
      }
    }
  } catch (_) {}
  return tips;
}

    /* Sicherung */
    $('#imp-file').onchange = (e) => { if (e.target.files[0]) Backup.importFile(e.target.files[0]); e.target.value = ''; };
    main.addEventListener('click', (e) => { const b = e.target.closest('[data-snap]'); if (b) Backup.restoreSnapshot(b.dataset.snap); });
    $('#snap-now').onclick = async () => { await Backup.snapshotInternal('manuell'); UI.toast('Snapshot angelegt'); renderRoute(); };
    const saveFeatures = async () => { await S.set('features', f); };
    $('#ab-aktiv').onchange = async (e) => { f.autoBackup.aktiv = e.target.checked; await saveFeatures(); renderRoute(); };
    $('#ab-intervall').onchange = async (e) => { f.autoBackup.intervall = e.target.value; await saveFeatures(); };
    $('#ab-dir').onclick = async () => { if (await Backup.chooseDir()) renderRoute(); };
    $('#ab-frage').onchange = async (e) => { f.backupBeimSchliessen = e.target.checked; await saveFeatures(); };

    /* Profil / Imkerei */
    $('#edit-profil').onclick = () => UI.formModal({
      title: 'Profil', fields: [{ key: 'vorname', label: 'Vorname', required: true }], values: profil,
      async onSave(v) { await S.set('profil', v); UI.toast('Gespeichert'); renderRoute(); },
    });
    $('#edit-imkerei').onclick = () => UI.formModal({
      title: 'Imkereidaten', wide: true,
      fields: [
        { key: 'name', label: 'Name der Imkerei' }, { key: 'strasse', label: 'Straße & Nr.' },
        { key: 'plz', label: 'PLZ' }, { key: 'ort', label: 'Ort' },
        { key: 'telefon', label: 'Telefon' }, { key: 'email', label: 'E-Mail' },
        { key: 'registriernummer', label: 'Landwirtschaftliche Betriebsnummer' },
        { key: 'tskPflicht', label: 'Meldepflicht Tierseuchenkasse (TSK)?', type: 'select', default: 'nein', options: [{ v: 'nein', l: 'Nein' }, { v: 'ja', l: 'Ja' }] },
        { key: 'tskNummer', label: 'TSK-/Melde-Nummer', showIf: (f) => f.tskPflicht === 'ja', hint: 'Erscheint auf der Tierseuchenkassen-Meldung.' },
        { key: '_bioT', type: 'static', html: '<h3 class="mt8 mb8">Bio-Zertifizierung</h3>' },
        { key: 'bio', label: 'Bio-Imkerei?', type: 'select', default: 'nein', options: [{ v: 'nein', l: 'Nein' }, { v: 'ja', l: 'Ja' }] },
        { key: 'bioKontrollstelle', label: 'Öko-Kontrollstelle', type: 'suggest', options: KONTROLLSTELLEN, placeholder: 'DE-ÖKO-… auswählen oder eintippen', hint: 'Deine Kontrollstelle – erscheint als DE-ÖKO-Code auf dem Bio-Etikett.', showIf: (f) => f.bio === 'ja' },
        { key: 'bioVerbandJN', label: 'Verbandszugehörigkeit?', type: 'select', default: 'nein', options: [{ v: 'nein', l: 'Nein – nur EU-Bio' }, { v: 'ja', l: 'Ja' }], showIf: (f) => f.bio === 'ja' },
        { key: 'bioVerband', label: 'Verband / Verbände (Mehrfachauswahl)', type: 'multicheck', options: BIO_VERBAENDE.map((v) => ({ v, l: v })), showIf: (f) => f.bio === 'ja' && f.bioVerbandJN === 'ja' },
        { key: '_euhint', type: 'static', html: '<div class="hint">Ohne Verbandszugehörigkeit gilt automatisch das <b>EU-Bio-Siegel</b>.</div>', showIf: (f) => f.bio === 'ja' && f.bioVerbandJN !== 'ja' },
      ],
      values: imk,
      async onSave(v) { await S.set('imkerei', Object.assign({}, imk, v)); UI.toast('Gespeichert'); renderRoute(); },
    });

    /* Logo */
    $('#logo-file').onchange = async (e) => {
      const file = e.target.files[0]; if (!file) return;
      try {
        let dataUrl;
        if (file.type === 'image/svg+xml') dataUrl = await U.blobToDataURL(file);
        else dataUrl = await U.blobToDataURL(await U.resizeImage(file, 512, 0.9));
        await S.set('logo', dataUrl);
        UI.toast('Logo gespeichert'); applyHeaderLogo(); renderRoute();
      } catch (err) { UI.toast('Logo konnte nicht verarbeitet werden: ' + err.message, 'err'); }
    };
    const ld = $('#logo-del');
    if (ld) ld.onclick = async () => { await S.set('logo', null); await S.set('logoImHeader', false); UI.toast('Logo entfernt'); applyHeaderLogo(); renderRoute(); };

/** Wandelt die Karten der Einstellungen in aufklappbare Kacheln um (Accordion).
    Der Zustand (welche offen sind) überlebt ein Neu-Rendern über Views.einstellungen._offen. */
Views.einstellungen._offen = Views.einstellungen._offen || {};
function macheEinstellungenAufklappbar(main) {
  const offen = Views.einstellungen._offen;
  $$('.card', main).forEach((card, i) => {
    const kopf = card.querySelector('.card-title');
    const h2 = kopf && kopf.querySelector('h2');
    if (!kopf || !h2) return;
    const key = h2.textContent.trim() || ('karte-' + i);
    // Alles nach dem Titel in einen einklappbaren Körper verschieben
    const body = document.createElement('div');
    body.className = 'set-body';
    while (kopf.nextSibling) body.appendChild(kopf.nextSibling);
    card.appendChild(body);
    kopf.classList.add('set-head');
    kopf.insertAdjacentHTML('beforeend', '<span class="set-chev">▶</span>');
    const auf = !!offen[key];
    body.style.display = auf ? '' : 'none';
    kopf.querySelector('.set-chev').textContent = auf ? '▼' : '▶';
    kopf.addEventListener('click', (e) => {
      if (e.target.closest('button, a, input, select, label, textarea')) return; // Bedienelemente im Kopf nicht als Klapp-Klick werten
      const jetztAuf = body.style.display === 'none';
      body.style.display = jetztAuf ? '' : 'none';
      kopf.querySelector('.set-chev').textContent = jetztAuf ? '▼' : '▶';
      offen[key] = jetztAuf;
    });
  });
}

/** Einmalige Migration: „Rähmchenmaß“ ist abgeschafft und geht im Beutentyp auf.
    Völker ohne Beutentyp erben den alten Wert, damit keine Info verloren geht. */
async function migriereRaehmchenmass() {
  if (S.get('raehmchenmassMigriert')) return;
  for (const v of await DB.getAll('voelker')) {
    if (!('raehmchenmass' in v)) continue;
    if (!v.beutentyp && v.raehmchenmass) v.beutentyp = v.raehmchenmass;
    delete v.raehmchenmass;
    await DB.put('voelker', v);
  }
  await S.set('raehmchenmassMigriert', true);
}

/** Einmalige Migration: alte Charge (Glasgröße + Anzahl + Bestand + Abfülldatum) wird
    aufgeteilt in eine reine Los-Charge (Gesamtmenge kg) + eine Abfüllung. Verkäufe und
    Rechnungs-Positionen wandern von chargeId auf abfuellungId. Keine Daten gehen verloren. */
async function migriereChargenAbfuellung() {
  if (S.get('abfuellungMigriert')) return;
  const map = {}; // alte chargeId -> neue abfuellungId
  for (const c of await DB.getAll('chargen')) {
    if (!('glasGroesseG' in c) && !('anzahlGlaeser' in c) && !('bestandGlaeser' in c)) continue; // bereits neu
    const gebindeG = c.glasGroesseG || 500;
    const anzahl = Math.round(c.anzahlGlaeser || 0);
    const bestand = (c.bestandGlaeser != null) ? c.bestandGlaeser : anzahl;
    if (anzahl > 0) {
      const a = await DB.put('abfuellungen', { chargeId: c.id, datum: c.abfuelldatum || U.todayIso(), gebindeG, anzahl, bestand });
      map[c.id] = a.id;
    }
    c.mengeKg = Math.round(anzahl * gebindeG / 1000 * 1000) / 1000;
    delete c.glasGroesseG; delete c.anzahlGlaeser; delete c.bestandGlaeser; delete c.abfuelldatum; delete c.verkaufspreis;
    await DB.put('chargen', c);
  }
  for (const v of await DB.getAll('verkaeufe')) {
    if (v.abfuellungId || !v.chargeId) continue;
    v.abfuellungId = map[v.chargeId] || null; delete v.chargeId;
    await DB.put('verkaeufe', v);
  }
  for (const r of await DB.getAll('rechnungen')) {
    let changed = false;
    for (const p of (r.positionen || [])) if (p.chargeId && !p.abfuellungId) { p.abfuellungId = map[p.chargeId] || null; delete p.chargeId; changed = true; }
    if (changed) await DB.put('rechnungen', r);
  }
  await S.set('abfuellungMigriert', true);
}

/** Einmalige Migration: Inventar-Datensätze bekommen ein `typ` (inventar | verbrauch),
    abgeleitet aus der Kategorie, damit die Trennung Inventar/Verbrauchsmaterial stabil ist. */
async function migriereInventarTyp() {
  if (S.get('inventarTypMigriert')) return;
  for (const i of await DB.getAll('inventar')) {
    if (i.typ) continue;
    i.typ = VERBRAUCH_KATEGORIEN.has(i.kategorie) ? 'verbrauch' : 'inventar';
    await DB.put('inventar', i);
  }
  await S.set('inventarTypMigriert', true);
}

async function boot() {
  try { await DB.open(); } catch (e) {
    document.body.innerHTML = `<div style="padding:40px;text-align:center;font-family:sans-serif"><h2>ImkerBuch kann nicht starten</h2><p>IndexedDB ist nicht verfügbar (privater Modus?): ${U.esc(e.message)}</p></div>`;
    return;
  }
  await S.load();
  await migriereRaehmchenmass();
  await migriereChargenAbfuellung();
  await migriereInventarTyp();
  applyTheme();
  renderChrome();
  applyHeaderLogo();
  DB.purgeTrash();
  window.addEventListener('hashchange', renderRoute);
  Backup.initAuto();
  Backup.requestPersist();
  Notif.init();
  warmupBibliotheken();
  pruefeMhd().then(() => Notif.check());
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    // Automatisches Update: Übernimmt ein neuer Service-Worker die Kontrolle (nach einem Upload),
    // lädt die App EINMAL von selbst neu → neueste Version ohne Neuinstallieren, ohne Cache-Ärger.
    const hatteController = !!navigator.serviceWorker.controller; // beim allerersten Install false → kein Reload
    let swReload = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (swReload || !hatteController) return;
      swReload = true;
      location.reload();
    });
    navigator.serviceWorker.register('service-worker.js').then((reg) => {
      reg.update().catch(() => {}); // sofort nach einem neuen SW schauen
      setInterval(() => reg.update().catch(() => {}), 30 * 60 * 1000); // und regelmäßig, falls die App lange offen bleibt
    }).catch((e) => console.warn('Service Worker nicht registriert:', e.message));
  }
  if (!S.get('wizardDone') && !TEST_MODE) {
    Wizard.run();
    S.set('letzteGeseheneVersion', APP_VERSION); // Neuinstallation: kein „Was ist neu?“-Fenster
  }
  await renderRoute();
  Backup.updateBanners();
  zeigeUpdateFenster();
  window.appReady = true; // Signal für die Testseite
}
