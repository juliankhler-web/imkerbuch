const Wetter = {
  /** Aktuelles Wetter über Open-Meteo (kostenlos, ohne API-Key) */
  async fetchCurrent(stand) {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${stand.lat}&longitude=${stand.lng}&current=temperature_2m,wind_speed_10m,precipitation&timezone=auto`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('Open-Meteo nicht erreichbar');
    const j = await r.json();
    return { tempC: j.current.temperature_2m, windKmh: j.current.wind_speed_10m, niederschlagMm: j.current.precipitation };
  },
};

/** Fahrt erfassen (Fahrtenbuch): km vorbelegt mit 2 × Stand-Entfernung */
/** Fahrt-Formular. Erster Parameter wahlweise ein bestehender Fahrt-Datensatz (Bearbeiten)
    oder eine Stand-ID als Vorauswahl (Neuanlage). Unterstützt Fahrten zu einem Stand UND
    freie Fahrten (Einkauf, Schulung, Besorgung …) ohne Stand. */
async function fahrtForm(arg = '', onDone, prefill = null) {
  const bearbeiten = arg && typeof arg === 'object' ? arg : null;
  const vorStandId = bearbeiten ? '' : (arg || '');
  const staende = await DB.getAll('staende');
  const kmVon = (standId) => { const st = staende.find((x) => x.id === standId); return st && st.kmEntfernung ? st.kmEntfernung * 2 : ''; };
  const FREI = '__frei__';
  const zielOpts = [...staende.map((st) => ({ v: st.id, l: st.name + (st.kmEntfernung ? ` (${U.fmtNum(st.kmEntfernung * 2)} km hin & zurück)` : '') })), { v: FREI, l: 'Andere Fahrt (Einkauf, Schulung, Besorgung …)' }];
  // Startwerte: Bearbeiten > Vorlage-Prefill > vorgewählter Stand
  const quelle = bearbeiten || prefill;
  const startZiel = quelle ? (quelle.standId || FREI) : (vorStandId || (staende[0] ? staende[0].id : FREI));
  const m = UI.formModal({
    title: bearbeiten ? 'Fahrt bearbeiten' : 'Fahrt erfassen',
    fields: [
      { key: 'datum', label: 'Datum', type: 'date', required: true, default: bearbeiten ? bearbeiten.datum : U.todayIso() },
      { key: 'ziel', label: 'Ziel', type: 'select', required: true, default: startZiel, options: zielOpts },
      { key: 'freiZiel', label: 'Wohin / Beschreibung', placeholder: 'z. B. Imkerbedarf Müller, Schulung Bienengesundheit', showIf: (f) => f.ziel === FREI },
      { key: 'km', label: 'Gefahrene Kilometer (gesamt)', type: 'number', required: true, default: quelle && quelle.km != null && quelle.km !== '' ? quelle.km : kmVon(startZiel) },
      { key: 'zweck', label: 'Zweck der Fahrt', type: 'suggest', options: VORSCHLAEGE.fahrtzweck, required: true, default: quelle ? quelle.zweck : '' },
      { key: 'notiz', label: 'Notiz', placeholder: 'z. B. mit Anhänger', default: bearbeiten ? bearbeiten.notiz : '' },
      ...(bearbeiten ? [] : [{ key: 'alsVorlage', label: 'Als häufige Fahrt merken (Vorlage)', type: 'check' }]),
    ],
    values: quelle ? { freiZiel: quelle.freiZiel || '' } : {},
    saveText: bearbeiten ? 'Speichern' : 'Fahrt buchen',
    async onSave(v) {
      const frei = v.ziel === FREI;
      if (frei && !(v.freiZiel || '').trim() && !(v.zweck || '').trim()) throw new Error('Bitte Ziel/Beschreibung oder Zweck angeben.');
      const rec = Object.assign(bearbeiten || {}, { datum: v.datum, standId: frei ? null : v.ziel, freiZiel: frei ? (v.freiZiel || '').trim() : '', km: v.km, zweck: v.zweck, notiz: v.notiz });
      await DB.put('fahrten', rec);
      if (v.alsVorlage) {
        const name = frei ? (rec.freiZiel || rec.zweck || 'Fahrt') : (staende.find((s) => s.id === rec.standId)?.name || 'Fahrt');
        const vorlagen = S.get('fahrtvorlagen') || [];
        vorlagen.push({ id: U.uuid(), name, km: rec.km, zweck: rec.zweck, standId: rec.standId, freiZiel: rec.freiZiel });
        await S.set('fahrtvorlagen', vorlagen);
      }
      UI.toast(bearbeiten ? 'Fahrt gespeichert' : (v.alsVorlage ? 'Fahrt erfasst + als Vorlage gemerkt' : 'Fahrt erfasst'));
      if (onDone) onDone(); else renderRoute();
    },
    onDelete: bearbeiten ? papierkorbDelete('fahrten', bearbeiten, 'Fahrt löschen?', 'Wandert in den Papierkorb (30 Tage).') : undefined,
  });
  // Ziel-Wechsel → km-Vorschlag aktualisieren (nur bei Stand mit hinterlegter Entfernung)
  const zielSel = $('#f-ziel', m.el), kmInp = $('#f-km', m.el);
  zielSel.addEventListener('change', () => {
    const vorschlag = kmVon(zielSel.value);
    if (vorschlag !== '') { kmInp.value = String(vorschlag).replace('.', ','); FormGuard.dirty = true; }
  });
}

/** Ein-Klick-Fahrt vom Dashboard: bucht heute + Hin-/Rückweg für einen Stand.
    Ohne hinterlegte Entfernung fällt es aufs volle Formular zurück (km eingeben). */
/** Stände nach Besuchshäufigkeit sortieren (meiste gebuchte Fahrten zuerst),
    bei Gleichstand alphabetisch. Liefert auch die Besuchszahlen je Stand-ID. */
function staendeNachBesuchen(staende, fahrten) {
  const besuche = new Map();
  for (const f of fahrten) if (f.standId) besuche.set(f.standId, (besuche.get(f.standId) || 0) + 1);
  const sorted = [...staende].sort((a, b) =>
    (besuche.get(b.id) || 0) - (besuche.get(a.id) || 0) ||
    (a.name || '').toLowerCase().localeCompare((b.name || '').toLowerCase()));
  return { sorted, besuche };
}

/** Klappt die Dashboard-Kachel „Fahrt zum Stand“ zwischen Top 5 und allen Ständen um.
    Der Zustand liegt am Widget, damit er ein Neu-Rendern (z. B. nach „Fahrt buchen“) überlebt. */
function fahrtWidgetToggle(btn) {
  const offen = !DASH_WIDGETS.fahrt._alle;
  DASH_WIDGETS.fahrt._alle = offen;
  const card = btn.closest('.card');
  if (card) card.querySelectorAll('.fahrt-row[data-mehr]').forEach((r) => { r.style.display = offen ? '' : 'none'; });
  const txt = btn.querySelector('.fw-txt'), chev = btn.querySelector('.fw-chev');
  if (txt) txt.textContent = offen ? 'Weniger' : `Alle ${btn.dataset.n} Stände`;
  if (chev) chev.textContent = offen ? '▲' : '▼';
}

async function fahrtSchnellBuchen(standId) {
  const st = await DB.get('staende', standId);
  if (!st) return UI.toast('Stand nicht gefunden', 'err');
  if (!st.kmEntfernung) return fahrtForm(standId);
  const km = st.kmEntfernung * 2;
  await DB.put('fahrten', { datum: U.todayIso(), standId: st.id, km, zweck: 'Fahrt zum Stand', notiz: '' });
  UI.toast(`Fahrt gebucht: ${U.fmtNum(km)} km zu ${st.name}`);
  renderRoute();
}

function standFormFields() {
  return [

    { key: 'geo', type: 'static', html: `<button type="button" class="btn btn-ghost btn-sm" data-geo>${icon('pin')} Aktuellen Standort übernehmen</button> <span class="small muted" data-geo-status></span>` },
    { key: 'lat', label: 'Breitengrad', type: 'number', placeholder: 'z. B. 51,3127' },

    { key: 'notizen', label: 'Notizen', type: 'textarea' },
  ];
}
function bindGeoButton(m) {
  $('[data-geo]', m.el).onclick = () => {
    const status = $('[data-geo-status]', m.el);
    if (!navigator.geolocation) { status.textContent = 'Geolocation nicht verfügbar.'; return; }
    status.textContent = 'Ermittle Position …';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        $('#f-lat', m.el).value = String(pos.coords.latitude.toFixed(5)).replace('.', ',');
        $('#f-lng', m.el).value = String(pos.coords.longitude.toFixed(5)).replace('.', ',');
        status.textContent = 'Standort übernommen ✓'; FormGuard.dirty = true;
      },
      (err) => { status.textContent = 'Fehlgeschlagen: ' + err.message; },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  };
}
function openStandForm(stand, onDone) {
  const m = UI.formModal({
    title: stand ? 'Stand bearbeiten' : 'Neuer Bienenstand',
    fields: standFormFields(), values: stand || {},
    async onSave(v) {
      await DB.put('staende', Object.assign(stand || { }, { name: v.name, lat: v.lat, lng: v.lng, kmEntfernung: v.kmEntfernung, notizen: v.notizen }));
      UI.toast('Stand gespeichert'); if (onDone) onDone();
    },
  });
  bindGeoButton(m);
}

   MODUL: VÖLKER (Stammdaten, Stockkarte, Fütterung, Gewicht, Historie)

async function koeniginOptions() {
  const qs = (await DB.getAll('koeniginnen')).filter((q) => q.status === 'aktiv');
  return qs.map((q) => ({ v: q.id, l: `${q.jahrgang} ${queenColor(q.jahrgang)[0]} · ${q.linie || q.herkunft || 'Königin'}` }));
}
/** Volk anlegen/bearbeiten inkl. Pflege der Königinnen-Zuordnungshistorie */
async function openVolkForm(volk, defaults = {}, onDone) {
  const staende = await DB.getAll('staende');
  const qOpts = await koeniginOptions();
  const beutenOpts = await gelernteWerte(VORSCHLAEGE.beutentyp, 'voelker', 'beutentyp');
  const funktionOpts = await gelernteWerte(VORSCHLAEGE.volksfunktion, 'voelker', 'funktion');
  UI.formModal({
    title: volk ? 'Volk bearbeiten' : 'Neues Volk',
    fields: [
      { key: 'name', label: 'Bezeichnung', required: true, placeholder: 'z. B. Volk 3' },
      { key: 'standId', label: 'Bienenstand', type: 'select', options: staende.map((s) => ({ v: s.id, l: s.name })) },
      { key: 'funktion', label: 'Funktion im Betrieb', type: 'suggest', options: funktionOpts, placeholder: 'z. B. Wirtschaftsvolk' },
      { key: 'koeniginId', label: 'Königin', type: 'select', options: qOpts },
      { key: 'beutentyp', label: 'Beutentyp', type: 'suggest', options: beutenOpts },
      { key: 'beutenkennung', label: 'Beutenkennung', placeholder: 'z. B. Z-07' },
      { key: 'notizen', label: 'Notizen', type: 'textarea' },
    ],
    values: volk || Object.assign({ }, defaults),
    async onSave(v) {
      const alt = volk ? volk.koeniginId : null;
      const rec = Object.assign(volk || { status: 'aktiv', historie: [{ datum: U.todayIso(), text: 'Volk angelegt' }] }, v);
      rec.standId = v.standId || null; rec.koeniginId = v.koeniginId || null;
      delete rec.raehmchenmass; // abgeschafft: geht im Beutentyp auf
      const saved = await DB.put('voelker', rec);
      if (alt !== rec.koeniginId) {
        if (alt) { const q = await DB.get('koeniginnen', alt); if (q) { (q.historie || []).forEach((h) => { if (h.volkId === saved.id && !h.bis) h.bis = U.todayIso(); }); await DB.put('koeniginnen', q); } }
        if (rec.koeniginId) { const q = await DB.get('koeniginnen', rec.koeniginId); if (q) { q.historie = q.historie || []; q.historie.push({ volkId: saved.id, von: U.todayIso(), bis: null }); await DB.put('koeniginnen', q); } }
        if (volk) { saved.historie.push({ datum: U.todayIso(), text: 'Königin geändert' }); await DB.put('voelker', saved); }
      }
      UI.toast('Volk gespeichert'); if (onDone) onDone();
    },
  });
}

/** QR-Code eines Volks: kodiert den Direktlink zur Stockkarte, druckbar fürs Beutendach */
async function volkQrAnzeigen(v) {
  const url = location.origin + location.pathname + '#/volk/' + v.id;
  const m = UI.modal({
    title: `QR-Code · ${v.name}`,
    body: `<p class="small muted mb12">Drucken, laminieren und ans Beutendach kleben. Mit der Handy-Kamera scannen öffnet direkt die Stockkarte dieses Volks.</p>
      <div id="vqr-zone" style="text-align:center"><span class="muted small">QR-Code wird erzeugt …</span></div>`,
    footer: `<button class="btn btn-ghost" data-close2>Schließen</button><button class="btn btn-primary" data-print id="vqr-print" disabled>${icon('print')} Etikett drucken</button>`,
  });
  $('[data-close2]', m.el).onclick = () => m.close(true);
  try {
    const dataUrl = await makeQr(url);
    $('#vqr-zone', m.el).innerHTML = `<img src="${dataUrl}" alt="QR-Code ${U.esc(v.name)}" style="width:200px;height:200px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:8px">
      <div class="small muted mt8">${U.esc(v.name)}${v.beutenkennung ? ' · ' + U.esc(v.beutenkennung) : ''}</div>`;
    $('#vqr-print', m.el).disabled = false;
    $('#vqr-print', m.el).onclick = () => qrEtikettDruck(`${v.name}${v.beutenkennung ? ' · ' + v.beutenkennung : ''}`, dataUrl);
  } catch (e) { $('#vqr-zone', m.el).innerHTML = `<div class="banner danger">${icon('warn')} QR fehlgeschlagen: ${U.esc(e.message)}</div>`; }
}
/** Druckbogen mit mehreren gleichen QR-Etiketten (generisch für Volk/Charge) */
function qrEtikettDruck(titel, dataUrl, anzahl = 6) {
  const div = document.createElement('div');
  div.className = 'qr-print print-only';
  div.innerHTML = `<h2 style="margin-bottom:8px">${U.esc(titel)} – QR-Etiketten</h2>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12mm;margin-top:8mm">
      ${Array.from({ length: anzahl }).map(() => `<div style="text-align:center"><img src="${dataUrl}" style="width:40mm;height:40mm"><div style="font-size:9pt;margin-top:2mm">${U.esc(titel)}</div></div>`).join('')}
    </div>`;
  document.body.appendChild(div);
  document.body.classList.add('qr-printing');
  if (!$('#qr-print-style')) {
    const st = document.createElement('style'); st.id = 'qr-print-style';
    st.textContent = `@media print{ body.qr-printing .app, body.qr-printing #modal-root, body.qr-printing #banners, body.qr-printing .bottomnav {display:none!important} }`;
    document.head.appendChild(st);
  }
  const cleanup = () => { div.remove(); document.body.classList.remove('qr-printing'); window.removeEventListener('afterprint', cleanup); };
  window.addEventListener('afterprint', cleanup);
  window.print();
}

/** Sammel-Erfassung: eine Durchsicht oder Fütterung mit einem Formular für mehrere Völker */
function sammelErfassung(voelker) {
  if (!voelker.length) return UI.toast('Keine aktiven Völker', 'err');
  const m = UI.modal({
    title: 'Sammel-Erfassung',
    body: `<div class="field"><label>Was möchtest du für mehrere Völker erfassen?</label>
        <select class="inp" id="se-art"><option value="stockkarte">Durchsicht (Stockkarte)</option><option value="fuetterung">Fütterung</option><option value="varroa">Varroa-Zählung</option></select></div>
      <div class="field"><label>Völker auswählen</label>
        <div class="flex-wrap mb8"><button type="button" class="btn btn-xs btn-ghost" id="se-all">Alle</button><button type="button" class="btn btn-xs btn-ghost" id="se-none">Keine</button></div>
        <div id="se-list" style="max-height:34vh;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:4px 10px">
          ${voelker.map((v) => `<label class="check-line"><input type="checkbox" value="${v.id}" checked> <span>${U.esc(v.name)}${v.beutenkennung ? ' · ' + U.esc(v.beutenkennung) : ''}</span></label>`).join('')}
        </div><div class="hint mt8" id="se-count"></div></div>`,
    footer: `<button class="btn btn-ghost" data-cancel>Abbrechen</button><button class="btn btn-primary" data-next>Weiter</button>`,
  });
  const boxes = () => $$('#se-list input', m.el);
  const updateCount = () => { $('#se-count', m.el).textContent = `${boxes().filter((b) => b.checked).length} von ${voelker.length} ausgewählt`; };
  $('#se-all', m.el).onclick = () => { boxes().forEach((b) => b.checked = true); updateCount(); };
  $('#se-none', m.el).onclick = () => { boxes().forEach((b) => b.checked = false); updateCount(); };
  $('#se-list', m.el).addEventListener('change', updateCount);
  updateCount();
  $('[data-cancel]', m.el).onclick = () => m.close();
  $('[data-next]', m.el).onclick = async () => {
    const ids = boxes().filter((b) => b.checked).map((b) => b.value);
    if (!ids.length) return UI.toast('Bitte mindestens ein Volk wählen', 'err');
    const art = $('#se-art', m.el).value;
    m.close(true);
    await sammelFormular(art, ids, voelker);
  };
}
/** Formular für die Sammel-Erfassung – speichert denselben Eintrag je gewähltem Volk */
async function sammelFormular(art, volkIds, voelker) {
  const namen = volkIds.map((id) => voelker.find((v) => v.id === id)?.name).filter(Boolean);
  const hinweis = { type: 'static', key: '_hint', html: `<div class="banner info">${icon('info')} Wird für <b>${volkIds.length} Völker</b> angelegt: ${U.esc(namen.slice(0, 6).join(', '))}${namen.length > 6 ? ' …' : ''}</div>` };
  if (art === 'stockkarte') {
    UI.formModal({
      title: 'Sammel-Durchsicht', wide: true,
      fields: [hinweis,
        { key: 'datum', label: 'Datum', type: 'date', required: true, default: U.todayIso() },
        { key: 'volksstaerke', label: 'Volksstärke', type: 'rating' }, { key: 'brutbild', label: 'Brutbild', type: 'rating' },
        { key: 'sanftmut', label: 'Sanftmut', type: 'rating' }, { key: 'futter', label: 'Futter' },
        { key: 'weiselzellen', label: 'Weiselzellen vorhanden', type: 'check' }, { key: 'notiz', label: 'Notiz', type: 'textarea' },
      ],
      saveText: `Für ${volkIds.length} Völker speichern`,
      async onSave(val) { for (const id of volkIds) await DB.put('stockkarten', { volkId: id, ...val }); UI.toast(`Durchsicht für ${volkIds.length} Völker gespeichert`); renderRoute(); },
    });
  } else if (art === 'fuetterung') {
    UI.formModal({
      title: 'Sammel-Fütterung', wide: true,
      fields: [hinweis,
        { key: 'datum', label: 'Datum', type: 'date', required: true, default: U.todayIso() },
        { key: 'futterart', label: 'Futterart', type: 'suggest', required: true, options: await gelernteWerte(VORSCHLAEGE.futterart, 'fuetterungen', 'futterart') },
        { key: 'mengeKg', label: 'Menge je Volk (kg)', type: 'number', required: true },
        { key: 'winterfutter', label: 'Winterfutter', type: 'check' },
      ],
      saveText: `Für ${volkIds.length} Völker speichern`,
      async onSave(val) { for (const id of volkIds) await DB.put('fuetterungen', { volkId: id, ...val }); UI.toast(`Fütterung für ${volkIds.length} Völker gespeichert`); renderRoute(); },
    });
  } else {
    UI.formModal({
      title: 'Sammel-Varroazählung', wide: true,
      fields: [hinweis,
        { key: 'datum', label: 'Datum', type: 'date', required: true, default: U.todayIso() },
        { key: 'methode', label: 'Methode', type: 'select', required: true, default: VARROA_METHODEN[0], options: VARROA_METHODEN.map((mm) => ({ v: mm, l: mm })) },
        { key: 'tageZaehl', label: 'Zähldauer (Tage)', type: 'number', default: 7 },
        { key: 'milben', label: 'Gezählte Milben je Volk', type: 'number', required: true, hint: 'Bei stark unterschiedlichem Milbenfall besser einzeln je Volk erfassen.' },
      ],

    });
  }
}

  async stockkarteForm(v, s, vorlage) {
    const futterOpts = await gelernteWerte(VORSCHLAEGE.futter, 'stockkarten', 'futter');
    // Eigene Zusatzfelder aus den Einstellungen (key z0, z1, … , vorbelegt aus s.zusatz)
    const felder = S.get('stockkartenFelder') || [];
    const typMap = { text: 'text', zahl: 'number', check: 'check', rating: 'rating' };
    // Startwerte: bestehender Eintrag ODER Vorlage (bei neuer Durchsicht), Zusatzfelder umgeschlüsselt
    const basis = s || vorlage || {};
    const zusatzWerte = {};
    felder.forEach((f, i) => { zusatzWerte['z' + i] = basis.zusatz ? basis.zusatz[f.name] : undefined; });
    const zusatzFelder = felder.map((f, i) => ({ key: 'z' + i, label: f.name, type: typMap[f.typ] || 'text' }));
    UI.formModal({
      title: s ? 'Durchsicht bearbeiten' : vorlage ? 'Neue Durchsicht (Vorlage)' : 'Neue Durchsicht',
      fields: [
        { key: 'datum', label: 'Datum', type: 'date', required: true, default: U.todayIso() },
        { key: 'volksstaerke', label: 'Volksstärke', type: 'rating', hint: '1 = schwach, 5 = sehr stark' },
        { key: 'brutbild', label: 'Brutbild', type: 'rating' },
        { key: 'sanftmut', label: 'Sanftmut', type: 'rating' },
        { key: 'futter', label: 'Futter', type: 'suggest', options: futterOpts },
        { key: 'weiselzellen', label: 'Weiselzellen vorhanden', type: 'check' },
        ...zusatzFelder,
        { key: 'notiz', label: 'Notiz', type: 'textarea' },
        ...(s ? [] : [{ key: '_vorlageName', label: 'Diese Eingaben als Vorlage speichern (Name)', placeholder: 'leer lassen = nicht speichern', hint: 'z. B. „Ableger“ oder „Standard-Sommer“ – dann als Schnell-Button verfügbar.' }]),
      ],
      values: Object.assign({}, basis, s ? {} : { datum: U.todayIso() }, zusatzWerte),
      async onSave(val) {
        const vorlageName = (val._vorlageName || '').trim(); delete val._vorlageName;
        const zusatz = {};
        felder.forEach((f, i) => { zusatz[f.name] = val['z' + i]; delete val['z' + i]; });
        val.zusatz = zusatz;
        if (vorlageName) {
          const vl = S.get('stockkartenVorlagen') || [];
          const werte = { volksstaerke: val.volksstaerke, brutbild: val.brutbild, sanftmut: val.sanftmut, futter: val.futter, weiselzellen: val.weiselzellen, zusatz, notiz: val.notiz };
          const idx = vl.findIndex((x) => x.name === vorlageName);
          if (idx >= 0) vl[idx].werte = werte; else vl.push({ name: vorlageName, werte });
          await S.set('stockkartenVorlagen', vl);
        }
        await DB.put('stockkarten', Object.assign(s || { volkId: v.id }, val));
        UI.toast(vorlageName ? 'Durchsicht + Vorlage gespeichert' : 'Durchsicht gespeichert'); renderRoute();
      },
      onDelete: papierkorbDelete('stockkarten', s, 'Durchsicht löschen?', 'Wandert in den Papierkorb (30 Tage).'),
    });
  },
  stockkarteDetail(v, s) {
    const rate = (n) => (n ? '★'.repeat(n) + '☆'.repeat(5 - n) : '–');
    const m = UI.modal({
      title: `Durchsicht ${U.fmtDate(s.datum)}`, wide: true,
      body: `<div class="detail-kv mb12">
          <dt>Volksstärke</dt><dd>${rate(s.volksstaerke)}</dd><dt>Brutbild</dt><dd>${rate(s.brutbild)}</dd>
          <dt>Sanftmut</dt><dd>${rate(s.sanftmut)}</dd><dt>Futter</dt><dd>${U.esc(s.futter) || '–'}</dd>
          <dt>Weiselzellen</dt><dd>${s.weiselzellen ? 'ja ⚠️' : 'nein'}</dd>
          ${s.zusatz ? Object.entries(s.zusatz).filter(([, val]) => val !== '' && val !== null && val !== undefined).map(([k, val]) => `<dt>${U.esc(k)}</dt><dd>${val === true ? 'ja' : val === false ? 'nein' : U.esc(val)}</dd>`).join('') : ''}

    });

/** Offene Königinnen-Zuordnung eines Volks beenden */
async function endQueenAssignment(v) {
  if (!v.koeniginId) return;
  const q = await DB.get('koeniginnen', v.koeniginId);
  if (q) { (q.historie || []).forEach((h) => { if (h.volkId === v.id && !h.bis) h.bis = U.todayIso(); }); await DB.put('koeniginnen', q); }
  v.koeniginId = null;
}

        { key: 'vatervolkId', label: 'Vatervolk / Drohnenlinie (4a)', type: 'select', options: qOpts, showIf: (f) => f.anpaarung === 'besamung' || f.anpaarung === 'standbegattung', hint: 'Königin, die die Drohnen stellt.' },
        { key: '_bewTitel', type: 'static', html: '<h3 class="mt8 mb8">Bewertung (Zuchtauslese)</h3><div class="hint mb8">Optional – Skala 1–4, 4 = bester Wert. Hilft bei der Auswahl der Zuchtmütter.</div>' },
        { key: 'bSanftmut', label: 'Sanftmut', type: 'select', default: 0, options: note, keepOrder: true },
        { key: 'bWabensitz', label: 'Wabensitz (Ruhe auf der Wabe)', type: 'select', default: 0, options: note, keepOrder: true },
        { key: 'bSchwarm', label: 'Schwarmträgheit', type: 'select', default: 0, options: note, keepOrder: true },
        { key: 'bEntwicklung', label: 'Volksentwicklung', type: 'select', default: 0, options: note, keepOrder: true },
        { key: 'bHonigKg', label: 'Honigertrag (kg)', type: 'number', placeholder: 'z. B. 28' },
        { key: 'notiz', label: 'Notiz', type: 'textarea' },
      ],
      values: q ? { ...q, kennung: kennungVorschlag, bSanftmut: b.sanftmut || 0, bWabensitz: b.wabensitz || 0, bSchwarm: b.schwarm || 0, bEntwicklung: b.entwicklung || 0, bHonigKg: b.honigKg ?? '' } : { kennung: kennungVorschlag },
      async onSave(v) {
        v.jahrgang = Math.round(v.jahrgang);
        const bewertung = { sanftmut: +v.bSanftmut || 0, wabensitz: +v.bWabensitz || 0, schwarm: +v.bSchwarm || 0, entwicklung: +v.bEntwicklung || 0, honigKg: (v.bHonigKg === '' || v.bHonigKg == null) ? null : v.bHonigKg };
        const rec = Object.assign(q || { historie: [] }, {
          kennung: (v.kennung || '').trim(), jahrgang: v.jahrgang, linie: v.linie, herkunft: v.herkunft, status: v.status, notiz: v.notiz,
          mutterId: v.mutterId || null, anpaarung: v.anpaarung || '', belegstelle: v.anpaarung === 'belegstelle' ? v.belegstelle : '', vatervolkId: (v.anpaarung === 'besamung' || v.anpaarung === 'standbegattung') ? (v.vatervolkId || null) : null,
          bewertung,
        });
        const saved = await DB.put('koeniginnen', rec);
        // Bei Verlust/Umweiselung: Zuordnung im Volk beenden
        if (v.status !== 'aktiv') {
          for (const volk of await DB.getAll('voelker')) if (volk.koeniginId === saved.id) {
            volk.koeniginId = null;
            volk.historie.push({ datum: U.todayIso(), text: `Königin ${saved.jahrgang} ${v.status}` });
            await DB.put('voelker', volk);
          }
          (saved.historie || []).forEach((h) => { if (!h.bis) h.bis = U.todayIso(); });
          await DB.put('koeniginnen', saved);
        }
        UI.toast('Königin gespeichert'); renderRoute();
      },
      onDelete: q ? async () => {
        if (!(await UI.confirm({ title: 'Königin löschen?', text: 'Wandert in den Papierkorb (30 Tage). Völker verlieren die Zuordnung.' }))) return false;
        for (const volk of await DB.getAll('voelker')) if (volk.koeniginId === q.id) { volk.koeniginId = null; await DB.put('voelker', volk); }
        await DB.softDel('koeniginnen', q.id); UI.toast('Gelöscht'); renderRoute(); return true;
      } : null,
    });
  },
  async detail(q, voelker) {
    const [farbe, hex] = queenColor(q.jahrgang);
    const hist = U.sortBy(q.historie || [], (h) => h.von, true);
    const qm = await idMap('koeniginnen');
    const stammbaum = koeniginStammbaumHtml(q, qm);
    const anpaarungText = { standbegattung: 'Standbegattung', belegstelle: `Belegstelle${q.belegstelle ? ' · ' + U.esc(q.belegstelle) : ''}`, besamung: 'Künstliche Besamung' }[q.anpaarung] || '–';
    const vaterHtml = q.vatervolkId && qm.get(q.vatervolkId) ? koeniginLabel(qm.get(q.vatervolkId)) : (q.anpaarung === 'belegstelle' && q.belegstelle ? U.esc(q.belegstelle) : '<span class="muted">–</span>');
    const b = q.bewertung || {};
    const note = zuchtNote(b);
    const punkte = (n) => n ? '◆'.repeat(n) + '◇'.repeat(4 - n) : '<span class="muted">nicht bewertet</span>';

          ${q.kennung ? `<dt>Kennung</dt><dd><b>${U.esc(q.kennung)}</b></dd>` : ''}
          <dt>Jahrgang</dt><dd><span class="dot" style="background:${hex}"></span> ${q.jahrgang} (${farbe})</dd>
          <dt>Linie</dt><dd>${U.esc(q.linie) || '–'}</dd><dt>Herkunft</dt><dd>${U.esc(q.herkunft) || '–'}</dd>
          <dt>Mutter (2a)</dt><dd>${q.mutterId && qm.get(q.mutterId) ? koeniginLabel(qm.get(q.mutterId)) : '<span class="muted">–</span>'}</dd>
          <dt>Anpaarung</dt><dd>${anpaarungText}</dd>
          <dt>Vaterseite (4a)</dt><dd>${vaterHtml}</dd>
          <dt>Status</dt><dd>${U.esc(q.status)}</dd><dt>Notiz</dt><dd>${U.esc(q.notiz) || '–'}</dd>
        </div>
        ${hatBewertung ? `<h3 class="mb8">Bewertung${note ? ` · Zuchtnote ⌀ ${U.fmtNum(note, 1)}` : ''}</h3>

        <h3 class="mb8">Zucht-Stammbaum</h3>
        <div class="mb12">${stammbaum}</div>
        <h3 class="mb8">Zuordnungshistorie</h3>
        <div class="rows mb8">${hist.map((h) => `<button class="row" style="min-height:42px;padding:8px 4px" data-hist="${(q.historie || []).indexOf(h)}">
          <span class="r-main"><span class="r-title">${U.esc(voelker.get(h.volkId)?.name || 'gelöschtes Volk')}${!h.bis ? ' <span class="badge b-ok">aktuell</span>' : ''}</span>
          <span class="r-sub">${U.fmtDate(h.von)} – ${h.bis ? U.fmtDate(h.bis) : 'heute'}</span></span>${icon('pencil', 'chev')}</button>`).join('') || '<span class="muted small">Noch nie einem Volk zugeordnet.</span>'}</div>
        <button class="btn btn-ghost btn-sm mb12 no-print" data-hist-add>${icon('plus')} Zuordnung hinzufügen</button>
        <div data-anhang></div>`,

  /** Zuordnungs-Historie einer Königin von Hand pflegen (anlegen/ändern/löschen).
      Die Volk-Zuordnung wird danach automatisch konsistent gehalten. */
  async historieForm(q, idx) {
    const voelker = U.sortBy(await DB.getAll('voelker'), (v) => v.name.toLowerCase());
    const eintrag = idx != null ? (q.historie || [])[idx] : null;
    const neuOeffnen = async () => {
      const frisch = await DB.get('koeniginnen', q.id);
      if (frisch) Views.koeniginnen.detail(frisch, await idMap('voelker'));
    };
    UI.formModal({
      title: eintrag ? 'Zuordnung bearbeiten' : 'Zuordnung hinzufügen', wide: true,
      fields: [
        { key: 'volkId', label: 'Volk', type: 'select', required: true, options: voelker.map((v) => ({ v: v.id, l: v.name + (v.status !== 'aktiv' ? ` (${v.status})` : '') })) },
        { key: 'von', label: 'Von', type: 'date', required: true, default: U.todayIso() },
        { key: 'bis', label: 'Bis', type: 'date', hint: 'Leer lassen, solange die Königin in diesem Volk sitzt („aktuell“).' },
      ],
      values: eintrag || {},
      async onSave(v) {
        if (v.bis && v.bis < v.von) throw new Error('„Bis“ darf nicht vor „Von“ liegen.');
        const liste = [...(q.historie || [])];
        const neu = { volkId: v.volkId, von: v.von, bis: v.bis || null };
        if (idx != null) liste[idx] = neu; else liste.push(neu);
        if (liste.filter((h) => !h.bis).length > 1) throw new Error('Es darf nur eine offene Zuordnung geben. Trage bei der älteren ein „Bis“-Datum ein.');
        q.historie = U.sortBy(liste, (h) => h.von);
        await DB.put('koeniginnen', q);
        await koeniginHistorieSync(q);
        UI.toast('Zuordnung gespeichert'); renderRoute(); neuOeffnen();
      },
      onDelete: eintrag ? async () => {
        if (!(await UI.confirm({ title: 'Zuordnung löschen?', text: 'Der Eintrag wird aus der Historie entfernt.' }))) return false;
        q.historie = (q.historie || []).filter((_, i) => i !== idx);
        await DB.put('koeniginnen', q);
        await koeniginHistorieSync(q);
        UI.toast('Eintrag gelöscht'); renderRoute(); neuOeffnen();
        return true;
      } : null,
    });
  },

  /* ---- Bewertungs-Runde: Stand/Funktion filtern → viele Völker der Reihe nach benoten ---- */
  async bewertungsRunde() {
    const staende = await DB.getAll('staende');
    const qm = await idMap('koeniginnen');
    // nur aktive Völker, die eine (existierende) Königin haben – die wir benoten können
    const voelker = U.sortBy((await DB.getAll('voelker')).filter((v) => v.status === 'aktiv' && v.koeniginId && qm.get(v.koeniginId)), (v) => v.name.toLowerCase());
    if (!voelker.length) return UI.toast('Kein aktives Volk mit zugeordneter Königin. Weise zuerst Königinnen zu.', 'err');
    const funktionen = [...new Set([...VORSCHLAEGE.volksfunktion, ...voelker.map((v) => v.funktion).filter(Boolean)])];
    const m = UI.formModal({
      title: 'Bewertungs-Runde', wide: true,
      fields: [
        { key: 'standId', label: '1. Welcher Stand?', type: 'select', options: [{ v: '', l: 'Alle Stände' }, ...staende.map((s) => ({ v: s.id, l: s.name }))] },
        { key: 'funktion', label: '2. Welche Funktion?', type: 'select', options: [{ v: '', l: 'Alle Funktionen' }, ...funktionen.map((f) => ({ v: f, l: f }))], hint: 'So bewertest du z. B. nur die Wirtschaftsvölker.' },
        { key: 'volkIds', label: '3. Welche Völker bewerten?', type: 'multicheck', required: true, options: voelker.map((v) => ({ v: v.id, l: `${v.name} · ${koeniginKurz(qm.get(v.koeniginId))}` })) },
        { key: 'datum', label: '4. Bewertungsdatum', type: 'date', required: true, default: U.todayIso() },
      ],
      values: {},
      onSave: async (v) => {
        const gewaehlt = voelker.filter((x) => (v.volkIds || []).includes(x.id));
        if (!gewaehlt.length) throw new Error('Bitte mindestens ein Volk wählen.');
        Views.koeniginnen.bewertenStep2(gewaehlt, qm, v.datum);
      },
    });
    verdrahteVolkFilter(m, voelker);
  },
  async bewertenStep2(voelker, qm, datum) {
    const note = [{ v: 0, l: '– nicht bewertet –' }, { v: 4, l: '4 – sehr gut' }, { v: 3, l: '3 – gut' }, { v: 2, l: '2 – mittel' }, { v: 1, l: '1 – schwach' }];
    const fields = [{ key: '_hint', type: 'static', html: `<div class="hint mb8">Skala 1–4 (4 = bester Wert), am ${U.fmtDate(datum)}. Leere Felder lassen die bisherige Bewertung unverändert.</div>` }];
    const values = {};
    voelker.forEach((v) => {
      const q = qm.get(v.koeniginId), b = q.bewertung || {}, alt = zuchtNote(b);
      fields.push({ key: '_h_' + q.id, type: 'static', html: `<h3 class="mt8 mb4">${U.esc(v.name)} <span class="small muted">· ${U.esc(koeniginKurz(q))}${alt ? ` · bisher ⌀ ${U.fmtNum(alt, 1)}` : ''}</span></h3>` });
      fields.push({ key: 's_' + q.id, label: 'Sanftmut', type: 'select', options: note, keepOrder: true });
      fields.push({ key: 'w_' + q.id, label: 'Wabensitz (Ruhe auf der Wabe)', type: 'select', options: note, keepOrder: true });
      fields.push({ key: 'c_' + q.id, label: 'Schwarmträgheit', type: 'select', options: note, keepOrder: true });
      fields.push({ key: 'e_' + q.id, label: 'Volksentwicklung', type: 'select', options: note, keepOrder: true });
      fields.push({ key: 'h_' + q.id, label: 'Honigertrag (kg)', type: 'number', placeholder: 'optional' });
      values['s_' + q.id] = b.sanftmut || 0; values['w_' + q.id] = b.wabensitz || 0;
      values['c_' + q.id] = b.schwarm || 0; values['e_' + q.id] = b.entwicklung || 0;
      values['h_' + q.id] = b.honigKg ?? '';
    });
    UI.formModal({
      title: `Bewerten · ${voelker.length} ${voelker.length === 1 ? 'Volk' : 'Völker'}`, wide: true,
      fields, values,
      onSave: async (v) => {
        let n = 0;
        for (const volk of voelker) {
          const id = volk.koeniginId;
          const bewertung = { sanftmut: +v['s_' + id] || 0, wabensitz: +v['w_' + id] || 0, schwarm: +v['c_' + id] || 0, entwicklung: +v['e_' + id] || 0, honigKg: (v['h_' + id] === '' || v['h_' + id] == null) ? null : v['h_' + id] };
          if (await setBewertung(id, bewertung, datum)) n++;
        }
        UI.toast(`${n} ${n === 1 ? 'Königin' : 'Königinnen'} bewertet`); renderRoute();
      },
    });
  },

  /* ---- Sammel-Umweiseln: gefilterte Völker wählen → je Volk eine freie Königin zuordnen ---- */
  async sammelUmweiseln() {
    const staende = await DB.getAll('staende');
    const qm = await idMap('koeniginnen');
    const alleVoelker = await DB.getAll('voelker');
    const voelker = U.sortBy(alleVoelker.filter((v) => v.status === 'aktiv'), (v) => v.name.toLowerCase());
    if (!voelker.length) return UI.toast('Lege zuerst Völker an.', 'err');
    // verfügbare Königinnen: aktiv und keinem aktiven Volk zugeordnet (inkl. frisch erzeugter Töchter)
    const belegt = new Set(alleVoelker.filter((v) => v.status === 'aktiv' && v.koeniginId).map((v) => v.koeniginId));
    const frei = U.sortBy((await DB.getAll('koeniginnen')).filter((q) => q.status === 'aktiv' && !belegt.has(q.id)), (q) => q.jahrgang, true);
    if (!frei.length) return UI.toast('Keine freie Königin vorhanden. Erzeuge z. B. Töchter aus einer Zuchtserie.', 'err');
    const funktionen = [...new Set([...VORSCHLAEGE.volksfunktion, ...voelker.map((v) => v.funktion).filter(Boolean)])];
    const m = UI.formModal({
      title: 'Sammel-Umweiseln', wide: true,
      fields: [
        { key: 'standId', label: '1. Welcher Stand?', type: 'select', options: [{ v: '', l: 'Alle Stände' }, ...staende.map((s) => ({ v: s.id, l: s.name }))] },
        { key: 'funktion', label: '2. Welche Funktion?', type: 'select', options: [{ v: '', l: 'Alle Funktionen' }, ...funktionen.map((f) => ({ v: f, l: f }))] },
        { key: 'volkIds', label: '3. Welche Völker umweiseln?', type: 'multicheck', required: true, options: voelker.map((v) => ({ v: v.id, l: `${v.name} · ${v.koeniginId && qm.get(v.koeniginId) ? 'aktuell ' + koeniginKurz(qm.get(v.koeniginId)) : 'weisellos'}` })) },
        { key: 'datum', label: '4. Datum', type: 'date', required: true, default: U.todayIso() },
      ],
      values: {},
      onSave: async (v) => {
        const gewaehlt = voelker.filter((x) => (v.volkIds || []).includes(x.id));
        if (!gewaehlt.length) throw new Error('Bitte mindestens ein Volk wählen.');
        Views.koeniginnen.umweiselnStep2(gewaehlt, frei, qm, v.datum);
      },
    });
    verdrahteVolkFilter(m, voelker);
  },
  async umweiselnStep2(voelker, frei, qm, datum) {
    const opts = [{ v: '', l: '– nicht ändern –' }, ...frei.map((q) => ({ v: q.id, l: `${koeniginKurz(q)}${q.linie ? ' · ' + q.linie : ''} (${queenColor(q.jahrgang)[0]})` }))];
    const fields = [{ key: '_hint', type: 'static', html: `<div class="hint mb8">Ordne jedem Volk eine freie Königin zu (am ${U.fmtDate(datum)}). Die bisherige Königin wird auf „umgeweiselt“ gesetzt. Jede Königin nur einmal wählen.</div>` }];
    voelker.forEach((v) => {
      const akt = v.koeniginId && qm.get(v.koeniginId);
      fields.push({ key: 'q_' + v.id, label: `${v.name}${akt ? ' · aktuell ' + koeniginKurz(akt) : ' · weisellos'}`, type: 'select', default: '', options: opts });
    });
    UI.formModal({
      title: `Umweiseln · ${voelker.length} ${voelker.length === 1 ? 'Volk' : 'Völker'}`, wide: true,
      fields, values: {},
      onSave: async (v) => {
        const paare = voelker.map((volk) => ({ volkId: volk.id, queenId: v['q_' + volk.id] })).filter((p) => p.queenId);
        if (!paare.length) throw new Error('Keiner der Völker hat eine neue Königin zugeordnet bekommen.');
        const ids = paare.map((p) => p.queenId);
        const dupId = ids.find((id, i) => ids.indexOf(id) !== i);
        if (dupId) { const q = qm.get(dupId) || frei.find((x) => x.id === dupId); throw new Error(`„${q ? koeniginKurz(q) : 'Königin'}“ ist mehrfach gewählt – jede Königin kann nur in ein Volk.`); }
        let n = 0;
        for (const p of paare) if (await umweiseln(p.volkId, p.queenId, datum)) n++;
        UI.toast(`${n} ${n === 1 ? 'Volk' : 'Völker'} umgeweiselt`); renderRoute();
      },
    });
  },
};
/** Reiner Klartext-Name einer Königin (für Optionslisten, die HTML escapen). */
function koeniginKurz(k) { return k ? (k.kennung || ('Jg. ' + k.jahrgang)) : '–'; }
/** Kurzlabel einer Königin (Kennung falls vorhanden, sonst Jahrgang+Farbe) */
function koeniginLabel(k) { return k ? `${k.kennung ? U.esc(k.kennung) + ' · ' : ''}${k.jahrgang} <span class="dot" style="background:${queenColor(k.jahrgang)[1]};width:10px;height:10px"></span> ${queenColor(k.jahrgang)[0]}${k.linie ? ' · ' + U.esc(k.linie) : ''}` : '–'; }
/** Durchschnittliche Zuchtnote aus den vier 1–4-Merkmalen (nur bewertete zählen). */
function zuchtNote(b) {
  if (!b) return 0;
  const w = [b.sanftmut, b.wabensitz, b.schwarm, b.entwicklung].filter((n) => n > 0);
  return w.length ? Math.round((w.reduce((a, n) => a + n, 0) / w.length) * 10) / 10 : 0;
}
/** Beidseitiger Stammbaum: Mutterlinie (2a) UND Vaterlinie (4a/Belegstelle) aufwärts + Töchter. */
function koeniginStammbaumHtml(q, qm) {
  const alle = [...qm.values()];
  // Ahnenlinie aufwärts – jede Ebene mit Mutter (2a) und Vaterseite (4a)
  const ahnHtml = (k, tiefe, gesehen) => {
    if (!k || tiefe > 4 || gesehen.has(k.id)) return '';
    gesehen.add(k.id);
    const mutter = k.mutterId ? qm.get(k.mutterId) : null;
    const vater = k.vatervolkId ? qm.get(k.vatervolkId) : null;
    const zeilen = [];
    if (mutter) zeilen.push(`<div style="padding:2px 0"><span style="color:var(--muted)">♀ Mutter:</span> ${koeniginLabel(mutter)}${ahnHtml(mutter, tiefe + 1, gesehen)}</div>`);
    if (vater) zeilen.push(`<div style="padding:2px 0"><span style="color:var(--blue)">♂ Vaterseite:</span> ${koeniginLabel(vater)}${ahnHtml(vater, tiefe + 1, gesehen)}</div>`);
    else if (k.anpaarung === 'belegstelle' && k.belegstelle) zeilen.push(`<div style="padding:2px 0"><span style="color:var(--blue)">♂ Vaterseite:</span> ${U.esc(k.belegstelle)} <span class="muted">(Belegstelle)</span></div>`);
    return zeilen.length ? `<div class="small" style="margin-left:14px;border-left:2px solid var(--line);padding-left:12px;margin-top:2px">${zeilen.join('')}</div>` : '';
  };
  // Töchter rekursiv (Mutterlinie abwärts)
  const toechterHtml = (mutterId, tiefe) => {
    if (tiefe > 3) return '';
    const kinder = U.sortBy(alle.filter((k) => k.mutterId === mutterId), (k) => k.jahrgang, true);
    if (!kinder.length) return '';
    return `<div style="margin-left:14px;border-left:2px solid var(--line);padding-left:12px">${kinder.map((k) => `<div class="small" style="padding:3px 0">${koeniginLabel(k)}${k.status !== 'aktiv' ? ` <span class="badge b-muted">${U.esc(k.status)}</span>` : ''}${toechterHtml(k.id, tiefe + 1)}</div>`).join('')}</div>`;
  };
  const ahnen = ahnHtml(q, 1, new Set());
  const toechter = toechterHtml(q.id, 1);
  const dieseHtml = `<div class="kpill" style="font-weight:700">${koeniginLabel(q)} <span class="badge b-honey">diese</span></div>`;
  if (!ahnen && !toechter) return `<div class="small muted">Noch kein Stammbaum: Trage bei „Bearbeiten“ Mutter und Vaterseite ein, oder lege Töchter mit dieser Königin als Mutter an.</div>`;
  return `${ahnen ? `<div class="small muted mb4">Abstammung:</div>${ahnen}<div class="mt8"></div>` : ''}${dieseHtml}${toechter ? `<div class="small muted mt8 mb4">Nachkommen (Töchter):</div>${toechter}` : ''}`;
}

function zuchtTermine(startdatum) {
  return ZUCHT_KALENDER.map((z) => ({ tag: z.tag, titel: z.titel, datum: U.addDays(startdatum, z.tag) }));
}
/** offene Auto-Aufgaben einer Serie ersetzen */
async function syncZuchtAufgaben(serie) {
  const alte = (await DB.getAll('aufgaben')).filter((a) => a.quelle === 'zucht' && a.refId === serie.id && !a.erledigt);
  for (const a of alte) await DB.del('aufgaben', a.id);
  for (const t of serie.termine) await DB.put('aufgaben', { titel: `${serie.name}: ${t.titel}`, faellig: t.datum, erledigt: false, quelle: 'zucht', refId: serie.id, notiz: `Tag ${t.tag} der Zuchtserie` });
}
/** Erzeugt n Töchter-Königinnen aus einer Serie: erben Mutter(2a)/Anpaarung(4a)/Linie/Jahrgang,
    bekommen fortlaufende Kennungen und eine Rückreferenz auf die Serie. Gibt die Anzahl zurück. */
async function erzeugeToechter(serie, n, jahrgang) {
  let erzeugt = 0;
  for (let i = 0; i < n; i++) {
    const kennung = await naechsteKennung(jahrgang); // fortlaufend, prüft Bestand nach jedem Anlegen
    await DB.put('koeniginnen', {
      kennung, jahrgang, linie: serie.linie || '', herkunft: 'Eigene Nachzucht', status: 'aktiv',
      mutterId: serie.zuchtmutterId || null, anpaarung: serie.anpaarung || '',
      belegstelle: serie.anpaarung === 'belegstelle' ? (serie.belegstelle || '') : '',
      vatervolkId: (serie.anpaarung === 'besamung' || serie.anpaarung === 'standbegattung') ? (serie.vatervolkId || null) : null,
      bewertung: {}, serieId: serie.id, serieName: serie.name, historie: [], notiz: `Aus Zuchtserie „${serie.name}“`,
    });
    erzeugt++;
  }
  return erzeugt;
}
/** Setzt die Bewertung einer Königin (mit optionalem Bewertungsdatum). Gibt true bei Erfolg. */
async function setBewertung(queenId, bewertung, datum) {
  const q = await DB.get('koeniginnen', queenId);
  if (!q) return false;
  q.bewertung = bewertung;
  if (datum) q.bewertetAm = datum;
  await DB.put('koeniginnen', q);
  return true;
}
/** Weiselt ein Volk auf eine neue Königin um: beendet die Zuordnung der bisherigen
    Königin (Status → umgeweiselt), löst die neue aus einem etwaigen anderen Volk und
    trägt die neue Zuordnung in Volk + Königin ein. Gibt true bei Erfolg. */
async function umweiseln(volkId, queenId, datum) {
  const volk = await DB.get('voelker', volkId);
  const neu = await DB.get('koeniginnen', queenId);
  if (!volk || !neu) return false;
  datum = datum || U.todayIso();
  const altId = volk.koeniginId;
  if (altId && altId !== queenId) {
    const alt = await DB.get('koeniginnen', altId);
    if (alt) {
      (alt.historie || []).forEach((h) => { if (h.volkId === volkId && !h.bis) h.bis = datum; });
      alt.status = 'umgeweiselt';
      await DB.put('koeniginnen', alt);
    }
  }
  // neue Königin aus einem etwaigen anderen Volk lösen (darf nur in einem Volk sitzen)
  for (const v of await DB.getAll('voelker')) {
    if (v.id !== volkId && v.koeniginId === queenId) {
      v.koeniginId = null;
      v.historie = v.historie || [];
      v.historie.push({ datum, text: `Königin ${neu.kennung || neu.jahrgang} umgesetzt` });
      await DB.put('voelker', v);
    }
  }
  (neu.historie || []).forEach((h) => { if (!h.bis) h.bis = datum; });
  neu.historie = neu.historie || [];
  neu.historie.push({ volkId, von: datum, bis: null });
  neu.status = 'aktiv';
  await DB.put('koeniginnen', neu);
  volk.koeniginId = queenId;
  volk.historie = volk.historie || [];
  volk.historie.push({ datum, text: `Umgeweiselt auf Königin ${neu.kennung || neu.jahrgang}` });
  await DB.put('voelker', volk);
  return true;
}
/** Hält die Volk-Zuordnung konsistent zur (von Hand bearbeitbaren) Königinnen-Historie:
    Der einzige offene Eintrag (ohne „bis“) bestimmt, in welchem Volk die Königin sitzt.
    Gibt die Ziel-Volk-ID zurück (null = die Königin sitzt in keinem Volk). */
async function koeniginHistorieSync(q) {
  const offen = (q.historie || []).filter((h) => !h.bis);
  const zielVolkId = offen.length === 1 ? offen[0].volkId : null;
  // Völker lösen, die diese Königin führen, aber nicht (mehr) das Ziel sind
  for (const v of await DB.getAll('voelker')) {
    if (v.koeniginId === q.id && v.id !== zielVolkId) { v.koeniginId = null; await DB.put('voelker', v); }
  }
  if (!zielVolkId) return null;
  const volk = await DB.get('voelker', zielVolkId);
  if (!volk || volk.koeniginId === q.id) return zielVolkId;
  // bisherige Königin des Ziel-Volks freigeben und deren offene Zuordnung schließen
  if (volk.koeniginId) {
    const alt = await DB.get('koeniginnen', volk.koeniginId);
    if (alt) { (alt.historie || []).forEach((h) => { if (h.volkId === volk.id && !h.bis) h.bis = U.todayIso(); }); await DB.put('koeniginnen', alt); }
  }
  volk.koeniginId = q.id;
  await DB.put('voelker', volk);
  return zielVolkId;
}

/* =====================================================================
   MODUL: FÜTTERUNG (Sammel-Erfassung: Stand → Funktion → Völker)
   Legt je gewähltem Volk einen normalen Fütterungs-Datensatz an – dadurch
   erscheint alles automatisch in der Stockkarte des Volks, im Excel-Export
   und in der PDF-Liste, ohne Sonderwege.
   ===================================================================== */
/** Passt ein Volk zu den gewählten Filtern? Leerer Filter = alles erlaubt. */
function passtZuFilter(volk, standId, funktion) {
  if (volk.status !== 'aktiv') return false;
  if (standId && volk.standId !== standId) return false;
  if (funktion && (volk.funktion || '') !== funktion) return false;
  return true;
}

/** Legt dieselbe Fütterung für mehrere Völker an. Gibt die Anzahl zurück. */
async function fuetterungFuerVoelker(volkIds, daten) {
  let n = 0;
  for (const id of volkIds || []) {
    await DB.put('fuetterungen', { volkId: id, datum: daten.datum, futterart: daten.futterart, mengeKg: daten.mengeKg, winterfutter: !!daten.winterfutter });
    n++;
  }
  return n;
}

/** Legt dieselbe Behandlung als eigenen Bestandsbuch-Eintrag für mehrere Völker an
    (TAMG: je Volk ein Eintrag). Gibt die Anzahl zurück. */
async function behandlungFuerVoelker(volkIds, daten) {
  let n = 0;
  for (const id of volkIds || []) {
    await DB.put('behandlungen', { zielTyp: 'volk', zielId: id, datum: daten.datum, mittel: daten.mittel, menge: daten.menge, einheit: daten.einheit, anwendungsart: daten.anwendungsart, wartezeitTage: daten.wartezeitTage || 0, notiz: daten.notiz || '' });
    n++;
  }
  return n;
}

/** Verdrahtet Stand-/Funktions-Filter + „Alle/Keine“ + Live-Zähler auf einem
    formModal mit den Feldern standId, funktion und volkIds (multicheck).
    Gemeinsam genutzt von Fütterung, Bewertungs-Runde und Sammel-Umweiseln. */
function verdrahteVolkFilter(m, alleVoelker) {
  const standSel = $('#f-standId', m.el), funkSel = $('#f-funktion', m.el);
  const box = $('#f-volkIds', m.el), wrap = $('[data-field="volkIds"]', m.el);
  const leer = document.createElement('div'); leer.className = 'hint'; leer.style.display = 'none';
  box.parentNode.insertBefore(leer, box.nextSibling);
  const bar = document.createElement('div');
  bar.className = 'flex-wrap mb8';
  bar.innerHTML = `<button type="button" class="btn btn-ghost btn-sm" data-alle>Alle auswählen</button>
    <button type="button" class="btn btn-ghost btn-sm" data-keine>Keine</button>
    <span class="small muted" data-zahl></span>`;
  wrap.insertBefore(bar, box);
  const zeilen = () => $$('label.check-line', box);
  const sichtbare = () => zeilen().filter((l) => l.style.display !== 'none');
  const zahl = () => { const s = sichtbare(), n = s.filter((l) => $('input', l).checked).length; $('[data-zahl]', bar).textContent = s.length ? `${n} von ${s.length} ausgewählt` : ''; };
  const filtern = () => {
    zeilen().forEach((lab) => {
      const inp = $('input', lab);
      const volk = alleVoelker.find((x) => x.id === inp.value);
      const zeig = !!volk && passtZuFilter(volk, standSel.value, funkSel.value);
      lab.style.display = zeig ? '' : 'none';
      if (!zeig) inp.checked = false; // versteckte Völker nie mitverarbeiten
    });
    const n = sichtbare().length;
    leer.style.display = n ? 'none' : '';
    leer.textContent = n ? '' : 'Kein aktives Volk passt zu dieser Auswahl.';
    bar.style.display = n ? '' : 'none';
    zahl();
  };
  standSel.addEventListener('change', filtern);
  funkSel.addEventListener('change', filtern);
  box.addEventListener('change', zahl);
  $('[data-alle]', bar).onclick = () => { sichtbare().forEach((l) => { $('input', l).checked = true; }); FormGuard.dirty = true; zahl(); };
  $('[data-keine]', bar).onclick = () => { sichtbare().forEach((l) => { $('input', l).checked = false; }); FormGuard.dirty = true; zahl(); };
  filtern();
}

          await DB.put('aufgaben', { titel: `Fütterung prüfen (${n} ${n === 1 ? 'Volk' : 'Völker'})`, faellig: U.addDays(v.datum, Math.round(v.wiedervorlageTage)), erledigt: false, quelle: 'fuetterung', refId: null, notiz: `Nach ${v.futterart} (${U.fmtNum(v.mengeKg)} kg je Volk) vom ${U.fmtDate(v.datum)}` });
          Notif.check();
        }
        UI.toast(`Fütterung für ${n} ${n === 1 ? 'Volk' : 'Völker'} gespeichert`);
        renderRoute();
      },
    });
    // Stand- und Funktions-Wahl filtern die Völkerliste (gemeinsamer Helfer)
    verdrahteVolkFilter(m, alleVoelker);
  },
};

/* =====================================================================
   MODUL: WANDERUNGEN (Volk/Stand, Tracht, Wanderbuch-PDF)
   ===================================================================== */
/** Grund einer Wanderung als Klartext. Neue Datensätze tragen ihn als Freitext in `grund`,
    ältere nur als Verweis auf einen Tracht-Datensatz. `trachten` ist eine idMap. */
function wanderungGrund(w, trachten) {
  return (w.grund || '').trim() || trachten?.get(w.trachtId)?.bezeichnung || '';
}

/** Wanderungen aus dem alten Format (zielTyp/zielId + Freitext vonOrt/nachOrt) kennen keine
    Stand-IDs. Was sich eindeutig zuordnen lässt, wird fürs Formular vorbelegt – der Rest bleibt leer,
    damit nichts geraten wird. Die Völker muss man in jedem Fall selbst wählen (gab es früher nicht). */
function altdatenVorbelegung(w, staende) {
  const out = {};
  const perName = (name) => {
    if (!name) return '';
    const treffer = staende.filter((s) => s.name === name);
    return treffer.length === 1 ? treffer[0].id : ''; // nur bei eindeutigem Namen
  };
  if (!w.vonStandId) { const id = perName(w.vonOrt); if (id) out.vonStandId = id; }
  if (!w.nachStandId) {
    const id = perName(w.nachOrt) || (w.zielTyp === 'stand' && staende.some((s) => s.id === w.zielId) ? w.zielId : '');
    if (id) out.nachStandId = id;
  }
  return out;
}

/** Prüft eine Wanderung fachlich. Gibt eine Fehlermeldung zurück oder null, wenn alles passt. */
function wanderungPruefen({ vonStandId, nachStandId, volkIds }) {
  if (!vonStandId) return 'Bitte den Stand wählen, von dem die Völker wandern.';
  if (!volkIds || !volkIds.length) return 'Bitte mindestens ein Volk auswählen.';
  if (!nachStandId) return 'Bitte den Stand wählen, zu dem die Völker wandern.';
  if (vonStandId === nachStandId) return 'Ziel-Stand und Ausgangs-Stand dürfen nicht derselbe sein.';
  return null;
}

/** Setzt die gewanderten Völker auf den Ziel-Stand um und schreibt es in ihre Historie.
    `erlaubteQuellen` (Liste von Stand-IDs) begrenzt den Umzug auf Völker, die noch auf einem
    dieser Stände stehen. Beim Bearbeiten sind das der Ausgangs-Stand und das bisherige Ziel –
    ein Volk, das inzwischen ganz woanders steht, wird so nie zurückgeholt.
    Alle übrigen Volk-Daten (Königin, Beutentyp, Stockkarte …) bleiben unberührt. */
async function wanderungVoelkerUmziehen(volkIds, nachStandId, datum, vonName, nachName, erlaubteQuellen) {
  const quellen = erlaubteQuellen && erlaubteQuellen.length ? new Set(erlaubteQuellen) : null;
  let bewegt = 0;
  const text = `Gewandert: „${vonName}“ → „${nachName}“`;
  for (const id of volkIds) {
    const volk = await DB.get('voelker', id);
    if (!volk) continue;                               // zwischenzeitlich gelöscht
    if (volk.standId === nachStandId) continue;        // steht schon dort
    // Ein Volk ohne Stand (z. B. weil sein Stand gelöscht wurde) darf immer mitwandern.
    // Nur wer bewusst auf einem anderen Stand steht, bleibt unangetastet.
    if (quellen && volk.standId && !quellen.has(volk.standId)) continue;
    volk.standId = nachStandId;
    volk.historie = volk.historie || [];
    if (!volk.historie.some((h) => h.datum === datum && h.text === text)) volk.historie.push({ datum, text });
    await DB.put('voelker', volk);
    bewegt++;
  }
  return bewegt;
}

        const namen = w.volkIds.map((id) => voelker.get(id)?.name).filter(Boolean);

      } else if (w.zielTyp) teile.push(`${w.zielTyp === 'volk' ? 'Volk' : 'Stand'} „${U.esc(zn(w))}“`); // Altdaten
      const grund = wanderungGrund(w, trachten);

    };

      `<span class="flex-wrap no-print"><button class="btn btn-ghost btn-sm" onclick="Pdf.wanderbuch()">${icon('doc')} Wanderbuch (PDF)</button>
       <button class="btn btn-primary" id="add">${icon('plus')} Wanderung</button></span>`) +
      `<div class="card">` + (list.length ? `<div class="rows">` + list.map((w) => `
        <button class="row" data-id="${w.id}">
          <span class="r-ic" style="background:var(--blue-bg);color:var(--blue)">${icon('truck')}</span>
          <span class="r-main"><span class="r-title">${U.esc(ortVon(w))} → ${U.esc(ortNach(w))}</span>
          <span class="r-sub">${sub(w)}</span></span>
          ${icon('chevR', 'chev')}</button>`).join('') + `</div>`
      : emptyState('truck', 'Noch keine Wanderung erfasst.', `<button class="btn btn-primary" id="add2">${icon('plus')} Erste Wanderung</button>`)) + `</div>`;
    const form = async (w) => {
      const staendeArr = await DB.getAll('staende');
      if (staendeArr.length < 2) return UI.toast('Für eine Wanderung brauchst du mindestens zwei Bienenstände.', 'err');
      // Auch nicht mehr aktive Völker müssen wählbar bleiben, wenn sie zu dieser Wanderung
      // gehören – sonst fielen sie beim Speichern still aus dem Datensatz.
      const gewandert = new Set(w?.volkIds || []);
      const alleVoelker = U.sortBy((await DB.getAll('voelker')).filter((v) => v.status === 'aktiv' || gewandert.has(v.id)), (v) => v.name.toLowerCase());
      const trachtenArr = await DB.getAll('trachten');
      const standOpts = staendeArr.map((s) => ({ v: s.id, l: s.name }));
      const namen = (id) => staendeArr.find((s) => s.id === id)?.name || '?';
      const vorbelegt = w ? altdatenVorbelegung(w, staendeArr) : {};
      const vonUrspruenglich = w ? (w.vonStandId || vorbelegt.vonStandId || '') : '';
      // Grund-Vorschläge: Standardliste + die eigenen Tracht-Bezeichnungen + bereits getippte Gründe
      const trachtNamen = trachtenArr.map((t) => (t.bezeichnung || '').trim()).filter(Boolean);
      const grundPresets = [...VORSCHLAEGE.wanderungsgrund, ...trachtNamen.filter((n) => !VORSCHLAEGE.wanderungsgrund.includes(n))];
      const grundOpts = await gelernteWerte(grundPresets, 'wanderungen', 'grund');
      // Tippt man exakt den Namen einer angelegten Tracht, bleibt die Verknüpfung erhalten
      const trachtNachName = new Map(trachtenArr.map((t) => [(t.bezeichnung || '').trim().toLowerCase(), t.id]));
      const m = UI.formModal({
        title: w ? 'Wanderung bearbeiten' : 'Neue Wanderung', wide: true,
        fields: [
          { key: 'vonStandId', label: '1. Von welchem Stand?', type: 'select', required: true, options: standOpts },
          { key: 'volkIds', label: '2. Welche Völker wandern?', type: 'multicheck', required: true, options: alleVoelker.map((v) => ({ v: v.id, l: v.name + (v.status !== 'aktiv' ? ` (${v.status === 'vereinigt' ? 'vereinigt' : 'aufgelöst'})` : '') })) },
          { key: 'nachStandId', label: '3. Zu welchem Stand?', type: 'select', required: true, options: standOpts },
          { key: 'datum', label: '4. Datum der Wanderung', type: 'date', required: true, default: U.todayIso() },
          { key: 'grund', label: 'Grund der Wanderung', type: 'suggest', options: grundOpts, placeholder: 'z. B. Linde, Waldtracht, Belegstelle' },
          { key: 'notiz', label: 'Notiz', type: 'textarea' },
          { key: 'hinw', type: 'static', html: `<div class="hint">${w
            ? 'Änderst du den Ziel-Stand, werden die Völker nachgezogen – aber nur die, die noch am bisherigen Ziel stehen.'
            : 'Die ausgewählten Völker werden automatisch dem Ziel-Stand zugeordnet. Alle übrigen Daten (Königin, Beutentyp, Stockkarte, Behandlungen) bleiben unverändert.'}</div>` },
        ],
        values: w ? { ...w, volkIds: w.volkIds || [], grund: wanderungGrund(w, trachten), ...vorbelegt } : {},
        async onSave(v) {
          const fehler = wanderungPruefen(v);
          if (fehler) throw new Error(fehler);
          const vonName = namen(v.vonStandId), nachName = namen(v.nachStandId);
          const zielVorher = w?.nachStandId;
          const alteIds = w?.volkIds || [];
          // Passt der Grund auf eine angelegte Tracht, bleibt die Verknüpfung bestehen und
          // der Text wird auf deren Schreibweise normalisiert („RAPS 2026“ → „Raps 2026“).
          const eingabe = (v.grund || '').trim();
          const trefferId = trachtNachName.get(eingabe.toLowerCase()) || null;
          const grund = trefferId ? (trachtenArr.find((t) => t.id === trefferId)?.bezeichnung || eingabe) : eingabe;
          const rec = Object.assign(w || {}, {
            vonStandId: v.vonStandId, nachStandId: v.nachStandId, volkIds: v.volkIds,
            vonOrt: vonName, nachOrt: nachName, // Klartext-Fallback fürs Wanderbuch
            datum: v.datum, grund, trachtId: trefferId,
            notiz: v.notiz,
          });
          delete rec.zielTyp; delete rec.zielId; delete rec.rueckDatum; // abgeschafft
          await DB.put('wanderungen', rec);
          // Beim Bearbeiten nur umziehen, wenn Ziel oder Völkerauswahl sich geändert haben –
          // eine reine Notiz-Korrektur darf kein Volk bewegen.
          const nurMetadaten = w && zielVorher === v.nachStandId && alteIds.length === v.volkIds.length && v.volkIds.every((id) => alteIds.includes(id));
          // Das bisherige Ziel zählt nur dann als erlaubte Quelle, wenn der Ausgangs-Stand
          // unverändert blieb. Sonst würde ein Stand-Wechsel fremde Völker mitverschleppen.
          const quellen = w && v.vonStandId === vonUrspruenglich ? [v.vonStandId, zielVorher].filter(Boolean) : [v.vonStandId];
          const bewegt = nurMetadaten ? 0 : await wanderungVoelkerUmziehen(v.volkIds, v.nachStandId, v.datum, vonName, nachName, quellen);
          UI.toast(bewegt ? `Wanderung gespeichert · ${bewegt} ${bewegt === 1 ? 'Volk' : 'Völker'} stehen jetzt auf „${nachName}“` : 'Wanderung gespeichert');
          renderRoute();
        },
        onDelete: papierkorbDelete('wanderungen', w, 'Wanderung löschen?', 'Wandert in den Papierkorb. Die Völker bleiben, wo sie stehen.'),
      });
      // --- Schritt-Logik: Völker hängen am gewählten Ausgangs-Stand ---
      const vonSel = $('#f-vonStandId', m.el), nachSel = $('#f-nachStandId', m.el);
      const box = $('#f-volkIds', m.el), wrap = $('[data-field="volkIds"]', m.el);
      // Pflicht-Selects starten neutral, damit man bewusst wählt (statt stiller Vorauswahl)
      for (const [sel, wert] of [[vonSel, vonUrspruenglich], [nachSel, w ? (w.nachStandId || vorbelegt.nachStandId || '') : '']]) {
        sel.insertBefore(new Option('– bitte wählen –', ''), sel.firstChild);
        sel.value = wert || '';
      }
      const leerHinweis = document.createElement('div');
      leerHinweis.className = 'hint';
      leerHinweis.style.display = 'none';
      box.parentNode.insertBefore(leerHinweis, box.nextSibling);
      const bar = document.createElement('div');
      bar.className = 'flex-wrap mb8';
      bar.innerHTML = `<button type="button" class="btn btn-ghost btn-sm" data-alle>Alle auswählen</button>
        <button type="button" class="btn btn-ghost btn-sm" data-keine>Keine</button>
        <span class="small muted" data-zahl></span>`;
      wrap.insertBefore(bar, box);
      const zeilen = () => $$('label.check-line', box);
      const sichtbare = () => zeilen().filter((l) => l.style.display !== 'none');
      const zahlAktualisieren = () => {
        const s = sichtbare(), n = s.filter((l) => $('input', l).checked).length;
        $('[data-zahl]', bar).textContent = s.length ? `${n} von ${s.length} ausgewählt` : '';
      };
      const filtern = () => {
        const vonId = vonSel.value;
        // Bereits gewanderte Völker stehen am Ziel, nicht mehr am Ausgangs-Stand – sie bleiben
        // sichtbar, ABER nur solange der Ausgangs-Stand der ursprüngliche ist. Wechselt man ihn,
        // dürfen sie nicht stillschweigend angehakt bleiben und mitverschoben werden.
        const gewandertGilt = !!vonId && vonId === vonUrspruenglich;
        zeilen().forEach((lab) => {
          const inp = $('input', lab);
          const volk = alleVoelker.find((x) => x.id === inp.value);
          const zeig = !!vonId && volk && (volk.standId === vonId || (gewandertGilt && gewandert.has(volk.id)));
          lab.style.display = zeig ? '' : 'none';
          if (!zeig) inp.checked = false; // versteckte Völker nie mitspeichern
        });
        const n = sichtbare().length;
        leerHinweis.style.display = vonId && !n ? '' : 'none';
        leerHinweis.textContent = vonId && !n ? `Auf „${namen(vonId)}“ steht kein aktives Volk.` : '';
        bar.style.display = n ? '' : 'none';
        // Ziel darf nicht der Ausgangs-Stand sein
        [...nachSel.options].forEach((o) => { o.disabled = !!o.value && o.value === vonId; });
        if (nachSel.value && nachSel.value === vonId) nachSel.value = '';
        zahlAktualisieren();
      };
      vonSel.addEventListener('change', filtern);
      box.addEventListener('change', zahlAktualisieren);
      $('[data-alle]', bar).onclick = () => { sichtbare().forEach((l) => { $('input', l).checked = true; }); FormGuard.dirty = true; zahlAktualisieren(); };
      $('[data-keine]', bar).onclick = () => { sichtbare().forEach((l) => { $('input', l).checked = false; }); FormGuard.dirty = true; zahlAktualisieren(); };
      filtern();
    };
    const add = () => form(null);
    bindAdd(add);
    main.addEventListener('click', (e) => { const r = e.target.closest('.row[data-id]'); if (r) form(list.find((x) => x.id === r.dataset.id)); });
  },
};

/* =====================================================================
   MODUL: HONIGVERWALTUNG (Ernten → Chargen → Gläser, QR, Bestand,
   Verkäufe mit automatischem Lagerabzug + Kassenbuch-Buchung)
   ===================================================================== */
/* --- Gebinde-Helfer: Charge = Los-Bestand (kg), Abfüllung = Gläser eines Gebindes --- */
const GEBINDE_PRESETS = [20000, 10000, 1000, 500, 250, 125, 50]; // Gramm; 20 kg = Hobbock
/** Gebindegröße lesbar: „500 g“, „20 kg“. */
function gebindeLabel(g) { return g >= 1000 ? U.fmtNum(g / 1000, g % 1000 ? 2 : 0) + ' kg' : U.fmtNum(g, 0) + ' g'; }
/** Bereits abgefüllte Menge (kg) einer Charge über alle ihre Abfüllungen. */
function chargeAbgefuelltKg(chargeId, abfAlle) { return U.sum((abfAlle || []).filter((a) => a.chargeId === chargeId), (a) => (a.anzahl || 0) * (a.gebindeG || 0) / 1000); }
/** Noch nicht abgefüllte Restmenge (kg) einer Charge – wird aus den Abfüllungen berechnet. */
function chargeRestKg(charge, abfAlle) { return Math.round(((charge.mengeKg || 0) - chargeAbgefuelltKg(charge.id, abfAlle)) * 1000) / 1000; }
/** Abfüllungs-Kurzlabel: „Los 25-01 · 500 g“. */
function abfLabel(a, charge) { return `Los ${charge ? charge.losnummer : '?'} · ${gebindeLabel(a.gebindeG)}`; }
/** Welche Ernte ist bereits welcher Charge zugeordnet? → Map(ernteId → Losnummer).
    exceptId schließt die gerade bearbeitete Charge aus (deren Ernten bleiben wählbar). */
function ernteBelegung(chargen, exceptId) {
  const m = new Map();
  for (const ch of chargen || []) { if (exceptId && ch.id === exceptId) continue; for (const id of (ch.ernteIds || [])) m.set(id, ch.losnummer); }
  return m;
}
/** Anzeigename des Honigs einer Charge (Sorte aus Ernte, sonst Etikett-Bezeichnung, sonst „Honig“). */
function honigName(charge, erntenMap) {
  if (!charge) return 'Honig';
  const sorte = (charge.ernteIds || []).map((id) => erntenMap && erntenMap.get(id)?.sorte).filter(Boolean)[0];
  return sorte || charge.etikettNotiz || 'Honig';
}

/** Verkauf erfassen: prüft Bestand der Abfüllung, mindert die Gläser, bucht die Einnahme */
async function verkaufErfassen({ abfuellungId, anzahl, preisJeGlas, kontaktId = null, datum = U.todayIso(), notiz = '' }) {
  const a = await DB.get('abfuellungen', abfuellungId);
  if (!a) throw new Error('Bitte eine Abfüllung auswählen.');
  anzahl = Math.round(anzahl);
  if (!(anzahl > 0)) throw new Error('Anzahl muss größer als 0 sein.');
  if (anzahl > a.bestand) throw new Error(`Nur ${a.bestand} Gebinde im Bestand dieser Abfüllung.`);
  const c = await DB.get('chargen', a.chargeId);
  const los = c ? c.losnummer : '?';
  const betrag = Math.round(anzahl * preisJeGlas * 100) / 100;
  a.bestand -= anzahl;
  await DB.put('abfuellungen', a);
  const kb = await DB.put('kassenbuch', { datum, typ: 'einnahme', kategorie: 'Honigverkauf', betrag, steuersatz: 0, kontaktId, beschreibung: `Verkauf: ${anzahl} × ${gebindeLabel(a.gebindeG)} (Los ${los})`, rechnungId: null });
  return DB.put('verkaeufe', { datum, abfuellungId, anzahl, preisJeGlas, betrag, kontaktId, notiz, kassenbuchId: kb.id });
}
/** Verkauf stornieren: Bestand zurückbuchen, Kassenbuch-Buchung + Verkauf in den Papierkorb */
async function verkaufStornieren(verkaufId) {
  const v = await DB.get('verkaeufe', verkaufId);
  if (!v) return;
  const a = await DB.get('abfuellungen', v.abfuellungId);
  if (a) { a.bestand += v.anzahl; await DB.put('abfuellungen', a); }
  if (v.kassenbuchId) await DB.softDel('kassenbuch', v.kassenbuchId);
  await DB.softDel('verkaeufe', verkaufId);
}

/** Überträgt ein Laborergebnis (Sorte + Wassergehalt) auf mehrere Ernten auf einmal.
    Gibt die Zahl der tatsächlich aktualisierten Ernten zurück. */
async function laborErgebnisUebernehmen(ernteIds, sorte, wassergehalt) {
  const s = (sorte || '').trim();
  const w = (wassergehalt === '' || wassergehalt == null) ? null : wassergehalt;
  let n = 0;
  for (const id of ernteIds || []) {
    const e = await DB.get('ernten', id);
    if (!e) continue;                         // zwischenzeitlich gelöscht
    e.sorte = s;
    e.wassergehalt = w;
    await DB.put('ernten', e);
    n++;
  }
  return n;
}

    const summeAus = (ids) => Math.round((ids || []).reduce((s, id) => s + (mengeMap.get(id) || 0), 0) * 1000) / 1000;
    const m = UI.formModal({
      title: c ? 'Charge bearbeiten' : 'Neue Charge', wide: true,
      fields: [
        { key: 'losnummer', label: 'Losnummer', required: true, default: `${jahr}-${String(bestehende.length + 1).padStart(2, '0')}`, hint: 'Erscheint auf dem Etikett und im QR-Code.' },
        { key: 'ernteIds', label: 'Enthaltene Ernten', type: 'multicheck', options: ernten.map((e) => ({ v: e.id, l: `${U.fmtDate(e.datum)} · ${e.sorte || 'Sorte offen'} · ${U.fmtNum(e.mengeKg)} kg` })) },
        { key: 'mengeKg', label: 'Gesamtmenge (kg)', type: 'number', hint: 'Wird automatisch aus den angehakten Ernten summiert – bei Bedarf überschreibbar (z. B. Verluste beim Schleudern).' },
        { key: 'mhd', label: 'Mindesthaltbarkeitsdatum', type: 'date', hint: `Die App erinnert automatisch ${MHD_WARN_TAGE} Tage vor Ablauf.` },
        { key: 'etikettNotiz', label: 'Etikettendaten / Bezeichnung', type: 'textarea', placeholder: 'z. B. Rapshonig, cremig gerührt' },
      ],
      values: c || {},
      async onSave(v) {
        // Gesamtmenge automatisch aus den Ernten, sofern nicht manuell gesetzt
        const mengeKg = (v.mengeKg != null && v.mengeKg !== '') ? v.mengeKg : summeAus(v.ernteIds);
        const rec = Object.assign(c || {}, { losnummer: v.losnummer, ernteIds: v.ernteIds || [], mengeKg, mhd: v.mhd, etikettNotiz: v.etikettNotiz });
        await DB.put('chargen', rec); UI.toast('Charge gespeichert'); renderRoute();
      },
      onDelete: c ? async () => {
        const abf = (await DB.getAll('abfuellungen')).filter((a) => a.chargeId === c.id);
        if (abf.length && !(await UI.confirm({ title: 'Charge mit Abfüllungen löschen?', text: `Zu dieser Charge gehören ${abf.length} Abfüllung(en). Nur die Charge wandert in den Papierkorb; die Abfüllungen bleiben (dann ohne Charge-Zuordnung). Lösche bei Bedarf zuerst die Abfüllungen.`, confirmText: 'Trotzdem löschen', danger: true }))) return false;
        await DB.softDel('chargen', c.id); UI.toast('Charge gelöscht'); renderRoute(); return true;
      } : null,
    });
    const box = $('#f-ernteIds', m.el), mengeInp = $('#f-mengeKg', m.el);
    // Bereits einer anderen Charge zugeordnete Ernten ausgrauen (keine Doppel-Zuordnung)
    if (box) {
      const eigene = new Set((c && c.ernteIds) || []);
      const belegt = ernteBelegung(bestehende, c && c.id); // ernteId -> Losnummer der anderen Charge
      $$('label.check-line', box).forEach((lab) => {
        const inp = $('input', lab);
        if (belegt.has(inp.value) && !eigene.has(inp.value)) {
          inp.disabled = true; inp.checked = false;
          lab.style.opacity = '0.5';
          const span = $('span', lab);
          if (span) span.innerHTML += ` <span class="badge b-muted">schon in Los ${U.esc(belegt.get(inp.value))}</span>`;
        }
      });
    }
    // Gesamtmenge live aus den angehakten Ernten berechnen (Julian-Wunsch: nicht selbst eintragen)
    if (box && mengeInp) {
      const rechne = () => {
        const summe = $$('input:checked', box).reduce((s, i) => s + (mengeMap.get(i.value) || 0), 0);
        mengeInp.value = summe ? U.fmtNum(Math.round(summe * 1000) / 1000) : '';
        FormGuard.dirty = true;
      };
      box.addEventListener('change', rechne);
      if (!c) rechne(); // neue Charge: direkt aus (evtl. vorausgewählten) Ernten
    }
  },
  async chargeDetail(c) {

    const abf = U.sortBy((await DB.getAll('abfuellungen')).filter((a) => a.chargeId === c.id), (a) => a.gebindeG, true);
    const kette = (c.ernteIds || []).map((id) => {
      const e = ernten.get(id); if (!e) return null;
      const quelle = e.zielTyp === 'volk' ? voelker.get(e.zielId)?.name : staende.get(e.zielId)?.name;
      return { e, quelle: quelle || 'gelöscht' };
    }).filter(Boolean);
    const rest = chargeRestKg(c, abf);
    const glaeserGesamt = U.sum(abf, (a) => a.anzahl);
    const glaeserBestand = U.sum(abf, (a) => a.bestand);

      title: `Charge ${c.losnummer}`, wide: true,

          <div class="stat"><div class="s-label">Nicht abgefüllt</div><div class="s-value">${U.fmtNum(rest, 1)}</div><div class="s-sub">kg frei</div></div>

        <div class="rows mb12">${abf.length ? abf.map((a) => `<div class="row" style="min-height:44px;padding:8px 4px">
          <span class="r-ic" style="width:32px;height:32px">${icon('honig')}</span>
          <span class="r-main"><span class="r-title">${gebindeLabel(a.gebindeG)} · ${a.anzahl} Gebinde</span>
          <span class="r-sub">abgefüllt ${U.fmtDate(a.datum)} · noch ${a.bestand} im Bestand</span></span>
          <button class="btn btn-xs btn-ghost no-print" data-etikett-abf="${a.id}">${icon('doc')} Etikett</button></div>`).join('') : '<span class="muted small">Noch nichts abgefüllt. Nutze den Tab „Abfüllung“.</span>'}</div>
        ${abf.length ? `<p class="small muted mb12">${glaeserBestand} von ${glaeserGesamt} Gebinden im Bestand.</p>` : ''}
        <h3 class="mb8">Rückverfolgung: Charge → Ernte → Volk</h3>
        <div class="rows mb12">${kette.map(({ e, quelle }) => `<div class="row" style="min-height:44px;padding:8px 4px">
          <span class="r-ic" style="width:32px;height:32px">${icon('honig')}</span>
          <span class="r-main"><span class="r-title">${e.sorte ? U.esc(e.sorte) : 'Ernte'} · ${U.fmtNum(e.mengeKg)} kg</span>
          <span class="r-sub">geerntet ${U.fmtDate(e.datum)} aus ${e.zielTyp === 'volk' ? 'Volk' : 'Stand'} „${U.esc(quelle)}“</span></span></div>`).join('') || '<span class="muted small">Keine Ernten zugeordnet.</span>'}</div>
        <div id="qr-zone" class="mt12" style="text-align:center"></div>`,
      footer: `<button class="btn btn-ghost" data-edit>${icon('pencil')} Bearbeiten</button>
        ${rest > 0 ? `<button class="btn btn-ghost" data-abf>${icon('plus')} Abfüllen</button>` : ''}
        <button class="btn btn-primary" data-qr>${icon('qr')} QR-Code erzeugen</button>`,
    });
    $$('[data-etikett-abf]', m.el).forEach((b) => b.onclick = () => { const a = abf.find((x) => x.id === b.dataset.etikettAbf); if (a) honigEtikettForm(a, c); });
    $('[data-edit]', m.el).onclick = () => { m.close(true); Views.honig.chargeForm(c); };
    const abfBtn = $('[data-abf]', m.el);
    if (abfBtn) abfBtn.onclick = () => { m.close(true); Views.honig.abfuellForm(c.id); };
    $('[data-qr]', m.el).onclick = async () => {
      const zone = $('#qr-zone', m.el);
      zone.innerHTML = '<span class="muted small">QR-Code wird erzeugt …</span>';
      try {
        const dataUrl = await Views.honig.qrDataUrl(c, ernten);
        zone.innerHTML = `<img src="${dataUrl}" alt="QR-Code Charge ${U.esc(c.losnummer)}" style="width:180px;height:180px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:8px">
          <div class="mt8"><button class="btn btn-ghost btn-sm" id="qr-print">${icon('print')} Etiketten-QR drucken</button></div>`;
        $('#qr-print', zone).onclick = () => Views.honig.qrPrint(c, dataUrl);
      } catch (e) { zone.innerHTML = `<div class="banner danger">${icon('warn')} QR fehlgeschlagen: ${U.esc(e.message)}</div>`; }
    };

  /** QR-Inhalt: kompakte Chargeninfo für das Etikett */
  async qrDataUrl(c, erntenMap) {
    const imk = S.get('imkerei');
    const sorten = (c.ernteIds || []).map((id) => erntenMap.get(id)?.sorte).filter(Boolean).join(', ');
    const text = [`Los: ${c.losnummer}`, c.mhd ? `MHD: ${U.fmtDate(c.mhd)}` : '', sorten ? `Sorte: ${sorten}` : '', imk.name ? `Imkerei: ${imk.name}${imk.ort ? ', ' + imk.ort : ''}` : ''].filter(Boolean).join('\n');
    return makeQr(text);
  },
  /** Druckansicht: Bogen mit QR-Codes fürs Etikett */
  qrPrint(c, dataUrl) {
    const div = document.createElement('div');
    div.className = 'qr-print print-only';
    div.innerHTML = `<h2 style="margin-bottom:8px">Charge ${U.esc(c.losnummer)} – QR-Etiketten</h2>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10mm;margin-top:8mm">
        ${Array.from({ length: 12 }).map(() => `<div style="text-align:center"><img src="${dataUrl}" style="width:30mm;height:30mm"><div style="font-size:8pt">Los ${U.esc(c.losnummer)} · MHD ${U.fmtDate(c.mhd) || '–'}</div></div>`).join('')}
      </div>`;
    document.body.appendChild(div);
    document.body.classList.add('qr-printing');
    if (!$('#qr-print-style')) {
      const st = document.createElement('style'); st.id = 'qr-print-style';
      st.textContent = `@media print{ body.qr-printing .app, body.qr-printing #modal-root, body.qr-printing #banners, body.qr-printing .bottomnav {display:none!important} }`;
      document.head.appendChild(st);
    }
    const cleanup = () => { div.remove(); document.body.classList.remove('qr-printing'); window.removeEventListener('afterprint', cleanup); };
    window.addEventListener('afterprint', cleanup);
    window.print();
  },

  /* ---------- Abfüllung (Charge → Gebinde/Gläser, zieht kg von der Charge ab) ---------- */
  async tabAbfuellung(box) {
    const abf = U.sortBy(await DB.getAll('abfuellungen'), (a) => a.datum, true);
    const chargen = await idMap('chargen');
    box.innerHTML = `<div class="card">
      <div class="card-title">${icon('honig')}<h2>Abfüllung</h2><button class="btn btn-primary btn-sm no-print" id="add">${icon('plus')} Abfüllen</button></div>
      <p class="small muted mb12">Wähle eine Charge und fülle sie in Gebinde ab (z. B. 500 g, 250 g). Die abgefüllte Menge wird automatisch von der Charge abgezogen – mehrere Gebinde auf einmal möglich.</p>
      ${abf.length ? `<div class="rows">` + abf.map((a) => {
        const c = chargen.get(a.chargeId);
        return `<button class="row" data-id="${a.id}">
          <span class="r-ic">${icon('honig')}</span>
          <span class="r-main"><span class="r-title">${gebindeLabel(a.gebindeG)} · Los ${U.esc(c ? c.losnummer : '?')}</span>
          <span class="r-sub">${U.fmtDate(a.datum)} · ${a.anzahl} abgefüllt · noch ${a.bestand} im Bestand</span></span>

      }).join('') + `</div>`
