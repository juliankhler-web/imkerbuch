    bindAdd(() => Views.honig.abfuellForm(), box);
    box.addEventListener('click', (ev) => { const r = ev.target.closest('.row[data-id]'); if (r) Views.honig.abfuellEditForm(abf.find((x) => x.id === r.dataset.id)); });
  },
  /** Abfüllen: eine Charge in ein oder mehrere Gebinde abfüllen (zieht kg intelligent ab). */
  async abfuellForm(vorChargeId = '') {
    const abfAlle = await DB.getAll('abfuellungen');
    const chargen = U.sortBy(await DB.getAll('chargen'), (c) => c.losnummer, true);
    const frei = chargen.filter((c) => chargeRestKg(c, abfAlle) > 0.0001);
    if (!frei.length) return UI.toast('Keine Charge mit freier Restmenge. Lege zuerst eine Charge an (Tab „Chargen“).', 'err');
    const gebindeFelder = GEBINDE_PRESETS.map((g) => ({ key: 'g_' + g, label: gebindeLabel(g), type: 'number', placeholder: 'Anzahl' }));
    UI.formModal({
      title: 'Abfüllen', wide: true,
      fields: [
        { key: 'chargeId', label: 'Aus welcher Charge?', type: 'select', required: true, default: vorChargeId, options: frei.map((c) => ({ v: c.id, l: `Los ${c.losnummer} · ${U.fmtNum(chargeRestKg(c, abfAlle), 1)} kg frei` })) },
        { key: 'datum', label: 'Abfülldatum', type: 'date', required: true, default: U.todayIso() },
        { key: '_g', type: 'static', html: '<h3 class="mt8 mb4">Gebinde</h3><div class="hint mb8">Trage bei den passenden Größen die Anzahl ein – auch mehrere Größen auf einmal (z. B. 500 g = Glas, 20 kg = Eimer).</div>' },
        ...gebindeFelder,
        { key: 'eigenesG', label: 'Eigenes Gebinde – Größe (g)', type: 'number', placeholder: 'z. B. 30' },
        { key: 'eigenesN', label: 'Eigenes Gebinde – Anzahl', type: 'number' },
      ],
      values: {},
      async onSave(v) {
        const posten = [];
        for (const g of GEBINDE_PRESETS) { const n = Math.round(v['g_' + g] || 0); if (n > 0) posten.push({ gebindeG: g, anzahl: n }); }
        if (v.eigenesG > 0 && Math.round(v.eigenesN || 0) > 0) posten.push({ gebindeG: Math.round(v.eigenesG), anzahl: Math.round(v.eigenesN) });
        if (!posten.length) throw new Error('Bitte bei mindestens einem Gebinde eine Anzahl eintragen.');
        const charge = await DB.get('chargen', v.chargeId);
        const rest = chargeRestKg(charge, await DB.getAll('abfuellungen'));
        const brauchtKg = posten.reduce((s, p) => s + p.anzahl * p.gebindeG / 1000, 0);
        if (brauchtKg > rest + 0.0001) throw new Error(`Das wären ${U.fmtNum(brauchtKg, 2)} kg, aber es sind nur noch ${U.fmtNum(rest, 2)} kg von Los ${charge.losnummer} frei.`);
        let glaeser = 0;
        for (const p of posten) { await DB.put('abfuellungen', { chargeId: v.chargeId, datum: v.datum, gebindeG: p.gebindeG, anzahl: p.anzahl, bestand: p.anzahl }); glaeser += p.anzahl; }
        UI.toast(`${glaeser} Gebinde abgefüllt${posten.length > 1 ? ` (${posten.length} Größen)` : ''}`); renderRoute();
      },
    });
  },
  /** Einzelne Abfüllung korrigieren oder löschen (freigegebene kg fließen automatisch zurück). */
  async abfuellEditForm(a) {
    if (!a) return;
    const c = await DB.get('chargen', a.chargeId);
    UI.formModal({
      title: `Abfüllung bearbeiten · Los ${c ? c.losnummer : '?'}`, wide: true,
      fields: [
        { key: 'gebindeG', label: 'Gebindegröße (g)', type: 'number', required: true },
        { key: 'anzahl', label: 'Anzahl abgefüllt', type: 'number', required: true },
        { key: 'bestand', label: 'Davon noch im Bestand', type: 'number', required: true, hint: 'Wird durch Verkäufe automatisch gemindert.' },
        { key: 'datum', label: 'Abfülldatum', type: 'date', required: true },
      ],
      values: a,
      async onSave(v) {
        await DB.put('abfuellungen', Object.assign(a, { gebindeG: Math.round(v.gebindeG), anzahl: Math.round(v.anzahl), bestand: Math.max(0, Math.round(v.bestand)), datum: v.datum }));
        UI.toast('Abfüllung gespeichert'); renderRoute();
      },
      onDelete: papierkorbDelete('abfuellungen', a, 'Abfüllung löschen?', 'Wandert in den Papierkorb; die Menge zählt wieder als frei in der Charge.'),
    });
  },

  /* ---------- Bestandsübersicht: je Charge, Gebinde intelligent verrechnet ---------- */
  async tabBestand(box) {
    const chargen = U.sortBy(await DB.getAll('chargen'), (c) => c.losnummer, true);
    const abfAlle = await DB.getAll('abfuellungen');
    const ernten = await idMap('ernten');
    // Gesamtsummen (über alle Chargen)
    const totalGlaeser = U.sum(abfAlle, (a) => a.bestand);
    const totalKgGlaeser = U.sum(abfAlle, (a) => (a.bestand * a.gebindeG) / 1000);
    const totalFreiKg = U.sum(chargen, (c) => chargeRestKg(c, abfAlle));
    const kgFmt = (g) => U.fmtNum(g / 1000, 1); // Gramm-Summe → kg
    const chargenHtml = chargen.map((c) => {
      const abf = U.sortBy(abfAlle.filter((a) => a.chargeId === c.id), (a) => a.gebindeG, true);
      const glaeserBestand = U.sum(abf, (a) => a.bestand);
      const gBestand = U.sum(abf, (a) => a.bestand * a.gebindeG);       // Gramm im Bestand
      const gAbgefuellt = U.sum(abf, (a) => a.anzahl * a.gebindeG);     // Gramm je abgefüllt
      const freiKg = chargeRestKg(c, abfAlle);
      const zeilen = abf.map((a) => `<tr>
        <td><b>${gebindeLabel(a.gebindeG)}</b></td>
        <td class="num">${a.bestand}</td>
        <td class="num">${U.fmtNum(a.bestand * a.gebindeG / 1000, 1)} kg</td>
        <td class="num">${a.anzahl - a.bestand}</td>
        <td class="no-print">${a.bestand > 0 ? `<button class="btn btn-xs btn-ghost" data-verkauf="${a.id}">${icon('euro')} Verkauf</button>` : ''}</td></tr>`).join('');
      return `<div class="card">
        <div class="card-title">${icon('qr')}<h2>Los ${U.esc(c.losnummer)} · ${U.esc(honigName(c, ernten))}</h2>${c.mhd ? `<span class="badge b-honey">MHD ${U.fmtDate(c.mhd)}</span>` : ''}</div>
        <div class="stat-grid mb12">
          <div class="stat"><div class="s-label">Gesamtmenge</div><div class="s-value">${U.fmtNum(c.mengeKg || 0, 1)} kg</div></div>
          <div class="stat"><div class="s-label">Abgefüllt</div><div class="s-value">${kgFmt(gAbgefuellt)} kg</div><div class="s-sub">${U.sum(abf, (a) => a.anzahl)} Gebinde gesamt</div></div>
          <div class="stat"><div class="s-label">Noch nicht abgefüllt</div><div class="s-value">${U.fmtNum(freiKg, 1)} kg</div></div>
        </div>
        ${abf.length ? `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Gebinde</th><th class="num">Im Bestand</th><th class="num">= kg</th><th class="num">Verkauft</th><th class="no-print"></th></tr></thead>
          <tbody>${zeilen}
          <tr style="border-top:2px solid var(--line);font-weight:700"><td>Summe im Bestand</td><td class="num">${glaeserBestand}</td><td class="num">${kgFmt(gBestand)} kg</td><td class="num"></td><td class="no-print"></td></tr>
          </tbody></table></div>`
        : `<p class="small muted">Noch nichts abgefüllt. ${freiKg > 0 ? `<button class="btn btn-xs btn-ghost no-print" data-abf="${c.id}">${icon('plus')} Jetzt abfüllen</button>` : ''}</p>`}
      </div>`;
    }).join('');
    box.innerHTML = `
      <div class="stat-grid mb16">
        <div class="stat"><div class="s-label">${icon('honig')} Gebinde im Bestand</div><div class="s-value">${totalGlaeser}</div><div class="s-sub">${U.fmtNum(totalKgGlaeser, 1)} kg im Lager</div></div>
        <div class="stat"><div class="s-label">${icon('gewicht')} Noch nicht abgefüllt</div><div class="s-value">${U.fmtNum(totalFreiKg, 1)} kg</div></div>
        <div class="stat"><div class="s-label">${icon('qr')} Chargen</div><div class="s-value">${chargen.length}</div></div>
      </div>
      <div class="flex-wrap mb12 no-print"><span class="spacer"></span><button class="btn btn-ghost btn-sm" onclick="Pdf.chargenuebersicht()">${icon('doc')} Chargenübersicht (PDF)</button></div>
      ${chargen.length ? chargenHtml : emptyState('honig', 'Noch kein Bestand – lege eine Charge an und fülle sie im Tab „Abfüllung“ ab.')}`;
    box.addEventListener('click', (e) => {
      const b = e.target.closest('[data-verkauf]'); if (b) return verkaufForm(b.dataset.verkauf);
      const ab = e.target.closest('[data-abf]'); if (ab) return Views.honig.abfuellForm(ab.dataset.abf);
    });
  },
};

/* =====================================================================
   MODUL: MARKTVERKAUF (großer Kassenmodus für den Wochenmarkt)
   Warenkorb im Speicher; „Kassieren“ bucht jede Position über
   verkaufErfassen (Bestand runter + Kassenbuch).
   ===================================================================== */
Views.markt = {
  title: 'Marktverkauf',
  _korb: {}, // abfuellungId -> anzahl
  async render(main) {
    const abf = U.sortBy((await DB.getAll('abfuellungen')).filter((a) => a.bestand > 0), (a) => a.gebindeG, true);
    const chargen = await idMap('chargen'), ernten = await idMap('ernten');
    const korb = Views.markt._korb;
    // Positionen ohne Bestand/Abfüllung aus dem Korb entfernen
    for (const id of Object.keys(korb)) { const a = abf.find((x) => x.id === id); if (!a || korb[id] > a.bestand) delete korb[id]; }
    const preis = (a) => Views.markt._preise?.[a.id] ?? 0;
    const summe = Object.entries(korb).reduce((s, [id, n]) => { const a = abf.find((x) => x.id === id); return s + (a ? n * preis(a) : 0); }, 0);
    const anzahlKorb = Object.values(korb).reduce((a, b) => a + b, 0);
    main.innerHTML = `
      <button class="btn btn-ghost btn-sm mb12 no-print" onclick="navTo('honig')">${icon('back')} Zurück</button>
      ${pageHead('Marktverkauf', 'Gebinde antippen legt es in den Warenkorb. „Kassieren“ bucht Bestand + Kassenbuch.')}

        const c = chargen.get(a.chargeId);

        const imKorb = korb[a.id] || 0;
        return `<button class="markt-tile" data-tile="${a.id}" ${imKorb >= a.bestand ? 'disabled' : ''}>
          <span class="mt-name">${U.esc(name)}${imKorb ? ` <span class="badge b-honey">${imKorb}×</span>` : ''}</span>
          <span class="mt-rest">${gebindeLabel(a.gebindeG)} · Los ${U.esc(c ? c.losnummer : '?')} · ${a.bestand - imKorb} übrig</span>
          <span class="mt-preis">${preis(a) ? U.fmtEur(preis(a)) : '<span style="font-size:13px;color:var(--muted)">Preis antippen</span>'}</span>
        </button>`;
      }).join('')}</div>`
      : emptyState('honig', 'Kein abgefüllter Bestand vorhanden. Fülle zuerst eine Charge im Tab „Abfüllung“ ab.')}
      ${anzahlKorb ? `<div class="markt-korb">
        <div class="flex-wrap mb8"><b style="flex:1">Warenkorb: ${anzahlKorb} Gebinde</b><span style="font-size:22px;font-weight:800">${U.fmtEur(summe)}</span></div>
        <div class="flex-wrap"><button class="btn btn-ghost btn-sm" id="wechsel">${icon('euro')} Wechselgeld</button><button class="btn btn-ghost btn-sm" id="leeren">Leeren</button><span class="spacer"></span><button class="btn btn-primary" id="kassieren">${icon('check')} Kassieren</button></div>
      </div>` : ''}`;
    main.addEventListener('click', async (e) => {
      const tile = e.target.closest('[data-tile]');
      if (tile) {
        const a = abf.find((x) => x.id === tile.dataset.tile);
        if (!preis(a)) return Views.markt.preisSetzen(a, chargen.get(a.chargeId));
        korb[a.id] = (korb[a.id] || 0) + 1;
        return renderRoute();
      }
      if (e.target.closest('#leeren')) { Views.markt._korb = {}; return renderRoute(); }
      if (e.target.closest('#wechsel')) return Views.markt.wechselgeld(summe);
      if (e.target.closest('#kassieren')) return Views.markt.kassieren(korb, abf, preis, summe);
    });
  },
  preisSetzen(a, c) {
    UI.formModal({
      title: 'Verkaufspreis je Gebinde',
      fields: [{ key: 'preis', label: `Preis für Los ${c ? c.losnummer : '?'} (${gebindeLabel(a.gebindeG)})`, type: 'number', required: true, default: Views.markt._preise?.[a.id] || '' }],
      saveText: 'Übernehmen',
      async onSave(v) {
        Views.markt._preise = Views.markt._preise || {};
        Views.markt._preise[a.id] = v.preis;
        renderRoute();
      },
    });
  },
  wechselgeld(summe) {
    const m = UI.modal({
      title: 'Wechselgeld',
      body: `<div class="detail-kv mb12"><dt>Zu zahlen</dt><dd><b>${U.fmtEur(summe)}</b></dd></div>
        <div class="field"><label>Erhalten (€)</label><input class="inp" id="wg-geg" inputmode="decimal" placeholder="z. B. 20"></div>
        <div id="wg-out" style="font-size:22px;font-weight:800;text-align:center;padding:8px"></div>`,
      footer: `<button class="btn btn-primary" data-close3>Fertig</button>`,
    });
    $('[data-close3]', m.el).onclick = () => m.close(true);
    $('#wg-geg', m.el).oninput = (e) => {
      const geg = U.parseNum(e.target.value);
      $('#wg-out', m.el).innerHTML = isNaN(geg) ? '' : geg < summe ? `<span style="color:var(--danger)">fehlen ${U.fmtEur(summe - geg)}</span>` : `Rückgeld: <span style="color:var(--ok)">${U.fmtEur(geg - summe)}</span>`;
    };
  },
  async kassieren(korb, abf, preis, summe) {
    const posten = Object.entries(korb);
    if (!posten.length) return;
    if (!(await UI.confirm({ title: 'Verkauf kassieren?', text: `${posten.reduce((a, [, n]) => a + n, 0)} Gebinde für ${U.fmtEur(summe)} – Bestand wird gemindert und im Kassenbuch gebucht.`, confirmText: 'Kassieren', danger: false }))) return;
    let fehler = 0;
    for (const [id, n] of posten) {
      const a = abf.find((x) => x.id === id);
      try { await verkaufErfassen({ abfuellungId: id, anzahl: n, preisJeGlas: preis(a), notiz: 'Marktverkauf' }); }
      catch (e) { fehler++; console.error(e); }
    }
    Views.markt._korb = {};
    UI.toast(fehler ? `Gebucht – ${fehler} Position(en) übersprungen (Bestand?)` : `Kassiert: ${U.fmtEur(summe)}`, fehler ? 'err' : 'ok');
    renderRoute();
  },
};

/* =====================================================================
   MODUL: RECHNUNGEN (Positionen aus Honigbestand, §19/USt, PDF,
   Festschreiben = fortlaufende Nummer + Bestand runter + Kassenbuch)
   ===================================================================== */
const STEUERARTEN = { regel: 'Regelbesteuerung', klein: 'Kleinunternehmer (§ 19 UStG)', pauschal24: 'Pauschalierung Land-/Forstwirtschaft (§ 24 UStG)' };
/** Steuerart einer Rechnung, mit Rückwärtskompatibilität zum alten booleschen kleinunternehmer-Feld. */
function rechnungSteuerart(r) { return r.steuerart || (r.kleinunternehmer ? 'klein' : 'regel'); }
/** Pflicht-/Rechtshinweis unter dem Rechnungsbetrag (null = Regelbesteuerung, dort nur die USt-Zeilen). */
function rechnungHinweis(r) {
  const art = rechnungSteuerart(r);
  if (art === 'klein') return 'Gemäß § 19 UStG wird keine Umsatzsteuer berechnet (Kleinunternehmerregelung).';
  if (art === 'pauschal24') return `Anwendung der Durchschnittssatzbesteuerung nach Art. 295 ff. MwStSystRL und § 24 UStG. Der Rechnungsbetrag enthält eine pauschalierende Umsatzsteuer von ${U.fmtNum(r.pauschalsatz != null ? r.pauschalsatz : 7.8, 1)} %.`;
  return null;
}
function rechnungSummen(r) {
  const brutto = U.sum(r.positionen, (p) => p.menge * p.einzelpreis);
  const steuern = {};
  const art = rechnungSteuerart(r);
  if (art === 'regel') for (const p of r.positionen) {
    const satz = p.steuersatz || 0;
    if (satz > 0) steuern[satz] = (steuern[satz] || 0) + (p.menge * p.einzelpreis) * (satz / (100 + satz));
  } else if (art === 'pauschal24') {
    const satz = r.pauschalsatz != null ? r.pauschalsatz : 7.8; // enthaltene Pauschal-USt auf die Gesamtsumme
    if (satz > 0 && brutto > 0) steuern[satz] = brutto * (satz / (100 + satz));
  }
  return { brutto, steuern };
}
Views.rechnungen = {
  title: 'Rechnungen',
  async render(main) {
    const list = U.sortBy(await DB.getAll('rechnungen'), (r) => r.datum + (r.nummer || ''), true);

    const statusBadge = { entwurf: 'b-warn', festgeschrieben: 'b-ok', storniert: 'b-danger' };
    main.innerHTML = pageHead('Rechnungen', 'Rechnungen an Kunden – mit fortlaufender Nummer und PDF-Export',
      `<button class="btn btn-primary no-print" id="add">${icon('plus')} Neue Rechnung</button>`) +
      `<div class="card">` + (list.length ? `<div class="rows">` + list.map((r) => {
        const { brutto } = rechnungSummen(r);
        return `<button class="row" data-id="${r.id}">
          <span class="r-ic">${icon('rechnung')}</span>
          <span class="r-main"><span class="r-title">${r.nummer ? U.esc(r.nummer) : 'Entwurf'} <span class="badge ${statusBadge[r.status]}">${r.status}</span></span>
          <span class="r-sub">${U.fmtDate(r.datum)} · ${U.esc(kontakte.get(r.kundeId)?.name || 'kein Kunde')} · ${r.positionen.length} Pos.</span></span>
          <span class="r-side"><b>${U.fmtEur(brutto)}</b></span>${icon('chevR', 'chev')}</button>`;
      }).join('') + `</div>` : emptyState('rechnung', 'Noch keine Rechnung. Positionen kannst du direkt aus dem Honigbestand übernehmen.', `<button class="btn btn-primary" id="add2">${icon('plus')} Erste Rechnung</button>`)) + `</div>`;
    const add = async () => {
      const stg = S.get('steuer');
      const art = stg.art || (stg.kleinunternehmer ? 'klein' : 'regel');
      const r = await DB.put('rechnungen', { nummer: null, datum: U.todayIso(), kundeId: null, positionen: [], steuerart: art, kleinunternehmer: art === 'klein', pauschalsatz: stg.pauschalsatz != null ? stg.pauschalsatz : 7.8, status: 'entwurf', qrAufDruck: false });
      navTo('rechnung/' + r.id);

    bindAdd(add);
    main.addEventListener('click', (e) => { const b = e.target.closest('.row[data-id]'); if (b) navTo('rechnung/' + b.dataset.id); });

Views.rechnung = {
  title: 'Rechnung',
  async render(main, id) {
    const r = await DB.get('rechnungen', id);
    if (!r) { main.innerHTML = emptyState('warn', 'Rechnung nicht gefunden.'); return; }
    const kunden = (await DB.getAll('kontakte')).filter((k) => k.typ === 'kunde');
    const abfAlle = await DB.getAll('abfuellungen');
    const chargenM = await idMap('chargen');
    const entwurf = r.status === 'entwurf';
    const art = rechnungSteuerart(r);
    const { brutto, steuern } = rechnungSummen(r);
    const zeigtUst = art === 'regel';
    main.innerHTML = `
      <button class="btn btn-ghost btn-sm mb12 no-print" onclick="navTo('rechnungen')">${icon('back')} Alle Rechnungen</button>
      ${pageHead(r.nummer || 'Rechnung (Entwurf)', `${U.fmtDate(r.datum)} · Status: ${r.status}`, `
        <span class="flex-wrap no-print">
          <button class="btn btn-ghost btn-sm" id="pdf">${icon('doc')} PDF</button>
          ${entwurf ? `<button class="btn btn-primary btn-sm" id="final">${icon('check')} Festschreiben</button><button class="btn btn-danger btn-sm" id="del">${icon('trash')}</button>` : ''}
          ${r.status === 'festgeschrieben' ? `<button class="btn btn-danger btn-sm" id="storno">Stornieren</button>` : ''}
        </span>`)}
      <div class="card">
        <div class="grid2">
          <div class="field"><label>Kunde ${entwurf ? '<span class="req">*</span>' : ''}</label>
            ${entwurf ? `<select class="inp" id="r-kunde"><option value="">– wählen –</option>${[...kunden].sort((a, b) => a.name.localeCompare(b.name, 'de', { numeric: true, sensitivity: 'base' })).map((k) => `<option value="${k.id}" ${r.kundeId === k.id ? 'selected' : ''}>${U.esc(k.name)}</option>`).join('')}</select>
            <div class="hint">Kunden legst du unter Kassenbuch → Kunden & Lieferanten an.</div>`
            : `<div class="kpill">${U.esc(kunden.find((k) => k.id === r.kundeId)?.name || '–')}</div>`}</div>
          <div class="field"><label>Rechnungsdatum</label>${entwurf ? `<input class="inp" type="date" id="r-datum" value="${r.datum}">` : `<div class="kpill">${U.fmtDate(r.datum)}</div>`}</div>
        </div>
        ${entwurf ? `<div class="field"><label>Besteuerung</label>
          <select class="inp" id="r-steuerart">
            <option value="regel" ${art === 'regel' ? 'selected' : ''}>Regelbesteuerung (USt 7 / 19 %)</option>
            <option value="klein" ${art === 'klein' ? 'selected' : ''}>Kleinunternehmer § 19 UStG (keine USt)</option>
            <option value="pauschal24" ${art === 'pauschal24' ? 'selected' : ''}>Pauschalierung § 24 UStG · Land-/Forstwirtschaft (${U.fmtNum(r.pauschalsatz != null ? r.pauschalsatz : 7.8, 1)} %)</option>
          </select><div class="hint">Für die meisten Imker gilt § 24 (Durchschnittssatz) oder § 19 (Kleinunternehmer). Den Pauschalsatz stellst du unter Einstellungen → Steuer &amp; Rechnungen ein.</div></div>
        <label class="check-line"><input type="checkbox" id="r-qr" ${r.qrAufDruck ? 'checked' : ''}> <span>QR-Code auf die Rechnung drucken</span></label>
        <div class="hint">${S.get('rechnungQr') ? 'Nutzt deinen hochgeladenen QR-Code (Einstellungen → Steuer &amp; Rechnungen).' : 'Lade unter Einstellungen → Steuer &amp; Rechnungen einen eigenen QR-Code hoch (z. B. Bezahl-Code). Ohne eigenes Bild wird ein Info-QR mit Rechnungsnummer und Betrag gedruckt.'}</div>` : ''}
      </div>
      <div class="card">
        <div class="card-title">${icon('rechnung')}<h2>Positionen</h2>${entwurf ? `<button class="btn btn-primary btn-sm no-print" id="addPos">${icon('plus')} Position</button>` : ''}</div>
        ${r.positionen.length ? `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Bezeichnung</th><th class="num">Menge</th><th class="num">Einzelpreis</th>${zeigtUst ? '<th class="num">USt</th>' : ''}<th class="num">Summe</th>${entwurf ? '<th></th>' : ''}</tr></thead>
          <tbody>${r.positionen.map((p, i) => `<tr><td>${U.esc(p.text)}</td><td class="num">${U.fmtNum(p.menge, 0)}</td><td class="num">${U.fmtEur(p.einzelpreis)}</td>${zeigtUst ? `<td class="num">${p.steuersatz || 0} %</td>` : ''}<td class="num"><b>${U.fmtEur(p.menge * p.einzelpreis)}</b></td>
            ${entwurf ? `<td class="no-print"><button class="btn btn-xs btn-ghost" data-pdel="${i}">${icon('trash')}</button></td>` : ''}</tr>`).join('')}</tbody></table></div>
          <div class="right mt12">
            <div style="font-size:19px;font-weight:800">Gesamtbetrag: ${U.fmtEur(brutto)}</div>
            ${Object.entries(steuern).map(([satz, val]) => `<div class="small muted">enthaltene USt ${U.fmtNum(+satz, 1)} %: ${U.fmtEur(val)}</div>`).join('')}
            ${rechnungHinweis(r) ? `<div class="small muted" style="max-width:420px;margin-left:auto">${rechnungHinweis(r)}</div>` : ''}
          </div>`
        : emptyState('rechnung', 'Noch keine Positionen. Füge Gläser aus dem Bestand oder freie Positionen hinzu.')}
      </div>`;
    const saveField = async (fn) => { fn(); await DB.put('rechnungen', r); };
    if (entwurf) {
      $('#r-kunde').onchange = (e) => saveField(() => { r.kundeId = e.target.value || null; });
      $('#r-datum').onchange = (e) => saveField(() => { r.datum = e.target.value; });
      $('#r-steuerart').onchange = (e) => { r.steuerart = e.target.value; r.kleinunternehmer = (e.target.value === 'klein'); DB.put('rechnungen', r).then(renderRoute); };
      $('#r-qr').onchange = (e) => saveField(() => { r.qrAufDruck = e.target.checked; });
      $('#addPos').onclick = () => Views.rechnung.posForm(r, abfAlle, chargenM);
      main.addEventListener('click', async (e) => {
        const b = e.target.closest('[data-pdel]');
        if (b && (await UI.confirm({ title: 'Position entfernen?', text: '', confirmText: 'Entfernen' }))) { r.positionen.splice(+b.dataset.pdel, 1); await DB.put('rechnungen', r); renderRoute(); }
      });
      $('#del').onclick = async () => {
        if (!(await UI.confirm({ title: 'Rechnungsentwurf löschen?', text: 'Wandert in den Papierkorb.' }))) return;
        await DB.softDel('rechnungen', r.id); navTo('rechnungen');
      };
      $('#final').onclick = () => Views.rechnung.festschreiben(r, abfAlle);
    }
    const st = $('#storno');
    if (st) st.onclick = async () => {
      if (!(await UI.confirm({ title: 'Rechnung stornieren?', text: 'Der Honigbestand wird wieder erhöht und im Kassenbuch ein Storno gebucht.' }))) return;
      for (const p of r.positionen) if (p.abfuellungId) { const a = await DB.get('abfuellungen', p.abfuellungId); if (a) { a.bestand += p.menge; await DB.put('abfuellungen', a); } }
      const { brutto } = rechnungSummen(r);
      await DB.put('kassenbuch', { datum: U.todayIso(), typ: 'einnahme', kategorie: 'Honigverkauf', betrag: -brutto, steuersatz: 0, kontaktId: r.kundeId, beschreibung: `Storno Rechnung ${r.nummer}`, rechnungId: r.id });
      r.status = 'storniert'; await DB.put('rechnungen', r);
      UI.toast('Rechnung storniert'); renderRoute();
    };
    $('#pdf').onclick = () => Pdf.rechnung(r.id);
  },
  posForm(r, abf, chargenM) {
    const verf = (abf || []).filter((a) => a.bestand > 0);
    UI.formModal({
      title: 'Position hinzufügen',
      fields: [
        { key: 'quelle', label: 'Art der Position', type: 'select', required: true, default: 'charge', options: [{ v: 'charge', l: 'Honig aus Bestand (Abfüllung)' }, { v: 'frei', l: 'Freie Position' }] },
        { key: 'abfuellungId', label: 'Abfüllung', type: 'select', options: verf.map((a) => { const c = chargenM.get(a.chargeId); return { v: a.id, l: `${abfLabel(a, c)} · ${a.bestand} verfügbar` }; }), showIf: (f) => f.quelle === 'charge' },
        { key: 'text', label: 'Bezeichnung', placeholder: 'wird bei Abfüllung automatisch gefüllt', showIf: (f) => f.quelle === 'frei', required: false },
        { key: 'menge', label: 'Menge (Stück)', type: 'number', required: true, default: 1 },
        { key: 'einzelpreis', label: 'Einzelpreis (€, brutto)', type: 'number', required: true },
        { key: 'steuersatz', label: 'USt-Satz', type: 'select', default: '7', options: [{ v: '0', l: '0 %' }, { v: '7', l: '7 % (Honig)' }, { v: '19', l: '19 %' }], showIf: () => rechnungSteuerart(r) === 'regel' },
      ],
      async onSave(v) {
        let text = v.text, abfuellungId = null;
        if (v.quelle === 'charge') {
          const a = verf.find((x) => x.id === v.abfuellungId);
          if (!a) throw new Error('Bitte eine Abfüllung wählen.');
          if (v.menge > a.bestand) throw new Error(`Nur ${a.bestand} Gläser im Bestand.`);
          const c = chargenM.get(a.chargeId);
          text = `Honig ${c && c.etikettNotiz ? '„' + c.etikettNotiz + '“ ' : ''}${gebindeLabel(a.gebindeG)} Glas (Los ${c ? c.losnummer : '?'})`;
          abfuellungId = a.id;
        }
        if (!text) throw new Error('Bitte eine Bezeichnung angeben.');
        r.positionen.push({ text, abfuellungId, menge: Math.round(v.menge), einzelpreis: v.einzelpreis, steuersatz: +v.steuersatz || 0 });
        await DB.put('rechnungen', r); renderRoute();
      },
    });
  },
  async festschreiben(r, abf) {
    if (!r.kundeId) return UI.toast('Bitte zuerst einen Kunden wählen', 'err');
    if (!r.positionen.length) return UI.toast('Die Rechnung hat keine Positionen', 'err');
    for (const p of r.positionen) if (p.abfuellungId) {
      const a = abf.find((x) => x.id === p.abfuellungId);
      if (a && p.menge > a.bestand) return UI.toast(`Bestand dieser Abfüllung reicht nicht (${a.bestand} verfügbar)`, 'err');
    }
    if (!(await UI.confirm({ title: 'Rechnung festschreiben?', text: 'Die Rechnung erhält die nächste fortlaufende Nummer, der Honigbestand wird gemindert und die Einnahme im Kassenbuch gebucht. Danach ist sie nicht mehr änderbar.', confirmText: 'Festschreiben', danger: false }))) return;
    const kreis = S.get('rechnungskreis');
    r.nummer = `${kreis.prefix}${String(kreis.next).padStart(4, '0')}`;
    kreis.next += 1; await S.set('rechnungskreis', kreis);
    for (const p of r.positionen) if (p.abfuellungId) { const a = await DB.get('abfuellungen', p.abfuellungId); if (a) { a.bestand -= p.menge; await DB.put('abfuellungen', a); } }
    const { brutto } = rechnungSummen(r);
    await DB.put('kassenbuch', { datum: r.datum, typ: 'einnahme', kategorie: 'Honigverkauf', betrag: brutto, steuersatz: 0, kontaktId: r.kundeId, beschreibung: `Rechnung ${r.nummer}`, rechnungId: r.id });
    r.status = 'festgeschrieben'; await DB.put('rechnungen', r);
    UI.toast(`Rechnung ${r.nummer} festgeschrieben`); renderRoute();
  },
};

/* =====================================================================
   MODUL: INVENTAR / MATERIAL (Anlagen, Zuordnung, Gesamtwert)
   ===================================================================== */
/** Gemeinsame Render-Funktion für Inventar UND Verbrauchsmaterial (nur Datenteilmenge/Labels unterscheiden sich). */
async function renderInventarBereich(main, cfg) {
  const view = cfg.view;
  const staende = await idMap('staende'), voelker = await idMap('voelker');
  const alle = U.sortBy((await DB.getAll('inventar')).filter((i) => inventarTyp(i) === cfg.typ), (i) => i.bezeichnung.toLowerCase());
  const jahre = [...new Set(alle.map((i) => (i.anschaffung || '').slice(0, 4)).filter(Boolean))].sort().reverse();
  const hatOhneJahr = alle.some((i) => !i.anschaffung);
  const arten = [...new Set(alle.map((i) => i.kategorie).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'de'));
  const jahr = view._jahr || '', art = view._art || '';
  const passt = (i) => (!jahr || (jahr === '__ohne' ? !i.anschaffung : (i.anschaffung || '').startsWith(jahr))) && (!art || i.kategorie === art);
  const list = alle.filter(passt);
  const wertVon = (i) => (i.preis || 0) * (i.stueckzahl || 1);
  const wert = U.sum(list, wertVon), stueck = U.sum(list, (i) => i.stueckzahl || 1);
  const proArt = [...U.groupBy(list, (i) => i.kategorie || 'Ohne Kategorie').entries()]
    .map(([k, items]) => ({ k, n: items.length, stueck: U.sum(items, (i) => i.stueckzahl || 1), wert: U.sum(items, wertVon) }))
    .sort((a, b) => b.wert - a.wert);
  const chip = (label, val, cur, attr) => `<button class="chip ${String(cur) === String(val) ? 'active' : ''}" data-${attr}="${U.esc(val)}">${U.esc(label)}</button>`;
  main.innerHTML = pageHead(cfg.titel, `${alle.length} Positionen · ${cfg.subtitle}`,
    `<span class="flex-wrap no-print"><button class="btn btn-ghost btn-sm" id="pdf">${icon('doc')} ${cfg.titel} (PDF)</button><button class="btn btn-primary" id="add">${icon('plus')} Neue Position</button></span>`) +
    (alle.length ? `
    <div class="chip-row mb8 no-print"><span class="small muted" style="align-self:center;margin-right:4px">Jahr:</span>${chip('Alle', '', jahr, 'jahr')}${jahre.map((j) => chip(j, j, jahr, 'jahr')).join('')}${hatOhneJahr ? chip('ohne Datum', '__ohne', jahr, 'jahr') : ''}</div>
    <div class="chip-row mb12 no-print"><span class="small muted" style="align-self:center;margin-right:4px">Art:</span>${chip('Alle', '', art, 'art')}${arten.map((a) => chip(a, a, art, 'art')).join('')}</div>
    <div class="stat-grid mb16">
      <div class="stat"><div class="s-label">${icon(cfg.ic)} Positionen</div><div class="s-value">${list.length}</div></div>
      <div class="stat"><div class="s-label">Stück gesamt</div><div class="s-value">${stueck}</div></div>
      <div class="stat"><div class="s-label">${icon('euro')} Wert${jahr || art ? ' (Auswahl)' : ''}</div><div class="s-value">${U.fmtEur(wert)}</div></div>
    </div>
    <div class="card"><div class="card-title">${icon(cfg.ic)}<h2>Gesamtübersicht nach Art</h2></div>
      ${proArt.length ? `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Art</th><th class="num">Positionen</th><th class="num">Stück</th><th class="num">Wert</th></tr></thead>
        <tbody>${proArt.map((r) => `<tr><td><b>${U.esc(r.k)}</b></td><td class="num">${r.n}</td><td class="num">${r.stueck}</td><td class="num">${U.fmtEur(r.wert)}</td></tr>`).join('')}
        <tr style="border-top:2px solid var(--line);font-weight:700"><td>Gesamt</td><td class="num">${list.length}</td><td class="num">${stueck}</td><td class="num">${U.fmtEur(wert)}</td></tr></tbody></table></div>` : '<p class="small muted">Keine Positionen in dieser Auswahl.</p>'}
    </div>` : '') +
    `<div class="card">` + (alle.length ? (list.length ? `<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Bezeichnung</th><th>Kategorie</th><th class="num">Stück</th><th class="num">Preis</th><th class="num">Wert</th><th>Zuordnung</th><th>Anschaffung</th><th class="no-print"></th></tr></thead>
      <tbody>${list.map((i) => { const abgelaufen = i.ablauf && i.ablauf < U.todayIso(); const laueftAb = i.ablauf && !abgelaufen && U.daysBetween(U.todayIso(), i.ablauf) <= MHD_WARN_TAGE; const knapp = i.mindestbestand > 0 && (i.stueckzahl || 0) <= i.mindestbestand;
        const badge = abgelaufen ? '<span class="badge b-danger">abgelaufen</span>' : laueftAb ? `<span class="badge b-warn">MHD ${U.fmtDate(i.ablauf)}</span>` : knapp ? '<span class="badge b-warn">Bestand niedrig</span>' : '';
        return `<tr><td><b>${U.esc(i.bezeichnung)}</b> ${badge}${i.notiz ? `<br><span class="small muted">${U.esc(i.notiz)}</span>` : ''}</td><td>${U.esc(i.kategorie || '–')}</td>
        <td class="num">${i.stueckzahl || 1}</td><td class="num">${U.fmtEur(i.preis)}</td><td class="num"><b>${U.fmtEur(wertVon(i))}</b></td>
        <td>${U.esc(staende.get(i.standId)?.name || voelker.get(i.volkId)?.name || '–')}</td><td>${U.fmtDate(i.anschaffung) || '–'}</td>
        <td class="no-print"><button class="btn btn-xs btn-ghost" data-edit="${i.id}">${icon('pencil')}</button></td></tr>`; }).join('')}</tbody></table></div>`
      : '<p class="small muted">Keine Positionen passen zu Jahr/Art-Auswahl.</p>')
    : emptyState(cfg.ic, cfg.leer, `<button class="btn btn-primary" id="add2">${icon('plus')} Erste Position</button>`)) + `</div>`;
  const pdfBtn = $('#pdf', main); if (pdfBtn) pdfBtn.onclick = () => Pdf.inventar(jahr, art, cfg.typ, cfg.titel);
  const form = async (i) => UI.formModal({
    title: i ? 'Position bearbeiten' : `Neue Position · ${cfg.titel}`,
    fields: [
      { key: 'bezeichnung', label: 'Bezeichnung', type: 'suggest', required: true, options: await gelernteWerte(VORSCHLAEGE.inventar, 'inventar', 'bezeichnung'), placeholder: cfg.typ === 'verbrauch' ? 'z. B. Ameisensäure 60 %' : 'z. B. Zanderbeute komplett' },
      { key: 'kategorie', label: 'Kategorie', type: 'select', options: cfg.kategorien.map((k) => ({ v: k, l: k })) },
      { key: 'stueckzahl', label: 'Stückzahl / Bestand', type: 'number', default: 1, required: true },
      { key: 'preis', label: 'Preis je Stück (€)', type: 'number' },
      { key: 'anschaffung', label: cfg.typ === 'verbrauch' ? 'Kaufdatum' : 'Anschaffungsdatum', type: 'date' },
      { key: 'ablauf', label: 'Ablaufdatum / MHD', type: 'date', hint: 'Für Verbrauchsmaterial wie Varroa-Mittel oder Futter – die App erinnert vor Ablauf.' },
      { key: 'mindestbestand', label: 'Mindestbestand', type: 'number', hint: 'Optional: Erinnerung, wenn der Bestand darunter fällt.' },
      { key: 'standId', label: 'Zuordnung Stand', type: 'select', options: [...staende.values()].map((s) => ({ v: s.id, l: s.name })) },
      { key: 'volkId', label: 'Zuordnung Volk', type: 'select', options: [...voelker.values()].filter((v) => v.status === 'aktiv').map((v) => ({ v: v.id, l: v.name })) },
      { key: 'notiz', label: 'Notiz', type: 'textarea' },
    ],
    values: i || {},
    async onSave(v) { v.stueckzahl = Math.round(v.stueckzahl || 1); await DB.put('inventar', Object.assign(i || { typ: cfg.typ }, v, { typ: cfg.typ })); pruefeMhd(); UI.toast('Gespeichert'); renderRoute(); },
    onDelete: papierkorbDelete('inventar', i, 'Position löschen?', 'Wandert in den Papierkorb.'),
  });
  bindAdd(() => form(null));
  main.addEventListener('click', (e) => {
    const j = e.target.closest('[data-jahr]'); if (j) { view._jahr = j.dataset.jahr; return renderRoute(); }
    const a = e.target.closest('[data-art]'); if (a) { view._art = a.dataset.art; return renderRoute(); }
    const b = e.target.closest('[data-edit]'); if (b) form(alle.find((x) => x.id === b.dataset.edit));
  });
}
Views.inventar = {
  title: 'Inventar',
  render(main) { return renderInventarBereich(main, { view: Views.inventar, typ: 'inventar', titel: 'Inventar', subtitle: 'langlebige Gebrauchsgüter (Beuten, Geräte …)', kategorien: INVENTAR_KATEGORIEN, ic: 'box', leer: 'Noch kein Inventar erfasst – Beuten, Zargen, Schleuder, Anhänger …' }); },
};
Views.material = {
  title: 'Verbrauchsmaterial',
  render(main) { return renderInventarBereich(main, { view: Views.material, typ: 'verbrauch', titel: 'Verbrauchsmaterial', subtitle: 'Verbrauchsgüter (Mittel, Futter, Gläser …)', kategorien: MATERIAL_KATEGORIEN, ic: 'flask', leer: 'Noch kein Verbrauchsmaterial erfasst – Behandlungsmittel, Futter, Gläser, Etiketten …' }); },
};

/* =====================================================================
   MODUL: AUFGABEN & KALENDER (inkl. Auto-Termine aus Zucht/Behandlung)
   ===================================================================== */
Views.aufgaben = {
  title: 'Aufgaben & Kalender',
  async render(main) {
    const all = await DB.getAll('aufgaben');
    const heute = U.todayIso();
    const offen = U.sortBy(all.filter((a) => !a.erledigt), (a) => a.faellig || '9999');
    const erledigt = U.sortBy(all.filter((a) => a.erledigt), (a) => a.faellig || '', true).slice(0, 15);
    const grp = { ueberfaellig: [], heuteL: [], woche: [], spaeter: [] };
    for (const a of offen) {
      if (!a.faellig) grp.spaeter.push(a);
      else if (a.faellig < heute) grp.ueberfaellig.push(a);
      else if (a.faellig === heute) grp.heuteL.push(a);
      else if (U.daysBetween(heute, a.faellig) <= 7) grp.woche.push(a);
      else grp.spaeter.push(a);
    }
    const quelleBadge = (a) => a.quelle === 'zucht' ? '<span class="badge b-violet">Zucht</span>' : a.quelle === 'behandlung' ? '<span class="badge b-blue">Behandlung</span>' : a.quelle === 'fuetterung' ? '<span class="badge b-honey">Fütterung</span>' : a.quelle === 'mhd' ? '<span class="badge b-warn">MHD</span>' : '';
    const rows = (items, cls) => items.map((a) => `
      <div class="row" style="min-height:50px">
        <label class="check-line no-print" style="padding:0"><input type="checkbox" data-check="${a.id}" ${a.erledigt ? 'checked' : ''}></label>
        <button class="r-main" data-open="${a.id}" style="text-align:left;background:none;border:none;cursor:pointer;min-width:0">
          <span class="r-title" style="${a.erledigt ? 'text-decoration:line-through;opacity:.55' : ''}">${U.esc(a.titel)} ${quelleBadge(a)}</span>
          ${a.notiz ? `<span class="r-sub">${U.esc(a.notiz)}</span>` : ''}</button>
        <span class="badge ${cls}">${a.faellig ? U.fmtDate(a.faellig) : 'kein Datum'}</span>
      </div>`).join('');
    const sec = (title, items, cls) => items.length ? `<h3 class="mt16 mb8">${title} (${items.length})</h3><div class="rows">${rows(items, cls)}</div>` : '';
    main.innerHTML = pageHead('Aufgaben & Kalender', `${offen.length} offen`,
      `<span class="flex-wrap no-print"><button class="btn btn-ghost btn-sm" onclick="Notif.icsExport()" title="Offene Aufgaben in den Kalender übernehmen – erinnert auch bei geschlossener App">${icon('kalender')} Kalender (.ics)</button>
       <button class="btn btn-primary" id="add">${icon('plus')} Neue Aufgabe</button></span>`) +
      `<div class="grid2" style="grid-template-columns:1fr;max-width:none">
        <div class="card" id="cal-card"><div class="card-title">${icon('kalender')}<h2 id="cal-title"></h2>
          <span class="no-print"><button class="icon-btn" id="cal-prev">‹</button><button class="icon-btn" id="cal-next">›</button></span></div>
          <div class="cal" id="cal"></div></div>
        <div class="card">
          ${offen.length || erledigt.length ? `
            ${sec('Überfällig', grp.ueberfaellig, 'b-danger')}
            ${sec('Heute', grp.heuteL, 'b-honey')}
            ${sec('Diese Woche', grp.woche, 'b-warn')}
            ${sec('Später', grp.spaeter, 'b-muted')}
            ${sec('Erledigt (letzte 15)', erledigt, 'b-ok')}`
          : emptyState('task', 'Keine Aufgaben. Zuchtserien und Behandlungen mit Wartezeit erzeugen hier automatisch Termine.', `<button class="btn btn-primary" id="add2">${icon('plus')} Erste Aufgabe</button>`)}
        </div>
      </div>`;
    // Monatskalender mit Aufgaben-Punkten
    const calState = Views.aufgaben._cal || (Views.aufgaben._cal = { y: +heute.slice(0, 4), m: +heute.slice(5, 7) - 1 });
    const drawCal = () => {
      const first = new Date(calState.y, calState.m, 1);
      $('#cal-title').textContent = first.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
      const startIdx = (first.getDay() + 6) % 7; // Montag = 0
      const cells = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(calState.y, calState.m, 1 - startIdx + i);
        const iso = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        const tasks = all.filter((a) => a.faellig === iso && !a.erledigt);
        cells.push(`<div class="c-day ${d.getMonth() !== calState.m ? 'other' : ''} ${iso === heute ? 'today' : ''} ${tasks.length ? 'clickable' : ''}" data-day="${iso}">
          ${d.getDate()}${tasks.length ? `<span class="c-dots">${tasks.slice(0, 3).map((t) => `<i class="${t.faellig < heute ? 'overdue' : ''}"></i>`).join('')}</span>` : ''}</div>`);
      }
      $('#cal').innerHTML = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'].map((d) => `<div class="c-head">${d}</div>`).join('') + cells.join('');
    };
    drawCal();
    $('#cal-prev').onclick = () => { calState.m--; if (calState.m < 0) { calState.m = 11; calState.y--; } drawCal(); };
    $('#cal-next').onclick = () => { calState.m++; if (calState.m > 11) { calState.m = 0; calState.y++; } drawCal(); };
    const form = (a) => UI.formModal({
      title: a ? 'Aufgabe bearbeiten' : 'Neue Aufgabe',
      fields: [
        { key: 'titel', label: 'Aufgabe', required: true, placeholder: 'z. B. Futterkontrolle Volk 3' },
        { key: 'faellig', label: 'Fällig am', type: 'date' },
        { key: 'kategorie', label: 'Tätigkeit (Zeiterfassung)', type: 'select', options: S.get('taetigkeiten').map((t) => ({ v: t, l: t })) },
        { key: 'zeitMinuten', label: 'Zeitaufwand (Minuten)', type: 'number', hint: 'Wird beim Abhaken automatisch abgefragt – hier änderbar.' },
        { key: 'notiz', label: 'Notiz', type: 'textarea' },
      ],
      values: a || {},
      async onSave(v) { v.zeitMinuten = v.zeitMinuten ? Math.round(v.zeitMinuten) : null; await DB.put('aufgaben', Object.assign(a || { erledigt: false, quelle: 'manuell', refId: null }, v)); UI.toast('Aufgabe gespeichert'); renderRoute(); },
      onDelete: papierkorbDelete('aufgaben', a, 'Aufgabe löschen?', 'Wandert in den Papierkorb.'),
    });
    const add = () => form(null);
    bindAdd(add);
    main.addEventListener('click', async (e) => {
      const chk = e.target.closest('[data-check]');
      if (chk) {
        const a = all.find((x) => x.id === chk.dataset.check);
        a.erledigt = chk.checked;
        await DB.put('aufgaben', a); Notif.check(); renderRoute();
        if (a.erledigt && !a.zeitMinuten) zeitDialog(a); // Zeiterfassung beim Erledigen
        return;
      }
      const op = e.target.closest('[data-open]');
      if (op) { form(all.find((x) => x.id === op.dataset.open)); return; }
      const day = e.target.closest('.c-day.clickable');
      if (day) {
        const tasks = all.filter((a) => a.faellig === day.dataset.day && !a.erledigt);
        UI.modal({ title: `Aufgaben am ${U.fmtDate(day.dataset.day)}`, body: `<div class="rows">${tasks.map((t) => `<div class="row"><span class="r-main"><span class="r-title">${U.esc(t.titel)}</span>${t.notiz ? `<span class="r-sub">${U.esc(t.notiz)}</span>` : ''}</span>${quelleBadge(t)}</div>`).join('')}</div>` });
      }
    });
  },
};

/** Schnellabfrage beim Erledigen einer Aufgabe: Dauer + Tätigkeit */
function zeitDialog(a) {
  const taetigkeiten = S.get('taetigkeiten');
  const vorschlag = { zucht: 'Zucht', behandlung: 'Behandlung', fuetterung: 'Fütterung' }[a.quelle] || a.kategorie || '';
  const m = UI.modal({
    title: 'Wie lange hat es gedauert?',
    body: `<p class="small muted mb12">„${U.esc(a.titel)}“ – landet in deiner <a href="#/zeiten">Zeiterfassung</a>.</p>
      <div class="chip-row mb12" id="zt-chips">${[15, 30, 45, 60, 90, 120].map((n) => `<button class="chip" data-min="${n}">${n < 60 ? n + ' min' : (n / 60).toLocaleString('de-DE') + ' h'}</button>`).join('')}</div>
      <div class="field"><label>Oder Minuten eingeben</label><input class="inp" id="zt-min" inputmode="numeric" placeholder="z. B. 25"></div>
      <div class="field"><label>Tätigkeit</label><select class="inp" id="zt-kat">${optionenSortiert(taetigkeiten, true).map((t) => `<option ${t === vorschlag ? 'selected' : ''}>${U.esc(t)}</option>`).join('')}</select></div>`,
    footer: `<button class="btn btn-ghost" data-skip>Ohne Zeit</button><button class="btn btn-primary" data-ok>Speichern</button>`,
  });
  const speichern = async (min) => {
    if (min > 0) { a.zeitMinuten = min; a.kategorie = $('#zt-kat', m.el).value; await DB.put('aufgaben', a); UI.toast('Zeit erfasst'); }
    m.close(true); renderRoute();
  };
  $('#zt-chips', m.el).addEventListener('click', (e) => { const b = e.target.closest('[data-min]'); if (b) speichern(+b.dataset.min); });
  $('[data-ok]', m.el).onclick = () => { const n = Math.round(U.parseNum($('#zt-min', m.el).value)); speichern(n > 0 ? n : 0); };
  $('[data-skip]', m.el).onclick = () => m.close(true);
}

/* =====================================================================
   MODUL: ZEITERFASSUNG (Stunden je Tätigkeit als Tortendiagramm)
   ===================================================================== */
Views.zeiten = {
  title: 'Zeiterfassung',
  async render(main) {
    const alle = (await DB.getAll('aufgaben')).filter((a) => a.erledigt && a.zeitMinuten > 0);
    const datumVon = (a) => a.faellig || (a.lastModified || '').slice(0, 10);
    const jahre = [...new Set(alle.map((a) => datumVon(a).slice(0, 4)))].filter(Boolean).sort().reverse();
    const jahr = Views.zeiten._jahr || jahre[0] || U.todayIso().slice(0, 4);
    const list = alle.filter((a) => datumVon(a).startsWith(jahr));
    const stunden = Reporting.zeiten(list);
    const gesamtMin = U.sum(list, (a) => a.zeitMinuten);
    main.innerHTML = pageHead('Zeiterfassung', 'Wie viel Zeit steckt in welcher Tätigkeit? Zeiten entstehen beim Abhaken von Aufgaben.',
      `<button class="btn btn-primary no-print" id="add">${icon('plus')} Zeit nachtragen</button>`) +
      (jahre.length > 1 ? `<div class="chip-row mb16 no-print">${jahre.map((j) => `<button class="chip ${j === jahr ? 'active' : ''}" data-jahr="${j}">${j}</button>`).join('')}</div>` : '') + `
      <div class="stat-grid mb16">
        <div class="stat"><div class="s-label">${icon('uhr')} Stunden ${jahr}</div><div class="s-value">${U.fmtNum(gesamtMin / 60, 1)}</div></div>
        <div class="stat"><div class="s-label">${icon('task')} Einträge</div><div class="s-value">${list.length}</div></div>
        <div class="stat"><div class="s-label">${icon('chart')} Ø je Eintrag</div><div class="s-value">${list.length ? U.fmtNum(gesamtMin / list.length, 0) : '–'}<span style="font-size:14px"> min</span></div></div>
      </div>
      <div class="card"><div class="card-title">${icon('uhr')}<h2>Stunden je Tätigkeit ${jahr}</h2></div>
        ${UI.pie({ posten: stunden, einheit: 'h' })}
      </div>
      <div class="card"><div class="card-title">${icon('buch')}<h2>Letzte Einträge</h2></div>
        ${list.length ? `<div class="rows">${U.sortBy(list, datumVon, true).slice(0, 60).map((a) => `<button class="row" data-id="${a.id}" style="min-height:46px">
          <span class="r-main"><span class="r-title">${U.esc(a.titel)}</span><span class="r-sub">${U.fmtDate(datumVon(a))} · ${U.esc(a.kategorie || 'Sonstiges')}${a.quelle && a.quelle !== 'manuell' ? ' · aus Aufgabe' : ''}</span></span>
          <span class="badge b-honey">${a.zeitMinuten >= 60 ? U.fmtNum(a.zeitMinuten / 60, 1) + ' h' : a.zeitMinuten + ' min'}</span>${icon('chevR', 'chev')}</button>`).join('')}</div>
          <p class="hint mt8">Tippe einen Eintrag an, um Dauer, Tätigkeit oder Datum zu ändern.</p>`
        : emptyState('uhr', 'Noch keine Zeiten erfasst. Hake eine Aufgabe ab (die App fragt dann nach der Dauer) oder trage hier eine Zeit nach.')}
      </div>`;
    const form = (a) => {
      // Alte Tätigkeit erhalten, falls sie inzwischen aus den Einstellungen entfernt wurde
      const kats = [...S.get('taetigkeiten')];
      if (a && a.kategorie && !kats.includes(a.kategorie)) kats.push(a.kategorie);
      UI.formModal({
        title: a ? 'Zeiteintrag bearbeiten' : 'Zeit nachtragen',
        fields: [
          { key: 'titel', label: 'Was hast du gemacht?', required: true, placeholder: 'z. B. Rähmchen gedrahtet' },
          { key: 'datum', label: 'Datum', type: 'date', required: true, default: U.todayIso() },
          { key: 'kategorie', label: 'Tätigkeit', type: 'select', required: true, options: kats.map((t) => ({ v: t, l: t })) },
          { key: 'zeitMinuten', label: 'Dauer (Minuten)', type: 'number', required: true },
        ],
        values: a ? { titel: a.titel, datum: datumVon(a), kategorie: a.kategorie || 'Sonstiges', zeitMinuten: a.zeitMinuten } : {},
        async onSave(v) {
          await DB.put('aufgaben', Object.assign(a || { quelle: 'manuell', refId: null, notiz: '' }, { titel: v.titel, faellig: v.datum, erledigt: true, kategorie: v.kategorie, zeitMinuten: Math.round(v.zeitMinuten) }));
          UI.toast(a ? 'Zeiteintrag aktualisiert' : 'Zeit erfasst'); renderRoute();
        },
        onDelete: a ? papierkorbDelete('aufgaben', a, 'Zeiteintrag löschen?', 'Wandert in den Papierkorb.') : undefined,
      });
    };
    bindAdd(() => form(null));
    main.addEventListener('click', (e) => {
      const c = e.target.closest('[data-jahr]'); if (c) { Views.zeiten._jahr = c.dataset.jahr; return renderRoute(); }
      const r = e.target.closest('.row[data-id]'); if (r) { const a = list.find((x) => x.id === r.dataset.id); if (a) form(a); }
    });
  },
};

        `<div class="grid2">
          <div class="field"><label>Anzahl Völker</label><input class="inp rk" data-rm="voelker" inputmode="numeric" value="${aktiveV || 5}"></div>
          <div class="field"><label>Zargen pro Volk</label><input class="inp rk" data-rm="zargen" inputmode="numeric" value="3"></div>
          <div class="field"><label>Rähmchen pro Zarge</label><input class="inp rk" data-rm="proZarge" inputmode="numeric" value="10"></div>

      grp('Wachs & Produkte') +
      rk('honig', 'Wachsertrag', 'Reinwachs aus Altwachs berechnen',
        `<div class="grid2">
          <div class="field"><label>Altwachs (kg)</label><input class="inp rk" data-we="menge" inputmode="decimal" value="5"></div>
          <div class="field"><label>Schmelzmethode</label><select class="inp rk" data-we="methode"><option value="dampf">Dampfwachsschmelzer (~65 %)</option><option value="sonne">Sonnenwachsschmelzer (~40 %)</option></select></div>
        </div>
        <div id="we-out" class="mt8"></div>`) +

      rk('honig', 'Kerzenrechner', 'Wie viele Kerzen aus deinem Wachs?',
        `<div class="grid2">
          <div class="field"><label>Verfügbares Wachs (g)</label><input class="inp rk" data-kr="wachs" inputmode="numeric" value="500"></div>
          <div class="field"><label>Kerzentyp</label><select class="inp rk" data-kr="typ"><option value="stumpe">Stumpenkerze (~200 g)</option><option value="tafel">Tafelkerze (~80 g)</option><option value="teelicht">Teelicht (~15 g)</option><option value="baum">Baumkerze (~10 g)</option></select></div>
        </div>
        <div id="kr-out" class="mt8"></div>`) +

      rk('flask', 'Propolis-Tinktur', 'Propolis-Lösung ansetzen',
        `<div class="grid2">
          <div class="field"><label>Propolis roh (g)</label><input class="inp rk" data-pt="propolis" inputmode="numeric" value="20"></div>
          <div class="field"><label>Alkohol</label><select class="inp rk" data-pt="alk"><option value="96">96 % Ethanol</option><option value="70" selected>70 % (Apotheke)</option><option value="40">40 % (Wodka)</option></select></div>
        </div>
        <div class="hint mt6">Standard 1:4 (Propolis:Alkohol). 4–6 Wochen dunkel ziehen lassen, täglich schütteln, durch Kaffeefilter abseihen.</div>
        <div id="pt-out" class="mt8"></div>`);

    main.addEventListener('click', (e) => {
      const head = e.target.closest('.rk-head');
      if (!head) return;
      const body = head.nextElementSibling;
      if (!body || !body.classList.contains('rk-body')) return;
      const isOpen = head.classList.contains('open');
      head.classList.toggle('open');
      body.style.display = isOpen ? 'none' : '';
      if (!isOpen) { rechne(); head.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    });
    const num = (sel) => U.parseNum($(sel, main)?.value);
    const rechne = () => {
      const glas = num('[data-hp="glas"]') || 500, gk = num('[data-hp="glaskosten"]') || 0, et = num('[data-hp="etikett"]') || 0,
        hkg = num('[data-hp="honigkg"]') || 0, zeit = num('[data-hp="zeit"]') || 0, satz = num('[data-hp="stundensatz"]') || 0, auf = num('[data-hp="aufschlag"]') || 0;
      const material = gk + et + (hkg * glas / 1000);
      const arbeit = (zeit / 60) * satz;
      const selbst = material + arbeit;
      const vk = selbst * (1 + auf / 100);
      const hpOut = $('#hp-out', main);
      if (hpOut) hpOut.innerHTML = `
        <div class="stat"><div class="s-label">Selbstkosten je Glas</div><div class="s-value">${U.fmtEur(selbst)}</div><div class="s-sub">Material ${U.fmtEur(material)} + Arbeit ${U.fmtEur(arbeit)}</div></div>
        <div class="stat"><div class="s-label">Empf. Verkaufspreis</div><div class="s-value" style="color:var(--honey-deep)">${U.fmtEur(vk)}</div><div class="s-sub">inkl. ${U.fmtNum(auf, 0)} % Aufschlag</div></div>
        <div class="stat"><div class="s-label">Preis je kg</div><div class="s-value">${glas > 0 ? U.fmtEur(vk / (glas / 1000)) : '–'}</div></div>`;
      const w = num('[data-wg="wert"]');
      let wb;
      if (isNaN(w)) wb = '';
      else if (w < 18) wb = `<div class="banner info">${icon('check')} <span class="b-msg"><b>${U.fmtNum(w, 1)} %</b> – sehr gut. Unter 18 % (DIB-Qualität).</span></div>`;
      else if (w <= 20) wb = `<div class="banner warn">${icon('info')} <span class="b-msg"><b>${U.fmtNum(w, 1)} %</b> – verkehrsfähig (bis 20 %), aber nicht Premium.</span></div>`;
      else wb = `<div class="banner danger">${icon('warn')} <span class="b-msg"><b>${U.fmtNum(w, 1)} %</b> – über 20 %: nicht verkehrsfähig, Gärgefahr.</span></div>`;
      const wgOut = $('#wg-out', main);
      if (wgOut) wgOut.innerHTML = wb;
      const wiE = num('[data-wi="ertrag"]') || 0, wiP = num('[data-wi="preis"]') || 0,
        wiK = num('[data-wi="kosten"]') || 0, wiV = Math.max(1, Math.round(num('[data-wi="voelker"]') || 1));
      const wiErloes = wiE * wiP, wiGewinn = wiErloes - wiK, wiGesamt = wiGewinn * wiV;
      const wiOut = $('#wi-out', main);
      if (wiOut) wiOut.innerHTML = `
        <div class="stat"><div class="s-label">Erlös je Volk</div><div class="s-value">${U.fmtEur(wiErloes)}</div><div class="s-sub">${U.fmtNum(wiE)} kg × ${U.fmtEur(wiP)}/kg</div></div>
        <div class="stat"><div class="s-label">Gewinn je Volk</div><div class="s-value">${U.fmtEur(wiGewinn)}</div><div class="s-sub">abzgl. ${U.fmtEur(wiK)} Kosten</div></div>
        <div class="stat"><div class="s-label">Gesamt (${wiV} Völker)</div><div class="s-value">${U.fmtEur(wiGesamt)}</div></div>`;
      const zm = num('[data-zs="menge"]') || 0, verh = $('[data-zs="verh"]', main)?.value;
      const zAnteil = verh === '3:2' ? 3 / 5 : 1 / 2;
      const zucker = zm * zAnteil, wasser = zm * (1 - zAnteil);
      const zsOut = $('#zs-out', main);
      if (zsOut) zsOut.innerHTML = `<div class="flex-wrap"><span class="kpill">Zucker: <b>${U.fmtNum(zucker, 1)} kg</b></span><span class="kpill">Wasser: <b>${U.fmtNum(wasser, 1)} L</b></span><span class="kpill">ergibt ~${U.fmtNum(zm, 1)} kg Sirup</span></div>`;
      const vv = Math.round(num('[data-wf="voelker"]') || 0), je = num('[data-wf="jeVolk"]') || 0;
      const gesamt = vv * je;
      const wfOut = $('#wf-out', main);
      if (wfOut) wfOut.innerHTML = `
        <div class="stat"><div class="s-label">Gesamt-Winterfutter</div><div class="s-value">${U.fmtNum(gesamt, 0)} kg</div><div class="s-sub">${vv} Völker × ${U.fmtNum(je)} kg</div></div>
        <div class="stat"><div class="s-label">≈ Zuckerbedarf</div><div class="s-value">${U.fmtNum(gesamt, 0)} kg</div><div class="s-sub">grober Richtwert (Wasser verdunstet)</div></div>`;
      const bm = $('#beh-mittel', main)?.value;
      if (bm) {
        $$('.beh-grp', main).forEach((g) => g.style.display = g.dataset.bg === bm ? '' : 'none');
        let bhtml = '';
        if (bm === 'os-traeufeln') {
          const g = Math.round(num('[data-beh="gassen"]') || 0), v = Math.max(1, Math.round(num('[data-beh="bv1"]') || 1));
          const mlV = Math.min(g * 5, 50), mlG = mlV * v;
          bhtml = `<div class="stat-grid">
            <div class="stat"><div class="s-label">Pro Volk</div><div class="s-value">${mlV} ml</div><div class="s-sub">${g} Gassen × 5 ml${g * 5 > 50 ? ' (max. 50)' : ''}</div></div>
            <div class="stat"><div class="s-label">Gesamt${v > 1 ? ` (${v} Völker)` : ''}</div><div class="s-value">${mlG} ml</div><div class="s-sub">${U.fmtNum(mlG / 1000, 2)} L OS-Lösung 3,5 %</div></div></div>`;
        } else if (bm === 'os-verdampfen') {
          const z = Math.round(num('[data-beh="zargen"]') || 0), v = Math.max(1, Math.round(num('[data-beh="bv2"]') || 1));
          const gV = z, gG = gV * v;
          bhtml = `<div class="stat-grid">
            <div class="stat"><div class="s-label">Pro Volk</div><div class="s-value">${gV} g</div><div class="s-sub">${z} Zargen × 1 g</div></div>
            <div class="stat"><div class="s-label">Gesamt${v > 1 ? ` (${v} Völker)` : ''}</div><div class="s-value">${gG} g</div><div class="s-sub">OS-Dihydrat (Pulver)</div></div></div>`;
        } else if (bm === 'as-langzeit') {
          const v = Math.max(1, Math.round(num('[data-beh="bv3"]') || 1)), f = Math.round(num('[data-beh="asfuellung"]') || 200);
          const mlG = f * v;
          bhtml = `<div class="stat-grid">
            <div class="stat"><div class="s-label">Pro Volk</div><div class="s-value">${f} ml</div><div class="s-sub">60 % AS je Verdunster</div></div>
            <div class="stat"><div class="s-label">Gesamt${v > 1 ? ` (${v} Völker)` : ''}</div><div class="s-value">${mlG} ml</div><div class="s-sub">${U.fmtNum(mlG / 1000, 2)} L Ameisensäure 60 %</div></div></div>`;
        } else if (bm === 'ms-spruehen') {
          const w = Math.round(num('[data-beh="mswaben"]') || 0), v = Math.max(1, Math.round(num('[data-beh="bv4"]') || 1));
          const mlA = w * 2 * 8, mlG = mlA * v;
          bhtml = `<div class="stat-grid">
            <div class="stat"><div class="s-label">Pro Ableger</div><div class="s-value">${mlA} ml</div><div class="s-sub">${w} Waben × 2 Seiten × 8 ml</div></div>
            <div class="stat"><div class="s-label">Gesamt${v > 1 ? ` (${v} Ableger)` : ''}</div><div class="s-value">${mlG} ml</div><div class="s-sub">${U.fmtNum(mlG / 1000, 2)} L Milchsäure 15 %</div></div></div>`;
        }
        const behOut = $('#beh-out', main);
        if (behOut) behOut.innerHTML = bhtml;
      }
      const vbM = num('[data-vb="milben"]') || 0, vbB = num('[data-vb="bienen"]') || 0;
      const vbRate = vbB > 0 ? (vbM / vbB) * 100 : 0;
      const vbOut = $('#vb-out', main);
      if (vbOut) {
        let vbb;
        if (vbRate < 1) vbb = `<div class="banner info">${icon('check')} <span class="b-msg"><b>${U.fmtNum(vbRate, 1)} %</b> – unkritisch. Kein akuter Handlungsbedarf.</span></div>`;
        else if (vbRate <= 3) vbb = `<div class="banner warn">${icon('info')} <span class="b-msg"><b>${U.fmtNum(vbRate, 1)} %</b> – erhöht. Engmaschig kontrollieren.</span></div>`;
        else vbb = `<div class="banner danger">${icon('warn')} <span class="b-msg"><b>${U.fmtNum(vbRate, 1)} %</b> – kritisch! Sofort behandeln.</span></div>`;
        vbOut.innerHTML = vbb;
      }
      const oslM = num('[data-osl="menge"]') || 1000;
      const oslF = oslM / 1000;
      const oslOut = $('#osl-out', main);
      if (oslOut) oslOut.innerHTML = `<div class="flex-wrap"><span class="kpill">OS-Dihydrat: <b>${U.fmtNum(35 * oslF, 0)} g</b></span><span class="kpill">Zucker: <b>${U.fmtNum(500 * oslF, 0)} g</b></span><span class="kpill">Wasser: <b>${U.fmtNum(500 * oslF, 0)} ml</b></span><span class="kpill">ergibt ~${U.fmtNum(oslM, 0)} ml (3,5 %)</span></div>`;
      const asvM = num('[data-asv="menge"]') || 500, asvK = num('[data-asv="konz"]') || 85;
      const asvOut = $('#asv-out', main);
      if (asvOut) {
        if (asvK <= 60) { asvOut.innerHTML = `<div class="banner warn">${icon('info')} <span class="b-msg">Ausgangskonzentration muss über 60 % liegen.</span></div>`; }
        else { const asvAS = (60 / asvK) * asvM, asvW = asvM - asvAS; asvOut.innerHTML = `<div class="flex-wrap"><span class="kpill">AS ${U.fmtNum(asvK, 0)} %: <b>${U.fmtNum(asvAS, 0)} ml</b></span><span class="kpill">Dest. Wasser: <b>${U.fmtNum(asvW, 0)} ml</b></span><span class="kpill">ergibt ${U.fmtNum(asvM, 0)} ml AS 60 %</span></div>`; }
      }
      const vsG = Math.round(num('[data-vs="gassen"]') || 0);
      const vsMin = vsG * 2000, vsMax = vsG * 3000;
      let vsB;
      if (vsG <= 3) vsB = 'Schwach – ggf. vereinigen';
      else if (vsG <= 6) vsB = 'Mittelstark – aufbauen lassen';
      else if (vsG <= 9) vsB = 'Gut – normales Volk';
      else vsB = 'Sehr stark – schwarmgefährdet';
      const vsOut = $('#vs-out', main);
      if (vsOut) vsOut.innerHTML = `<div class="stat-grid">
        <div class="stat"><div class="s-label">Geschätzte Bienenzahl</div><div class="s-value">${U.fmtNum(vsMin, 0)} – ${U.fmtNum(vsMax, 0)}</div><div class="s-sub">${vsG} Gassen × 2 000–3 000</div></div>
        <div class="stat"><div class="s-label">Bewertung</div><div class="s-value" style="font-size:14px">${vsB}</div></div></div>`;
      const rmV = Math.round(num('[data-rm="voelker"]') || 0), rmZ = Math.round(num('[data-rm="zargen"]') || 0),
        rmPz = Math.round(num('[data-rm="proZarge"]') || 10), rmRes = num('[data-rm="reserve"]') || 0;
      const rmBasis = rmV * rmZ * rmPz, rmGesamt = Math.ceil(rmBasis * (1 + rmRes / 100)), rmWachs = rmGesamt * 0.11;
      const rmOut = $('#rm-out', main);
      if (rmOut) rmOut.innerHTML = `
        <div class="stat"><div class="s-label">Rähmchen gesamt</div><div class="s-value">${rmGesamt}</div><div class="s-sub">${rmBasis} + ${U.fmtNum(rmRes, 0)} % Reserve</div></div>
        <div class="stat"><div class="s-label">Mittelwände</div><div class="s-value">${rmGesamt} Stk.</div><div class="s-sub">≈ ${U.fmtNum(rmWachs, 1)} kg Wachs</div></div>`;
      const weM = num('[data-we="menge"]') || 0, weMeth = $('[data-we="methode"]', main)?.value;
      const weFaktor = weMeth === 'sonne' ? 0.40 : 0.65;
      const weE = weM * weFaktor;
      const weOut = $('#we-out', main);
      if (weOut) weOut.innerHTML = `<div class="flex-wrap"><span class="kpill">Reinwachs: <b>≈ ${U.fmtNum(weE, 1)} kg</b></span><span class="kpill">Ausbeute: <b>${Math.round(weFaktor * 100)} %</b></span><span class="kpill">Trester: <b>≈ ${U.fmtNum(weM - weE, 1)} kg</b></span></div>`;
      const krW = num('[data-kr="wachs"]') || 0, krTyp = $('[data-kr="typ"]', main)?.value;
      const krG = { stumpe: 200, tafel: 80, teelicht: 15, baum: 10 }[krTyp] || 200;
      const krN = krG > 0 ? Math.floor(krW / krG) : 0;
      const krOut = $('#kr-out', main);
      if (krOut) krOut.innerHTML = `<div class="flex-wrap"><span class="kpill">Kerzen: <b>${krN} Stück</b></span><span class="kpill">je <b>${krG} g</b></span><span class="kpill">Restwachs: <b>${U.fmtNum(krW - krN * krG, 0)} g</b></span></div>`;
      const ptP = num('[data-pt="propolis"]') || 0, ptAlk = num('[data-pt="alk"]') || 70;
      const ptMl = ptP * 4, ptGes = ptP + ptMl;
      const ptOut = $('#pt-out', main);
      if (ptOut) ptOut.innerHTML = `<div class="flex-wrap"><span class="kpill">Alkohol ${ptAlk} %: <b>${ptMl} ml</b></span><span class="kpill">Ergibt: <b>≈ ${ptGes} ml</b> Tinktur</span><span class="kpill">Ziehzeit: <b>4–6 Wochen</b></span></div>`;
    };
    main.addEventListener('input', (e) => { if (e.target.classList.contains('rk')) rechne(); });
    main.addEventListener('change', (e) => { if (e.target.classList.contains('rk')) rechne(); });
    rechne();
  },
};

/* =====================================================================
   MODUL: PAPIERKORB (30 Tage Soft-Delete)
   ===================================================================== */
const STORE_LABELS = { staende: 'Bienenstand', wetter: 'Wettereintrag', voelker: 'Volk', stockkarten: 'Durchsicht', fuetterungen: 'Fütterung', gewichte: 'Wiegung', varroa: 'Varroa-Kontrolle', koeniginnen: 'Königin', zuchtserien: 'Zuchtserie', behandlungen: 'Behandlung', trachten: 'Tracht', wanderungen: 'Wanderung', ernten: 'Ernte', chargen: 'Charge', abfuellungen: 'Abfüllung', verkaeufe: 'Verkauf', fahrten: 'Fahrt', kontakte: 'Kontakt', kassenbuch: 'Buchung', rechnungen: 'Rechnung', inventar: 'Inventar', aufgaben: 'Aufgabe', anhaenge: 'Anhang' };
Views.papierkorb = {
  title: 'Papierkorb',
  async render(main) {
    const list = U.sortBy(await DB.getAll('papierkorb'), (t) => t.geloeschtAm, true);
    const name = (t) => t.daten.name || t.daten.bezeichnung || t.daten.titel || t.daten.losnummer || t.daten.mittel || t.daten.sorte || t.daten.beschreibung || U.fmtDate(t.daten.datum) || t.daten.id;
    main.innerHTML = pageHead('Papierkorb', 'Gelöschte Einträge bleiben 30 Tage wiederherstellbar',
      list.length ? `<button class="btn btn-danger btn-sm no-print" id="empty">${icon('trash')} Papierkorb leeren</button>` : '') +
      `<div class="card">` + (list.length ? `<div class="rows">` + list.map((t) => `
        <div class="row">
          <span class="r-ic" style="background:var(--danger-bg);color:var(--danger)">${icon('trash')}</span>
          <span class="r-main"><span class="r-title">${U.esc(String(name(t)).slice(0, 60))}</span>
          <span class="r-sub">${STORE_LABELS[t.store] || t.store} · gelöscht ${U.fmtDateTime(t.geloeschtAm)} · verfällt in ${Math.max(0, 30 - U.daysBetween(t.geloeschtAm, U.nowIso()))} Tagen</span></span>
          <button class="btn btn-sm btn-ghost no-print" data-restore="${t.id}">${icon('restore')} Wiederherstellen</button>
          <button class="btn btn-xs btn-danger no-print" data-kill="${t.id}">${icon('x')}</button>
        </div>`).join('') + `</div>` : emptyState('trash', 'Der Papierkorb ist leer.')) + `</div>`;
    main.addEventListener('click', async (e) => {
      const rs = e.target.closest('[data-restore]');
      if (rs) { await DB.trashRestore(rs.dataset.restore); UI.toast('Wiederhergestellt'); renderRoute(); return; }
      const kl = e.target.closest('[data-kill]');
      if (kl && (await UI.confirm({ title: 'Endgültig löschen?', text: 'Dieser Eintrag kann danach NICHT mehr wiederhergestellt werden.', confirmText: 'Endgültig löschen' }))) { await DB.del('papierkorb', kl.dataset.kill); renderRoute(); }
    });
    const emp = $('#empty');
    if (emp) emp.onclick = async () => {
      if (!(await UI.confirm({ title: 'Papierkorb leeren?', text: `Alle ${list.length} Einträge werden ENDGÜLTIG gelöscht.`, confirmText: 'Alles löschen' }))) return;
      await DB.clear('papierkorb'); renderRoute();
    };
  },
};

        </div>
        <div class="flex-wrap no-print">
          <select class="inp" id="exp-store" style="width:auto;min-width:180px">${DB.DATA_STORES.filter((s) => !['settings', 'papierkorb', 'anhaenge', 'wetter', 'gewichte', 'fuetterungen'].includes(s)).map((s) => `<option value="${s}">${STORE_LABELS[s] || s}</option>`).join('')}</select>
          <button class="btn btn-ghost btn-sm" id="exp-x">${icon('excel')} Excel</button>
          <button class="btn btn-ghost btn-sm" id="exp-c">${icon('download')} CSV</button>
        </div>
      </div>
      <div class="card"><div class="card-title">${icon('merge')}<h2>Aus anderer App importieren</h2></div>
        <p class="small muted mb12">Wechselst du von einer anderen Imker-App (BeeManager, iBeekeeper, BeeInTouch …)? Exportiere dort deine Daten als <b>CSV oder Excel</b> und lade die Datei hier hoch. Du ordnest die Spalten einmal zu (die App rät sie meist selbst) – Völker, Stände usw. werden übernommen, kein Neu-Eintippen.</p>
        <div class="flex-wrap no-print">
          <select class="inp" id="imp-entity" style="width:auto;min-width:180px">${Object.entries(Importer.ENTITIES).map(([k, e]) => `<option value="${k}">${e.label}</option>`).join('')}</select>
          <label class="btn btn-primary">${icon('upload')} Datei wählen<input type="file" accept=".csv,.xlsx,.xls,.tsv,text/csv" class="hidden" id="imp-file"></label>
        </div>
        <div class="hint mt8">Tipp: Importiere zuerst die <b>Stände</b>, dann die <b>Völker</b> (damit die Zuordnung klappt), danach Durchsichten/Behandlungen/Ernten.</div>
        <div id="imp-zone" class="mt12"></div>
      </div>
      <div class="card"><div class="card-title">${icon('upload')}<h2>PDF auslesen</h2></div>
        <p class="small muted mb12">Lade ein PDF hoch (z. B. altes Bestandsbuch oder Erntebericht). Der Text wird extrahiert; erkannte Behandlungs- oder Ernteeinträge kannst du als Vorschlag übernehmen.</p>
        <label class="btn btn-ghost no-print">${icon('upload')} PDF auswählen<input type="file" accept="application/pdf" class="hidden" id="pdf-in"></label>
        <div id="pdf-out" class="mt12"></div>
      </div>`;
    $('#exp-x').onclick = () => Xlsx.exportModule($('#exp-store').value, 'xlsx');
    $('#exp-c').onclick = () => Xlsx.exportModule($('#exp-store').value, 'csv');
    $('#pdf-in').onchange = (e) => { if (e.target.files[0]) PdfImport.read(e.target.files[0], $('#pdf-out')); };
    $('#imp-file').onchange = (e) => { if (e.target.files[0]) Importer.start($('#imp-entity').value, e.target.files[0], $('#imp-zone')); e.target.value = ''; };
  },
};

      { key: 'anwendungsart', label: 'Anwendungsart', aliases: ['anwendung', 'anwendungsart', 'methode', 'method'] },
