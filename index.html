<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAF6EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>ImkerBuch</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%23FFF8EA"/><g stroke-linejoin="round"><path d="M20 10.5 30.5 16.5 30.5 28.5 20 34.5 9.5 28.5 9.5 16.5Z" fill="%23E8A013" stroke="%23E8A013" stroke-width="3"/><path d="M42 22.5 52.5 28.5 52.5 40.5 42 46.5 31.5 40.5 31.5 28.5Z" fill="none" stroke="%232A2A30" stroke-width="3"/><path d="M20 34.5 30.5 40.5 30.5 52.5 20 58.5 9.5 52.5 9.5 40.5Z" fill="none" stroke="%232A2A30" stroke-width="3"/></g></svg>'>
<style>
/* =====================================================================
   DESIGN-SYSTEM: Farben, Typografie, Basis
   ===================================================================== */
:root{
  --bg:#FAF6EF; --card:#FFFFFF; --card2:#FBF8F2; --text:#28251E; --muted:#8B8478;
  --line:#ECE4D4; --line2:#E0D6C2;
  --honey:#E8A013; --honey-dark:#A96F00; --honey-deep:#7A5000; --honey-soft:#FCEFD3; --honey-soft2:#F8E4B8;
  --anthr:#26262B; --anthr-2:#3A3A42;
  --ok:#4C8A2E; --ok-bg:#EAF4E2; --warn:#9A6E00; --warn-bg:#FBF1CE; --danger:#B3362B; --danger-bg:#FAE8E6;
  --violet:#7A5CC7; --violet-bg:#EFEAFA; --blue:#2D6FB3; --blue-bg:#E6F0FA;
  --shadow:0 1px 2px rgba(60,45,10,.05),0 10px 30px -14px rgba(60,45,10,.22);
  --shadow-lg:0 4px 12px rgba(40,30,10,.08),0 24px 60px -20px rgba(40,30,10,.35);
  --r:20px; --r-sm:12px;
  --nav-h:66px;
}
html[data-theme="dark"]{
  --bg:#161619; --card:#212127; --card2:#28282F; --text:#F0EBE0; --muted:#9C968A;
  --line:#32323A; --line2:#3E3E48;
  --honey:#F0AC26; --honey-dark:#F4BE55; --honey-deep:#F8D289; --honey-soft:#3A2F12; --honey-soft2:#4A3C18;
  --anthr:#EFEAE0; --anthr-2:#D8D2C6;
  --ok:#8CC468; --ok-bg:#243318; --warn:#E4C25A; --warn-bg:#39300F; --danger:#E4796F; --danger-bg:#3D1F1C;
  --violet:#A990E8; --violet-bg:#2A2438; --blue:#7BAEDC; --blue-bg:#1D2A38;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px -14px rgba(0,0,0,.5);
  --shadow-lg:0 4px 12px rgba(0,0,0,.4),0 24px 60px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--text);font-size:15.5px;line-height:1.55;
  -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;
  transition:background .25s ease,color .25s ease;
}
h1{font-size:24px;font-weight:750;letter-spacing:-.015em;line-height:1.2}
h2{font-size:17.5px;font-weight:700;letter-spacing:-.01em}
h3{font-size:15px;font-weight:650}
a{color:var(--honey-dark);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;font-size:inherit;color:inherit;cursor:pointer;background:none;border:none;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--text)}
::selection{background:var(--honey-soft2)}
.muted{color:var(--muted)}
.small{font-size:13px}
.nowrap{white-space:nowrap}
.hidden{display:none!important}
.right{text-align:right}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.flex{display:flex;align-items:center;gap:10px}
.flex-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spacer{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
/* Grid-Kinder müssen unter ihren Inhalt schrumpfen dürfen, sonst sprengt langer
   Inhalt (Kalender, lange Zeilen) die Spalte über den Viewport → Hochformat-Scroll */
.grid2>*,.grid3>*{min-width:0}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}

/* =====================================================================
   LAYOUT: App-Shell, Sidebar (Desktop), Bottom-Nav (Mobil), Topbar
   ===================================================================== */
.app{display:flex;min-height:100dvh}
.sidebar{
  width:236px;flex-shrink:0;position:sticky;top:0;height:100dvh;overflow-y:auto;
  background:var(--card);border-right:1px solid var(--line);
  padding:18px 12px calc(18px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:2px;
}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:4px 10px 16px;font-size:19px;font-weight:800;letter-spacing:-.02em}
.sidebar .brand svg{width:30px;height:30px}
.nav-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:14px 12px 5px}
.nav-item{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:9px 12px;border-radius:11px;
  font-size:14.5px;font-weight:530;color:var(--text);transition:background .15s;
}
.nav-item svg{width:19px;height:19px;flex-shrink:0;opacity:.72}
.nav-item:hover{background:var(--card2)}
.nav-item.active{background:var(--honey-soft);color:var(--honey-deep);font-weight:700}
.nav-item.active svg{opacity:1}
.sidebar .side-foot{margin-top:auto;padding:12px;font-size:12px;color:var(--muted)}
.main-wrap{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 18px 10px;
  background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid color-mix(in srgb,var(--line) 60%,transparent);min-height:58px;
}
.topbar .tb-brand{display:none;align-items:center;gap:8px;font-weight:800;font-size:17px}
.topbar .tb-brand svg{width:26px;height:26px}
.topbar .tb-title{font-size:16.5px;font-weight:700;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{
  display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:12px;
  color:var(--text);transition:background .15s;flex-shrink:0;
}
.icon-btn:hover{background:var(--card2)}
.icon-btn svg{width:20px;height:20px}
main{flex:1;padding:20px 18px calc(30px + env(safe-area-inset-bottom));max-width:1060px;width:100%;margin:0 auto;animation:viewIn .28s ease both}
@keyframes viewIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.bottomnav{
  display:none;position:fixed;left:12px;right:12px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:45;height:var(--nav-h);
  padding:6px 8px;border-radius:999px;
  background:color-mix(in srgb,var(--card) 90%,transparent);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--line);box-shadow:0 12px 30px -10px rgba(60,45,10,.35);
}
html[data-theme="dark"] .bottomnav{box-shadow:0 12px 30px -10px rgba(0,0,0,.6)}
.bottomnav button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-size:10.5px;font-weight:600;color:var(--muted);border-radius:12px;padding:4px 0;min-height:52px;
}
.bottomnav button svg{width:22px;height:22px}
.bottomnav button.active{color:var(--honey-deep)}
.bottomnav button.active .bn-pill{background:var(--honey-soft);}
.bn-pill{display:flex;align-items:center;justify-content:center;width:52px;height:28px;border-radius:14px;transition:background .2s}
@media(max-width:900px){
  .sidebar{display:none}
  .bottomnav{display:flex}
  .topbar .tb-brand{display:flex}
  main{padding-bottom:calc(var(--nav-h) + 44px + env(safe-area-inset-bottom))}
}

/* =====================================================================
   KOMPONENTEN: Karten, Buttons, Badges, Listen, Tabellen
   ===================================================================== */
.card{background:var(--card);border:1px solid transparent;border-radius:var(--r);box-shadow:0 2px 4px rgba(122,80,0,.04),0 14px 34px -16px rgba(122,80,0,.25);padding:18px;transition:background .25s}
html[data-theme="dark"] .card{box-shadow:var(--shadow)}
.card+.card{margin-top:14px}
.card-title{display:flex;align-items:center;gap:9px;margin-bottom:12px;flex-wrap:wrap}
.card-title h2{flex:1}
.card-title svg{width:19px;height:19px;color:var(--honey-dark)}
/* Aufklappbare Einstellungs-Kacheln */
.set-head{cursor:pointer;margin-bottom:0;user-select:none}
.set-head .set-chev{font-size:12px;color:var(--muted);flex-shrink:0;margin-left:4px}
.set-body{margin-top:14px}
.page-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;flex-wrap:wrap}
/* ph-text bekommt eine Mindestbreite (aber nie mehr als die volle Zeile), damit der Titel
   nicht auf wenige Pixel gestaucht wird und über die Buttons läuft. Passt er samt Actions
   nicht in eine Zeile, wandert der Actions-Block dank flex-wrap automatisch in die nächste. */
.page-head .ph-text{flex:1 1 auto;min-width:min(100%,14rem)}
.page-head .ph-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.page-head .sub{color:var(--muted);font-size:13.5px;margin-top:2px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;
  padding:11px 20px;font-weight:680;font-size:14.5px;transition:transform .1s,box-shadow .15s,background .15s;
  border:1px solid transparent;min-height:44px;white-space:normal;max-width:100%;
}
.btn:active{transform:scale(.96)}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--honey);color:#241A05;box-shadow:0 6px 14px -6px rgba(232,160,19,.55)}
.btn-primary:hover{background:color-mix(in srgb,var(--honey) 88%,#fff)}
.btn-primary:active{box-shadow:0 2px 6px -3px rgba(232,160,19,.5)}
.btn-dark{background:var(--anthr);color:var(--card)}
html[data-theme="dark"] .btn-dark{color:#1B1B1F}
.btn-ghost{background:var(--honey-soft);color:var(--honey-deep)}
.btn-ghost:hover{background:var(--honey-soft2)}
.btn-danger{background:var(--danger-bg);color:var(--danger)}
.btn-sm{padding:7px 15px;min-height:36px;font-size:13.5px}
.btn-xs{padding:4px 12px;min-height:29px;font-size:12.5px;gap:5px}
.btn-xs svg{width:14px;height:14px}
.btn[disabled]{opacity:.5;pointer-events:none}
.btn-block{width:100%}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}
.badge svg{width:12px;height:12px}
.b-honey{background:var(--honey-soft);color:var(--honey-deep)}
.b-ok{background:var(--ok-bg);color:var(--ok)}
.b-warn{background:var(--warn-bg);color:var(--warn)}
.b-danger{background:var(--danger-bg);color:var(--danger)}
.b-muted{background:var(--card2);color:var(--muted);border:1px solid var(--line)}
.b-violet{background:var(--violet-bg);color:var(--violet)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.rows{display:flex;flex-direction:column}
.row{
  display:flex;align-items:center;gap:12px;padding:13px 6px;border-bottom:1px solid var(--line);
  min-height:56px;border-radius:8px;transition:background .12s;text-align:left;width:100%;
}
.row:last-child{border-bottom:none}
button.row:hover,.row.clickable:hover{background:var(--card2);cursor:pointer}
.row .r-ic{width:40px;height:40px;border-radius:12px;background:var(--honey-soft);color:var(--honey-deep);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.row .r-ic svg{width:19px;height:19px}
.row .r-main,.ischule-row .r-main{flex:1;min-width:0}
.row .r-title,.ischule-row .r-title{display:block;font-weight:650;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .r-sub,.ischule-row .r-sub{display:block;font-size:12.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .r-side{text-align:right;font-size:13px;flex-shrink:0}
.row .chev{color:var(--muted);flex-shrink:0;width:16px;height:16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.stat{background:var(--card);border:1px solid transparent;border-radius:var(--r);padding:14px 16px;box-shadow:0 2px 4px rgba(122,80,0,.04),0 12px 28px -14px rgba(122,80,0,.22)}
html[data-theme="dark"] .stat{box-shadow:var(--shadow)}
.stat .s-label{font-size:12px;font-weight:650;color:var(--muted);display:flex;gap:6px;align-items:center}
.stat .s-label svg{width:14px;height:14px;color:var(--honey-dark)}
.stat .s-value{font-size:23px;font-weight:800;letter-spacing:-.02em;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat .s-sub{font-size:12px;color:var(--muted)}
.dash-klick{cursor:pointer;transition:transform .12s ease}
.dash-klick:hover .card,.dash-klick:hover .stat{border-color:var(--honey)}
.dash-klick:active{transform:scale(.985)}
/* Marktverkauf: große Touch-Kacheln + Warenkorb */
.markt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.markt-tile{border:1.5px solid var(--line2);border-radius:16px;padding:16px 14px;text-align:left;background:var(--card);transition:transform .1s,border-color .15s;min-height:104px;display:flex;flex-direction:column;gap:4px}
.markt-tile:hover{border-color:var(--honey)}
.markt-tile:active{transform:scale(.96)}
.markt-tile .mt-name{font-weight:700;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.markt-tile .mt-preis{font-size:20px;font-weight:800;color:var(--honey-deep);margin-top:auto}
.markt-tile .mt-rest{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.markt-tile[disabled]{opacity:.45;pointer-events:none}
.markt-korb{position:sticky;bottom:calc(var(--nav-h) + 8px + env(safe-area-inset-bottom));background:var(--card);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow-lg);padding:14px 16px;z-index:20}
@media(min-width:901px){.markt-korb{bottom:16px}}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-sm)}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{position:sticky;top:0;background:var(--card2);text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--card2)}
.tbl td.num,.tbl th.num{text-align:right;font-variant-numeric:tabular-nums}
.empty{
  text-align:center;padding:38px 20px;color:var(--muted);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.empty svg{width:44px;height:44px;opacity:.4}
.empty .e-text{font-size:14px;max-width:340px}
.chip-row{display:flex;gap:7px;flex-wrap:wrap}
.chip{padding:7px 14px;border-radius:999px;border:1.5px solid var(--line2);font-size:13px;font-weight:600;background:var(--card);transition:all .15s;min-height:36px}
.chip svg{width:15px;height:15px;vertical-align:-2px;flex:0 0 auto}
.chip.active{background:var(--honey);color:#241A05;border-color:var(--honey);box-shadow:0 4px 10px -5px rgba(232,160,19,.55)}
.seg{display:inline-flex;background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px}
.seg button{padding:7px 15px;border-radius:999px;font-size:13.5px;font-weight:600;color:var(--muted);min-height:36px}
.seg button.active{background:var(--card);color:var(--text);box-shadow:var(--shadow);font-weight:700}
.dot{display:inline-block;width:12px;height:12px;border-radius:50%;border:1px solid rgba(0,0,0,.2);vertical-align:-1px}

/* =====================================================================
   KOMPONENTEN: Formulare, Modal, Sheet, Toast, Banner, Galerie, Diverses
   ===================================================================== */
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:680;margin-bottom:5px}
.field label .req{color:var(--danger)}
.field .hint{font-size:12px;color:var(--muted);margin-top:4px}
.field .err{font-size:12.5px;color:var(--danger);margin-top:4px;font-weight:600;display:none}
.field.invalid .err{display:block}
.field.invalid input,.field.invalid select,.field.invalid textarea{border-color:var(--danger)}
input.inp,select.inp,textarea.inp{
  width:100%;padding:11px 13px;border:1.5px solid var(--line2);border-radius:var(--r-sm);
  background:var(--card);color:var(--text);outline:none;transition:border .15s,box-shadow .15s;min-height:46px;
}
textarea.inp{min-height:84px;resize:vertical}
input.inp:focus,select.inp:focus,textarea.inp:focus{border-color:var(--honey);box-shadow:0 0 0 3px color-mix(in srgb,var(--honey) 22%,transparent)}
select.inp{appearance:none;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path d="M1 1.5 6 6.5 11 1.5" fill="none" stroke="%23999" stroke-width="2" stroke-linecap="round"/></svg>');background-repeat:no-repeat;background-position:right 13px center;padding-right:36px}
/* Eigenes „Auswählen-oder-Eintippen“-Dropdown (ersetzt <datalist>, das auf iOS/Android unzuverlässig ist) */
.combo{position:relative}
.combo-inp{appearance:none;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path d="M1 1.5 6 6.5 11 1.5" fill="none" stroke="%23999" stroke-width="2" stroke-linecap="round"/></svg>');background-repeat:no-repeat;background-position:right 13px center;padding-right:36px}
.combo-list{margin-top:6px;border:1.5px solid var(--line2);border-radius:var(--r-sm);background:var(--card);max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.combo-opt{padding:12px 13px;cursor:pointer;font-size:14.5px;border-bottom:1px solid var(--line)}
.combo-opt:last-child{border-bottom:0}
.combo-opt:active,.combo-opt:hover{background:color-mix(in srgb,var(--honey) 16%,transparent)}
.check-line{display:flex;align-items:center;gap:10px;padding:9px 0;cursor:pointer;font-size:14.5px;font-weight:550}
.check-line input{width:21px;height:21px;accent-color:var(--honey);flex-shrink:0}
.rating{display:flex;gap:4px}
.rating button{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line2);font-weight:700;font-size:14px;color:var(--muted);background:var(--card)}
.rating button.active{background:var(--honey-soft);border-color:var(--honey);color:var(--honey-deep)}
.modal-back{
  position:fixed;inset:0;z-index:100;background:rgba(20,15,5,.45);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .18s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--card);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;
  max-height:calc(100dvh - 60px);display:flex;flex-direction:column;animation:modalIn .22s cubic-bezier(.2,.9,.3,1.2);
}
.modal.wide{max-width:760px}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:center;gap:10px;padding:16px 20px 12px;border-bottom:1px solid var(--line)}
.modal-head h2{flex:1}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-foot{display:flex;gap:10px;padding:13px 20px calc(13px + env(safe-area-inset-bottom));border-top:1px solid var(--line);flex-wrap:wrap}
.modal-foot .btn{flex:1}
.modal-foot .btn.no-flex{flex:0 0 auto}
@media(max-width:640px){
  .modal-back{align-items:flex-end;padding:0}
  .modal{border-radius:22px 22px 0 0;max-height:92dvh;animation:sheetIn .26s cubic-bezier(.2,.9,.3,1)}
  @keyframes sheetIn{from{transform:translateY(60%)}to{transform:none}}
}
.sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:6px 0}
@media(max-width:390px){.sheet-grid{grid-template-columns:repeat(3,1fr)}}
.sheet-grid button{display:flex;flex-direction:column;align-items:center;gap:7px;padding:13px 4px;border-radius:14px;font-size:11.5px;font-weight:620;color:var(--text)}
.sheet-grid button:hover{background:var(--card2)}
.sheet-grid .sg-ic{width:44px;height:44px;border-radius:14px;background:var(--honey-soft);color:var(--honey-deep);display:flex;align-items:center;justify-content:center}
.sheet-grid .sg-ic svg{width:21px;height:21px}
#toast-root{position:fixed;left:0;right:0;bottom:calc(var(--nav-h) + 14px + env(safe-area-inset-bottom));z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
@media(min-width:901px){#toast-root{bottom:24px}}
.toast{
  background:var(--anthr);color:#FFF;padding:11px 20px;border-radius:99px;font-size:14px;font-weight:600;
  box-shadow:var(--shadow-lg);animation:toastIn .25s ease;display:flex;gap:9px;align-items:center;max-width:calc(100vw - 40px);
}
html[data-theme="dark"] .toast{background:#F0EBE0;color:#1B1B1F}
.toast.err{background:var(--danger);color:#fff}
.toast svg{width:16px;height:16px;flex-shrink:0}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.toast.out{opacity:0;transform:translateY(8px);transition:all .3s}
#banners{max-width:1060px;width:100%;margin:0 auto;padding:0 18px}
.banner{display:flex;gap:11px;align-items:center;padding:12px 15px;border-radius:14px;margin-top:12px;font-size:13.5px;font-weight:550;flex-wrap:wrap}
/* Fließtext im Banner als EIN Flex-Element, damit <b>/<a> den Text nicht in
   einzeln umbrechende Häppchen zerlegen (zerrissene Darstellung im Hochformat) */
.banner .b-msg{flex:1 1 auto;min-width:0}
.banner svg{width:19px;height:19px;flex-shrink:0}
.banner .btn{min-height:36px}
.banner.warn{background:var(--warn-bg);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 30%,transparent)}
.banner.danger{background:var(--danger-bg);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 35%,transparent)}
.banner.info{background:var(--blue-bg);color:var(--blue);border:1px solid color-mix(in srgb,var(--blue) 25%,transparent)}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:8px}
.gallery .g-item{position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:var(--card2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;padding:4px;cursor:pointer}
.gallery .g-item img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.gallery .g-item .g-name{font-size:10px;color:var(--muted);text-align:center;word-break:break-all;max-height:2.4em;overflow:hidden}
.gallery .g-item svg{width:24px;height:24px;color:var(--muted)}
.gallery .g-badge{position:absolute;bottom:4px;left:4px;right:4px;background:rgba(20,15,5,.62);color:#fff;font-size:9.5px;padding:2px 6px;border-radius:7px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;backdrop-filter:blur(4px)}
.viewer-img{max-width:100%;max-height:60dvh;border-radius:12px;display:block;margin:0 auto}
.progress{height:9px;background:var(--card2);border:1px solid var(--line);border-radius:99px;overflow:hidden}
.progress>div{height:100%;background:linear-gradient(90deg,var(--honey),var(--honey-dark));border-radius:99px;transition:width .25s;min-width:2%}
.audio-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.audio-row:last-child{border-bottom:none}
.audio-row audio{flex:1;height:38px;min-width:0}
.rec-pulse{width:11px;height:11px;border-radius:50%;background:var(--danger);animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
.chart-box{width:100%;overflow:hidden}
.chart-box svg{display:block;width:100%;height:auto}
.chart-box .axis{font-size:10px;fill:var(--muted)}
.chart-box .gridline{stroke:var(--line);stroke-width:1}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:6px}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;font-size:12.5px}
.cal .c-head{text-align:center;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:4px 0}
.cal .c-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;position:relative;font-weight:550;min-height:38px}
.cal .c-day.other{color:var(--line2)}
.cal .c-day.today{background:var(--honey-soft);font-weight:800;color:var(--honey-deep)}
.cal .c-day .c-dots{display:flex;gap:2px;position:absolute;bottom:5px}
.cal .c-day .c-dots i{width:5px;height:5px;border-radius:50%;background:var(--honey-dark)}
.cal .c-day .c-dots i.overdue{background:var(--danger)}
.cal .c-day.clickable:hover{background:var(--card2);cursor:pointer}
.wizard-hex{display:flex;justify-content:center;margin:10px 0 16px}
.wizard-hex svg{width:76px;height:76px;animation:hexFloat 3.4s ease-in-out infinite}
@keyframes hexFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.steps{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
.steps i{width:26px;height:5px;border-radius:99px;background:var(--line)}
.steps i.done{background:var(--honey)}
.kpill{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:5px 10px;font-size:12.5px;font-weight:600}
.detail-kv{display:grid;grid-template-columns:auto 1fr;gap:5px 16px;font-size:13.5px}
.detail-kv dt{color:var(--muted);font-weight:550}
.detail-kv dd{font-weight:600;word-break:break-word}
.fab-bar{position:sticky;bottom:calc(var(--nav-h) + 10px + env(safe-area-inset-bottom));display:flex;justify-content:flex-end;pointer-events:none;z-index:30;margin-top:10px}
@media(min-width:901px){.fab-bar{bottom:18px}}
.fab-bar .btn{pointer-events:auto;box-shadow:var(--shadow-lg)}
.tabs{display:flex;gap:7px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;padding:3px 2px}
.tabs::-webkit-scrollbar{display:none}
.tabs button{padding:8px 16px;font-weight:600;font-size:13.5px;color:var(--text);border:1.5px solid var(--line2);border-radius:999px;background:var(--card);white-space:nowrap;min-height:38px;transition:all .15s;flex-shrink:0}
.tabs button.active{background:var(--honey);color:#241A05;border-color:var(--honey);font-weight:700;box-shadow:0 4px 10px -5px rgba(232,160,19,.55)}
.skel{border-radius:10px;background:linear-gradient(90deg,var(--card2) 25%,var(--line) 50%,var(--card2) 75%);background-size:200% 100%;animation:skel 1.2s infinite}
@keyframes skel{to{background-position:-200% 0}}

/* =====================================================================
   DRUCK: jede Listenansicht sauber druckbar
   ===================================================================== */
@media print{
  body{background:#fff;color:#000;font-size:12px}
  .sidebar,.bottomnav,.topbar,#banners,#toast-root,.fab-bar,.no-print,.btn,.tabs,.icon-btn{display:none!important}
  main{padding:0;max-width:none;animation:none}
  .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;margin-top:10px}
  .row{break-inside:avoid}
  .tbl th{position:static;background:#f3f3f3;color:#000}
  .print-only{display:block!important}
  a{color:#000}
}
.print-only{display:none}

/** Änderungsfenster anzeigen (eintraege = Changelog-Auszug) */
function changelogModal(eintraege) {
  const m = UI.modal({
    title: '🐝 Was ist neu?',
    body: eintraege.map((c) => `
      <h3 class="mb8">Version ${U.esc(c.version)} <span class="muted small" style="font-weight:400">· ${U.fmtDate(c.datum)}</span></h3>
      <ul style="padding-left:20px;margin-bottom:16px">${c.punkte.map((p) => `<li class="small" style="margin-bottom:7px">${U.esc(p)}</li>`).join('')}</ul>`).join(''),
    footer: `<button class="btn btn-primary" data-ok>Alles klar</button>`,
  });
  $('[data-ok]', m.el).onclick = () => m.close(true);
}
/** Manueller Update-Check: fragt die frische index.html vom Server ab (Cache umgangen),
    liest deren APP_VERSION und bietet bei Unterschied das Neuladen an. Funktioniert auch,
    wenn noch der alte Service-Worker aktiv ist – dank eindeutigem Cache-Bust-Parameter. */
async function pruefeAufUpdate(btn) {
  const setBtn = (txt, dis) => { if (btn) { btn.innerHTML = txt; btn.disabled = !!dis; } };
  const original = btn ? btn.innerHTML : '';
  setBtn('Suche …', true);
  try {
    const res = await fetch('./index.html?update=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('Server nicht erreichbar (Status ' + res.status + ')');
    const html = await res.text();
    const m = html.match(/APP_VERSION\s*=\s*'([^']+)'/);
    const live = m && m[1];
    setBtn(original, false);
    if (!live) return UI.toast('Version konnte nicht gelesen werden.', 'err');
    if (live === APP_VERSION) return UI.toast(`Du hast bereits die neueste Version (v${APP_VERSION}).`);
    const ok = await UI.confirm({
      title: `Neue Version v${live} verfügbar`,
      text: `Du nutzt gerade v${APP_VERSION}. Jetzt auf v${live} aktualisieren? Die App lädt einmal neu – deine Daten bleiben auf dem Gerät erhalten.`,
      confirmText: 'Jetzt aktualisieren',
    });
    if (!ok) return;
    // Frische erzwingen: Service-Worker aktualisieren + alle Caches leeren, dann neu laden.
    try { const regs = (await navigator.serviceWorker?.getRegistrations()) || []; await Promise.all(regs.map((r) => r.update().catch(() => {}))); } catch (e) { /* egal */ }
    try { const keys = await caches.keys(); await Promise.all(keys.map((k) => caches.delete(k))); } catch (e) { /* egal */ }
    location.reload();
  } catch (e) {
    setBtn(original, false);
    UI.toast('Update-Prüfung fehlgeschlagen – bist du online? (' + (e.message || 'Fehler') + ')', 'err');
  }
}

/** Nach einem Update einmalig die Neuigkeiten seit der zuletzt gesehenen Version zeigen */
async function zeigeUpdateFenster() {
  if (TEST_MODE || !S.get('wizardDone')) return;
  const gesehen = S.get('letzteGeseheneVersion');
  if (gesehen === APP_VERSION) return;
  const idx = gesehen ? CHANGELOG.findIndex((c) => c.version === gesehen) : -1;
  // unbekannte/keine gesehene Version (Installation vor Einführung der Versionierung) → alles zeigen
  const neue = idx >= 0 ? CHANGELOG.slice(0, idx) : CHANGELOG;
  await S.set('letzteGeseheneVersion', APP_VERSION);
  if (neue.length) changelogModal(neue);
}

/** Züchter-/Standkürzel für die Königinnen-Kennung: aus Imkerei-Name bzw. Vorname abgeleitet. */
function zuechterKuerzel() {
  const imk = S.get('imkerei') || {};
  const quelle = (imk.name || (S.get('profil') || {}).vorname || '').trim();
  const ini = quelle.split(/\s+/).map((w) => w[0] || '').join('').toUpperCase().replace(/[^A-ZÄÖÜ]/g, '').slice(0, 3);
  return ini || 'IB';
}
/** Nächste freie Kennung im Muster KÜRZEL-JJ-NNN (fortlaufend je Kürzel+Jahr). */
async function naechsteKennung(jahrgang) {
  const kuerzel = zuechterKuerzel();
  const jj = String(Math.abs(Math.round(jahrgang || new Date().getFullYear()))).slice(-2);
  const praefix = `${kuerzel}-${jj}-`;
  let max = 0;
  for (const k of await DB.getAll('koeniginnen')) {
    if ((k.kennung || '').startsWith(praefix)) { const n = parseInt(k.kennung.slice(praefix.length), 10); if (!isNaN(n)) max = Math.max(max, n); }
  }
  return praefix + String(max + 1).padStart(3, '0');
}

/** Milben/Tag → Ampelstufe für den Monat des Datums (natürlicher Fall) */
function varroaAmpel(milbenProTag, datumIso) {
  const s = VARROA_SCHWELLEN[+String(datumIso).slice(5, 7)] || { gruen: 3, gelb: 6 };
  if (milbenProTag <= s.gruen) return { stufe: 'gruen', badge: 'b-ok', text: 'unkritisch' };
  if (milbenProTag <= s.gelb) return { stufe: 'gelb', badge: 'b-warn', text: 'beobachten' };
  return { stufe: 'rot', badge: 'b-danger', text: 'Behandlung prüfen' };
}
/** Befallsgrad (Milben je 100 Bienen, Auswaschen/Puderzucker) → Ampel; Richtwert ~3 % */
function varroaAmpelBefall(milbenJe100) {
  if (milbenJe100 <= 1) return { stufe: 'gruen', badge: 'b-ok', text: 'unkritisch' };
  if (milbenJe100 <= 3) return { stufe: 'gelb', badge: 'b-warn', text: 'beobachten' };
  return { stufe: 'rot', badge: 'b-danger', text: 'Behandlung prüfen' };
}
/* Welche Methode misst was: 'fall' = Milben/Tag, 'befall' = Milben je 100 Bienen */
const VARROA_BEFALL_METHODEN = ['Puderzuckermethode', 'Auswaschmethode'];
/** vereinheitlichte Kennzahl einer Zählung: {wert, einheit, ampel} */
function varroaMetrik(x) {
  if (VARROA_BEFALL_METHODEN.includes(x.methode)) {
    const je100 = x.probeBienen > 0 ? (x.milben / x.probeBienen) * 100 : x.milben;
    return { wert: Math.round(je100 * 10) / 10, einheit: '/100 Bienen', ampel: varroaAmpelBefall(je100) };
  }
  const proTag = x.tageZaehl > 0 ? x.milben / x.tageZaehl : x.milben;
  return { wert: Math.round(proTag * 10) / 10, einheit: '/Tag', ampel: varroaAmpel(proTag, x.datum) };
}
/** Vorschläge + bereits selbst verwendete Werte eines Feldes kombinieren */
async function gelernteWerte(presets, store, feld) {
  const eigene = new Set();
  for (const r of await DB.getAll(store)) { const w = (r[feld] || '').trim(); if (w) eigene.add(w); }
  return [...presets, ...[...eigene].filter((w) => !presets.includes(w)).sort()];
}

/* =====================================================================
   DB: IndexedDB-Wrapper (UUID + lastModified auf jedem Datensatz)
   ===================================================================== */
const DB = {
  NAME: TEST_MODE ? 'imkerbuch-test' : 'imkerbuch', VER: 5, _db: null, // v2: +verkaeufe · v3: +fahrten · v4: +varroa · v5: +abfuellungen
  STORES: ['staende', 'wetter', 'voelker', 'stockkarten', 'fuetterungen', 'gewichte', 'varroa', 'koeniginnen', 'zuchtserien', 'behandlungen', 'trachten', 'wanderungen', 'ernten', 'chargen', 'abfuellungen', 'verkaeufe', 'fahrten', 'kontakte', 'kassenbuch', 'rechnungen', 'inventar', 'aufgaben', 'anhaenge', 'snapshots', 'papierkorb', 'settings'],
  /** Stores, die in Export/Import/Snapshot einfließen (snapshots selbst nie) */
  get DATA_STORES() { return this.STORES.filter((s) => s !== 'snapshots'); },
  open() {
    if (this._db) return Promise.resolve(this._db);
    return new Promise((res, rej) => {
      const rq = indexedDB.open(this.NAME, this.VER);
      rq.onupgradeneeded = () => {
        const db = rq.result;
        for (const s of this.STORES) if (!db.objectStoreNames.contains(s)) db.createObjectStore(s, { keyPath: s === 'settings' ? 'key' : 'id' });
      };
      rq.onsuccess = () => { this._db = rq.result; res(this._db); };
      rq.onerror = () => rej(rq.error);
    });
  },
  _req: (r) => new Promise((res, rej) => { r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }),
  async _store(name, mode) { const db = await this.open(); return db.transaction(name, mode).objectStore(name); },
  async get(store, id) { return this._req((await this._store(store, 'readonly')).get(id)); },
  async getAll(store) { return this._req((await this._store(store, 'readonly')).getAll()); },
  async count(store) { return this._req((await this._store(store, 'readonly')).count()); },
  /** Speichern: vergibt UUID + createdAt, aktualisiert lastModified */
  async put(store, obj, keepStamp = false) {
    if (store !== 'settings' && !obj.id) obj.id = U.uuid();
    if (!keepStamp) { obj.lastModified = U.nowIso(); if (store !== 'settings' && !obj.createdAt) obj.createdAt = obj.lastModified; }
    await this._req((await this._store(store, 'readwrite')).put(obj));
    return obj;
  },
  async bulkPut(store, objs, keepStamp = true) {
    if (!objs.length) return;
    const st = await this._store(store, 'readwrite');
    for (const o of objs) { if (!keepStamp) o.lastModified = U.nowIso(); st.put(o); }
    return new Promise((res, rej) => { st.transaction.oncomplete = res; st.transaction.onerror = () => rej(st.transaction.error); });
  },
  async del(store, id) { await this._req((await this._store(store, 'readwrite')).delete(id)); },
  async clear(store) { await this._req((await this._store(store, 'readwrite')).clear()); },
  /** Soft-Delete: Datensatz wandert für 30 Tage in den Papierkorb */
  async softDel(store, id) {
    const rec = await this.get(store, id);
    if (!rec) return;
    await this.put('papierkorb', { id: U.uuid(), store, daten: rec, geloeschtAm: U.nowIso() });
    await this.del(store, id);
  },
  async trashRestore(trashId) {
    const t = await this.get('papierkorb', trashId);
    if (!t) return null;
    t.daten.lastModified = U.nowIso(); // beim Merge gewinnt der wiederhergestellte Stand
    await this.put(t.store, t.daten, true);
    await this.del('papierkorb', trashId);
    return t;
  },
  /** Papierkorb-Einträge älter als 30 Tage endgültig entfernen */
  async purgeTrash() {
    const all = await this.getAll('papierkorb');
    const limit = Date.now() - 30 * 86400000;
    for (const t of all) if (new Date(t.geloeschtAm).getTime() < limit) await this.del('papierkorb', t.id);
  },
};
/** Hilfsmap id → Datensatz */
async function idMap(store) { const m = new Map(); for (const r of await DB.getAll(store)) m.set(r.id, r); return m; }

const FormGuard = { dirty: false };
window.addEventListener('beforeunload', (e) => { if (FormGuard.dirty) { e.preventDefault(); e.returnValue = ''; } });

/** Sortiert Dropdown-Optionen alphanumerisch (deutsch, zahlen-bewusst: „7“ vor „19“,
    Umlaute korrekt). Platzhalter mit leerem Wert (z. B. „Alle Stände“, „– unbekannt –“)
    bleiben oben. keepOrder=true lässt bewusst geordnete Menüs (z. B. Bewertung 4→1) unangetastet.
    string=true für suggest-Listen (Array aus Strings), sonst {v,l}-Objekte. */
function optionenSortiert(opts, string = false, keepOrder = false) {
  if (keepOrder || !Array.isArray(opts)) return opts || [];
  const label = (o) => String(string ? o : (o && o.l != null ? o.l : ''));
  const wert = (o) => (string ? o : (o ? o.v : o));
  const pinned = [], rest = [];
  for (const o of opts) ((wert(o) === '' || wert(o) == null) ? pinned : rest).push(o);
  rest.sort((a, b) => label(a).localeCompare(label(b), 'de', { numeric: true, sensitivity: 'base' }));
  return [...pinned, ...rest];
}

    };
    const esc = (e) => { if (e.key === 'Escape' && back === $('#modal-root').lastElementChild) m.close(); };
    document.addEventListener('keydown', esc);
    back.addEventListener('mousedown', (e) => { if (e.target === back) m.close(); });

  /** Generisches Formular-Modal mit Validierung, Dezimalkomma und Dirty-Guard.
      Feld: {key,label,type:text|number|date|textarea|select|check|rating|multicheck|static,required,options:[{v,l}],hint,placeholder,showIf} */
  formModal({ title, fields, values = {}, onSave, onDelete, saveText = 'Speichern', wide = false }) {
    const fid = (k) => `f-${k}`;
    const val = (f) => values[f.key] !== undefined && values[f.key] !== null ? values[f.key] : (f.default !== undefined ? f.default : '');
    const renderField = (f) => {
      const v = val(f);
      let inner = '';
      if (f.type === 'select') {
        const opts = optionenSortiert((typeof f.options === 'function' ? f.options() : f.options) || [], false, f.keepOrder);
        inner = `<select class="inp" id="${fid(f.key)}">${f.required ? '' : '<option value="">–</option>'}${opts.map((o) => `<option value="${U.esc(o.v)}" ${String(o.v) === String(v) ? 'selected' : ''}>${U.esc(o.l)}</option>`).join('')}</select>`;
      } else if (f.type === 'textarea') {
        inner = `<textarea class="inp" id="${fid(f.key)}" placeholder="${U.esc(f.placeholder || '')}">${U.esc(v)}</textarea>`;
      } else if (f.type === 'check') {
        return `<label class="check-line" data-field="${f.key}"><input type="checkbox" id="${fid(f.key)}" ${v ? 'checked' : ''}> <span>${U.esc(f.label)}</span></label>`;
      } else if (f.type === 'rating') {
        return `<div class="field" data-field="${f.key}"><label>${U.esc(f.label)}</label><div class="rating" id="${fid(f.key)}" data-val="${v || 0}">${[1, 2, 3, 4, 5].map((n) => `<button type="button" data-n="${n}" class="${v >= n ? 'active' : ''}">${n}</button>`).join('')}</div>${f.hint ? `<div class="hint">${f.hint}</div>` : ''}</div>`;
      } else if (f.type === 'multicheck') {
        const opts = optionenSortiert((typeof f.options === 'function' ? f.options() : f.options) || [], false, f.keepOrder);
        const sel = Array.isArray(v) ? v : [];
        return `<div class="field" data-field="${f.key}"><label>${U.esc(f.label)}${f.required ? ' <span class="req">*</span>' : ''}</label><div id="${fid(f.key)}">${opts.map((o) => `<label class="check-line"><input type="checkbox" value="${U.esc(o.v)}" ${sel.includes(o.v) ? 'checked' : ''}> <span>${U.esc(o.l)}</span></label>`).join('') || '<div class="hint">Keine Einträge vorhanden.</div>'}</div>${f.hint ? `<div class="hint">${f.hint}</div>` : ''}<div class="err"></div></div>`;
      } else if (f.type === 'static') {
        return `<div class="field" data-field="${f.key}">${f.html}</div>`;
      } else if (f.type === 'suggest') {
        // Eigenes Auswahl-Dropdown (kein <datalist> – das zeigt auf iOS/Android oft keine Optionen):
        // Eingabefeld + auf-/zuklappbare Optionsliste. Freies Eintippen bleibt möglich.
        const opts = optionenSortiert((typeof f.options === 'function' ? f.options() : f.options) || [], true, f.keepOrder);
        inner = `<div class="combo">
          <input class="inp combo-inp" id="${fid(f.key)}" placeholder="${U.esc(f.placeholder || 'auswählen oder eintippen …')}" value="${U.esc(v)}" autocomplete="off">
          <div class="combo-list" style="display:none">${opts.map((o) => `<div class="combo-opt" data-v="${U.esc(o)}">${U.esc(o)}</div>`).join('')}</div>
        </div>`;
      } else if (f.type === 'number') {
        inner = `<input class="inp" id="${fid(f.key)}" inputmode="decimal" placeholder="${U.esc(f.placeholder || 'z. B. 12,5')}" value="${v === '' ? '' : U.esc(String(v).replace('.', ','))}">`;
      } else {
        inner = `<input class="inp" id="${fid(f.key)}" type="${f.type === 'date' ? 'date' : 'text'}" placeholder="${U.esc(f.placeholder || '')}" value="${U.esc(v)}">`;
      }
      return `<div class="field" data-field="${f.key}"><label>${U.esc(f.label)}${f.required ? ' <span class="req">*</span>' : ''}</label>${inner}${f.hint ? `<div class="hint">${f.hint}</div>` : ''}<div class="err"></div></div>`;
    };
    const m = UI.modal({
      title, wide, guardDirty: true,
      body: `<form novalidate>${fields.map(renderField).join('')}</form>`,
      footer: `${onDelete ? `<button class="btn btn-danger no-flex" data-del>${icon('trash')}</button>` : ''}<button class="btn btn-ghost" data-cancel>Abbrechen</button><button class="btn btn-primary" data-save>${U.esc(saveText)}</button>`,
    });
    const form = $('form', m.el);
    form.addEventListener('input', () => { FormGuard.dirty = true; updateShowIf(); });
    form.addEventListener('change', () => { FormGuard.dirty = true; updateShowIf(); }); // Selects lösen zuverlässig 'change' aus → Ein-/Ausblenden (showIf) funktioniert überall
    form.addEventListener('submit', (e) => e.preventDefault());
    // Auswahl-Dropdowns (eigenes Combo statt <datalist>): tippen filtert, Tippen/Tap wählt
    $$('.combo', form).forEach((combo) => {
      const inp = $('.combo-inp', combo), list = $('.combo-list', combo);
      const opts = $$('.combo-opt', list);
      const zeigen = (test) => { let sichtbar = false; opts.forEach((o) => { const zeig = test(o); o.style.display = zeig ? '' : 'none'; if (zeig) sichtbar = true; }); list.style.display = sichtbar ? '' : 'none'; };
      const alleZeigen = () => zeigen(() => true); // beim Antippen: ganze Liste (auch zum Wechseln)
      const filtern = () => { const q = inp.value.trim().toLowerCase(); zeigen((o) => !q || o.textContent.toLowerCase().includes(q)); }; // beim Tippen: filtern
      inp.addEventListener('focus', alleZeigen);
      inp.addEventListener('click', alleZeigen);
      inp.addEventListener('input', filtern);
      inp.addEventListener('blur', () => setTimeout(() => { list.style.display = 'none'; }, 250));
      list.addEventListener('click', (e) => {
        const o = e.target.closest('.combo-opt'); if (!o) return;
        inp.value = o.dataset.v;
        FormGuard.dirty = true;
        inp.dispatchEvent(new Event('input', { bubbles: true })); // dirty + showIf aktualisieren
        list.style.display = 'none';

    // Rating-Buttons
    $$('.rating', form).forEach((r) => r.addEventListener('click', (e) => {
      const b = e.target.closest('button'); if (!b) return;

      $$('button', r).forEach((x) => x.classList.toggle('active', +x.dataset.n <= +b.dataset.n));
    }));
    const collect = () => {
      const out = {}; let ok = true;
      for (const f of fields) {
        const wrap = $(`[data-field="${f.key}"]`, form);
        if (f.type === 'static') continue;
        if (wrap.classList.contains('hidden')) { out[f.key] = values[f.key]; continue; }
        let v;
        if (f.type === 'check') v = $(`#${fid(f.key)}`, form).checked;
        else if (f.type === 'rating') v = +$(`#${fid(f.key)}`, form).dataset.val || null;
        else if (f.type === 'multicheck') v = $$(`#${fid(f.key)} input:checked`, form).map((i) => i.value);
        else v = $(`#${fid(f.key)}`, form).value.trim();
        wrap.classList.remove('invalid');
        if (f.type === 'number' && v !== '') {
          const n = U.parseNum(v);
          if (isNaN(n)) { wrap.classList.add('invalid'); $('.err', wrap).textContent = 'Bitte eine Zahl eingeben (Dezimalkomma).'; ok = false; continue; }
          v = n;
        }
        if (f.type === 'number' && v === '') v = null;
        if (f.required && (v === '' || v === null || v === undefined || (Array.isArray(v) && !v.length))) {
          wrap.classList.add('invalid'); const e = $('.err', wrap); if (e) e.textContent = 'Pflichtfeld.'; ok = false; continue;
        }
        out[f.key] = v;

      return ok ? out : null;
    };
    const updateShowIf = () => {
      for (const f of fields) if (f.showIf) {
        const cur = {}; for (const g of fields) { const el = $(`#${fid(g.key)}`, form); if (el) cur[g.key] = g.type === 'check' ? el.checked : el.value; }
        $(`[data-field="${f.key}"]`, form).classList.toggle('hidden', !f.showIf(cur));
      }
    };
    updateShowIf();
    $('[data-cancel]', m.el).onclick = () => m.close();
    $('[data-save]', m.el).onclick = async () => {
      const v = collect(); if (!v) return;
      // dirty erst NACH erfolgreichem Speichern zurücksetzen – wirft onSave, bleibt der
      // Ungespeichert-Schutz scharf und das Formular offen (kein stiller Datenverlust).
      try { await onSave(v); FormGuard.dirty = false; m.close(true); }

    if (onDelete) $('[data-del]', m.el).onclick = async () => { if (await onDelete()) m.close(true); };
    setTimeout(() => { const first = $('input,select,textarea', form); if (first && window.innerWidth > 900) first.focus(); }, 60);
    return m;
  },

  },

  /* ---------- Diagramme: leichte SVG-Charts (Linie/Balken) ---------- */
  chart({ type = 'bars', labels = [], series = [], height = 190, unit = '' }) {
    const W = 640, H = height, padL = 46, padB = 26, padT = 12, padR = 8;
    const iw = W - padL - padR, ih = H - padT - padB;
    const all = series.flatMap((s) => s.values).filter((v) => v !== null && !isNaN(v));
    if (!labels.length || !all.length) return `<div class="empty small">Noch keine Daten für ein Diagramm.</div>`;
    let max = Math.max(...all, 0), min = Math.min(...all, 0);
    if (max === min) max = min + 1;
    const span = max - min, step = niceStep(span / 4);
    min = Math.floor(min / step) * step; max = Math.ceil(max / step) * step;
    const y = (v) => padT + ih - ((v - min) / (max - min)) * ih;
    const defaultColors = ['#E8A013', '#6B6B75', '#4C8A2E', '#2D6FB3', '#B3362B', '#7A5CC7'];
    let g = '';
    for (let v = min; v <= max + 1e-9; v += step) {
      g += `<line class="gridline" x1="${padL}" y1="${y(v)}" x2="${W - padR}" y2="${y(v)}"/><text class="axis" x="${padL - 6}" y="${y(v) + 3}" text-anchor="end">${U.fmtNum(v, 1)}</text>`;
    }
    const n = labels.length, slot = iw / n;
    const skip = Math.ceil(n / 12);
    labels.forEach((l, i) => { if (i % skip === 0) g += `<text class="axis" x="${padL + slot * (i + 0.5)}" y="${H - 8}" text-anchor="middle">${U.esc(String(l).slice(0, 10))}</text>`; });
    series.forEach((s, si) => {
      const col = s.color || defaultColors[si % defaultColors.length];
      if (type === 'line') {
        const pts = s.values.map((v, i) => (v === null || isNaN(v) ? null : `${padL + slot * (i + 0.5)},${y(v)}`)).filter(Boolean);
        if (pts.length > 1) g += `<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
        s.values.forEach((v, i) => { if (v !== null && !isNaN(v)) g += `<circle cx="${padL + slot * (i + 0.5)}" cy="${y(v)}" r="3.2" fill="${col}"><title>${U.esc(labels[i])}: ${U.fmtNum(v)} ${unit}</title></circle>`; });
      } else {
        const bw = Math.min(26, (slot * 0.72) / series.length);
        s.values.forEach((v, i) => {
          if (v === null || isNaN(v)) return;
          const x = padL + slot * (i + 0.5) - (bw * series.length) / 2 + si * bw;
          const y0 = y(Math.max(0, min)), y1 = y(v);
          g += `<rect x="${x}" y="${Math.min(y0, y1)}" width="${bw - 2}" height="${Math.max(2, Math.abs(y0 - y1))}" rx="3" fill="${col}"><title>${U.esc(labels[i])} · ${U.esc(s.name || '')}: ${U.fmtNum(v)} ${unit}</title></rect>`;
        });
      }
    });
    const legend = series.length > 1 ? `<div class="legend">${series.map((s, si) => `<span><i style="background:${s.color || defaultColors[si % defaultColors.length]}"></i>${U.esc(s.name || '')}</span>`).join('')}</div>` : '';
    return `<div class="chart-box"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>${legend}</div>`;
  },

  /** Tortendiagramm (Donut) mit Legende: posten = [{label, wert}], einheit z. B. 'h' */
  pie({ posten, einheit = '', fmt = (n) => U.fmtNum(n, 1) }) {
    const daten = posten.filter((p) => p.wert > 0);
    const gesamt = U.sum(daten, (p) => p.wert);
    if (!gesamt) return `<div class="empty small">Noch keine Daten für ein Diagramm.</div>`;
    const FARBEN = ['#E8A013', '#4C8A2E', '#2D6FB3', '#B3362B', '#7A5CC7', '#C77F00', '#3AA6A6', '#8A6D3B', '#D2649A', '#6B6B75', '#94A537'];
    const R = 70, C = 2 * Math.PI * R;
    let offset = 0, kreise = '';
    daten.forEach((p, i) => {
      const anteil = p.wert / gesamt;
      kreise += `<circle r="${R}" cx="100" cy="100" fill="none" stroke="${FARBEN[i % FARBEN.length]}" stroke-width="44"
        stroke-dasharray="${(anteil * C).toFixed(2)} ${C.toFixed(2)}" stroke-dashoffset="${(-offset * C).toFixed(2)}"
        transform="rotate(-90 100 100)"><title>${U.esc(p.label)}: ${fmt(p.wert)} ${einheit} (${Math.round(anteil * 100)} %)</title></circle>`;
      offset += anteil;
    });
    const legende = daten.map((p, i) => `<span><i style="background:${FARBEN[i % FARBEN.length]}"></i>${U.esc(p.label)}: <b>${fmt(p.wert)} ${einheit}</b> (${Math.round((p.wert / gesamt) * 100)} %)</span>`).join('');
    return `<div class="flex-wrap" style="align-items:flex-start;gap:20px">
      <div class="chart-box" style="max-width:230px;flex:0 0 auto"><svg viewBox="0 0 200 200">${kreise}
        <text x="100" y="94" text-anchor="middle" style="font-size:26px;font-weight:800;fill:currentColor">${fmt(gesamt)}</text>
        <text x="100" y="116" text-anchor="middle" class="axis" style="font-size:12px">${U.esc(einheit)} gesamt</text></svg></div>
      <div class="legend" style="flex-direction:column;align-items:flex-start;display:flex;gap:8px;flex:1;min-width:180px">${legende}</div>
    </div>`;
  },
};
function niceStep(raw) { const p = Math.pow(10, Math.floor(Math.log10(Math.max(raw, 1e-9)))); const r = raw / p; return (r <= 1 ? 1 : r <= 2 ? 2 : r <= 5 ? 5 : 10) * p; }

/* Detail-Routen → zugehöriger Nav-Eintrag */
const ROUTE_PARENT = { stand: 'staende', volk: 'voelker', rechnung: 'rechnungen', serie: 'zucht' };

function currentRoute() {
  const h = location.hash.replace(/^#\/?/, '');
  const [route, param] = h.split('/');
  return { route: route || 'dashboard', param: param ? decodeURIComponent(param) : null };
}
function navTo(route) { location.hash = '#/' + route; }

async function renderRoute() {
  const { route, param } = currentRoute();
  const view = Views[route] || Views.dashboard;
  // #main bei jedem Render frisch ersetzen: Views hängen Listener direkt an main –
  // ein Klon ohne Listener verhindert, dass Handler alter Views weiterfeuern.
  const alt = $('#main');
  const main = alt.cloneNode(false);
  alt.replaceWith(main);
  const navRoute = ROUTE_PARENT[route] || route;
  $$('.nav-item', $('#sidebar')).forEach((b) => b.classList.toggle('active', b.dataset.route === navRoute));
  $$('button', $('#bottomnav')).forEach((b) => b.classList.toggle('active', b.dataset.route === navRoute));
  main.innerHTML = '<div class="skel" style="height:120px"></div>';
  try {
    const title = typeof view.title === 'function' ? view.title() : view.title;
    $('#tb-title').textContent = title || '';
    document.title = (title ? title + ' – ' : '') + 'ImkerBuch';
    await view.render(main, param);
  } catch (e) {
    console.error('Render-Fehler', route, e);
    main.innerHTML = `<div class="card"><div class="card-title">${icon('warn')}<h2>Da ist etwas schiefgelaufen</h2></div><p class="muted small">${U.esc(e.message)}</p><button class="btn btn-ghost mt12" onclick="renderRoute()">Neu laden</button></div>`;
  }
  window.scrollTo({ top: 0 });
}

    { route: 'dashboard', label: 'Start', ic: 'home' },
    { route: 'voelker', label: 'Völker', ic: 'volk' },

function openMoreSheet() {
  const items = NAV.filter((n) => n.route);
  const m = UI.modal({
    title: 'Alle Bereiche',
    body: `<div class="sheet-grid">${items.map((n) => `<button data-route="${n.route}"><span class="sg-ic">${icon(n.ic)}</span>${n.label.split(' & ')[0].split(' ')[0]}</button>`).join('')}</div>`,
  });
  $('.sheet-grid', m.el).addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    m.close(true); navTo(b.dataset.route);
  });
}

function applyTheme() {
  const mode = S.get('darkMode');
  const dark = mode === 'dunkel' || (mode === 'auto' && matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
  const meta = $('meta[name="theme-color"]');
  if (meta) meta.content = dark ? '#161619' : '#FAF6EF';
}
matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (S.get('darkMode') === 'auto') applyTheme(); });

/* =====================================================================
   ANHÄNGE: Fotos (Kamera, Resize ≤1600px, JPEG), Dokumente, Galerie,
   Vollbild-Viewer, Dokumententypen, OCR-Anbindung
   ===================================================================== */
const Anhang = {
  async list(parentTyp, parentId, arten) {
    const all = await DB.getAll('anhaenge');
    return U.sortBy(all.filter((a) => a.parentTyp === parentTyp && a.parentId === parentId && (!arten || arten.includes(a.art))), (a) => a.datum, true);
  },
  /** Anhang-Bereich (Fotos + Dokumente) als selbstverwaltendes Element */
  section({ parentTyp, parentId, arten = ['foto', 'dokument'], onNotiz = null, titel = 'Fotos & Dokumente' }) {
    const el = document.createElement('div');
    let filter = '';
    const render = async () => {
      const items = (await Anhang.list(parentTyp, parentId, arten)).filter((a) => !filter || a.dokumentTyp === filter);
      const typen = S.get('dokumentTypen');
      el.innerHTML = `
        <div class="flex-wrap mb8">
          <h3 style="flex:1">${U.esc(titel)}</h3>
          ${arten.includes('dokument') ? `<select class="inp" data-filter style="width:auto;min-height:36px;padding:5px 32px 5px 10px;font-size:13px">
            <option value="">Alle Typen</option>${typen.map((t) => `<option ${filter === t ? 'selected' : ''}>${U.esc(t)}</option>`).join('')}</select>` : ''}
        </div>
        <div class="gallery mb8" data-gal>
          ${items.map((a) => `<button class="g-item" data-id="${a.id}" title="${U.esc(a.name)}">
            ${a.art === 'foto' ? `<img alt="" data-thumb="${a.id}">` : `${icon('doc')}<span class="g-name">${U.esc(a.name)}</span>`}
            ${a.dokumentTyp ? `<span class="g-badge">${U.esc(a.dokumentTyp)}</span>` : ''}
          </button>`).join('')}
          <label class="g-item" style="border-style:dashed" title="Foto aufnehmen">${icon('camera')}<span class="g-name">Foto</span>
            <input type="file" accept="image/*" capture="environment" class="hidden" data-add-foto></label>
          ${arten.includes('dokument') ? `<label class="g-item" style="border-style:dashed" title="Dokument anhängen">${icon('doc')}<span class="g-name">Dokument</span>
            <input type="file" accept=".pdf,.doc,.docx,.txt,image/*,application/pdf" class="hidden" data-add-doc></label>` : ''}
        </div>
        <div class="hint small muted">Anhänge werden lokal gespeichert. Fotos werden automatisch verkleinert; Dokumente möglichst unter 5 MB halten, sonst werden Backups groß.</div>`;
      // Thumbnails über Blob-URLs; nach dem Laden freigeben, sonst leckt jeder Re-Render Speicher
      for (const a of items) if (a.art === 'foto') { const img = $(`[data-thumb="${a.id}"]`, el); if (img) { const u = URL.createObjectURL(a.blob); img.onload = () => URL.revokeObjectURL(u); img.src = u; } }
      const ff = $('[data-filter]', el); if (ff) ff.onchange = () => { filter = ff.value; render(); };
      $('[data-add-foto]', el).onchange = async (e) => {
        const f = e.target.files[0]; if (!f) return;
        try {
          const blob = await U.resizeImage(f, 1600, 0.8);
          await DB.put('anhaenge', { parentTyp, parentId, art: 'foto', name: f.name || 'foto.jpg', mime: 'image/jpeg', blob, groesse: blob.size, datum: U.nowIso(), dokumentTyp: '' });
          UI.toast('Foto gespeichert'); render();
        } catch (err) { UI.toast(err.message, 'err'); }
      };
      const ad = $('[data-add-doc]', el);
      if (ad) ad.onchange = async (e) => {
        const f = e.target.files[0]; if (!f) return;
        if (f.size > 10 * 1048576 && !(await UI.confirm({ title: 'Große Datei', text: `Die Datei ist ${U.fmtBytes(f.size)} groß. Große Anhänge blähen Backups stark auf. Trotzdem speichern?`, confirmText: 'Speichern', danger: false }))) return;
        await DB.put('anhaenge', { parentTyp, parentId, art: 'dokument', name: f.name, mime: f.type || 'application/octet-stream', blob: f, groesse: f.size, datum: U.nowIso(), dokumentTyp: '' });
        UI.toast('Dokument gespeichert'); render();
      };
      $('[data-gal]', el).addEventListener('click', (e) => {
        const b = e.target.closest('.g-item[data-id]'); if (!b) return;
        const a = items.find((x) => x.id === b.dataset.id);
        if (a) Anhang.viewer(a, { onNotiz, onChange: render });
      });
    };
    render();
    return el;
  },
  /** Vollbild-Viewer mit Typ-Zuordnung, OCR, Download, Löschen */
  viewer(a, { onNotiz, onChange } = {}) {
    const url = URL.createObjectURL(a.blob);
    const typen = S.get('dokumentTypen');
    const ocrOn = S.get('features').ocr && a.art === 'foto';
    const m = UI.modal({
      title: a.art === 'foto' ? 'Foto' : a.name, wide: true, onClose: () => URL.revokeObjectURL(url),
      body: `
        ${a.art === 'foto' ? `<img class="viewer-img" src="${url}" alt="Anhang">` : `<div class="empty">${icon('doc')}<div class="e-text">${U.esc(a.name)} · ${U.fmtBytes(a.groesse)}</div></div>`}
        <div class="flex-wrap mt12">
          <label class="small muted">Dokumententyp:</label>
          <select class="inp" data-typ style="width:auto;min-height:38px;padding:6px 34px 6px 10px">
            <option value="">– keiner –</option>${typen.map((t) => `<option ${a.dokumentTyp === t ? 'selected' : ''}>${U.esc(t)}</option>`).join('')}
          </select>
          <span class="small muted">${U.fmtDateTime(a.datum)} · ${U.fmtBytes(a.groesse)}</span>
        </div>
        <div data-ocr-zone class="mt12"></div>`,
      footer: `
        <button class="btn btn-danger no-flex" data-del>${icon('trash')}</button>
        ${ocrOn ? `<button class="btn btn-ghost" data-ocr>${icon('doc')} Text aus Foto übernehmen</button>` : ''}
        <a class="btn btn-ghost" href="${url}" download="${U.esc(a.name)}" ${a.art !== 'foto' ? `target="_blank"` : ''}>${icon('download')} Öffnen/Laden</a>`,
    });
    $('[data-typ]', m.el).onchange = async (e) => { a.dokumentTyp = e.target.value; await DB.put('anhaenge', a); UI.toast('Typ gespeichert'); if (onChange) onChange(); };
    $('[data-del]', m.el).onclick = async () => {
      if (!(await UI.confirm({ title: 'Anhang löschen?', text: 'Der Anhang wandert in den Papierkorb (30 Tage wiederherstellbar).' }))) return;
      await DB.softDel('anhaenge', a.id); m.close(true); UI.toast('In den Papierkorb verschoben'); if (onChange) onChange();
    };
    const ob = $('[data-ocr]', m.el);
    if (ob) ob.onclick = async () => {
      const zone = $('[data-ocr-zone]', m.el);
      zone.innerHTML = `<div class="small muted mb8">Texterkennung läuft … <b>Hinweis:</b> Handschrift wird nicht zuverlässig erkannt.</div><div class="progress"><div style="width:3%"></div></div>`;
      ob.disabled = true;
      try {
        const text = await Ocr.run(a.blob, (p) => { $('.progress>div', zone).style.width = Math.round(p * 100) + '%'; });
        zone.innerHTML = `<div class="field"><label>Erkannter Text (bearbeitbar)</label><textarea class="inp" data-ocr-text rows="6">${U.esc(text.trim())}</textarea></div>
          ${onNotiz ? `<button class="btn btn-primary btn-sm" data-uebernehmen>${icon('check')} In Notizfeld übernehmen</button>` : ''}`;
        const ub = $('[data-uebernehmen]', zone);
        if (ub) ub.onclick = async () => { await onNotiz($('[data-ocr-text]', zone).value.trim()); UI.toast('In Notiz übernommen'); m.close(true); };
      } catch (e) { zone.innerHTML = `<div class="banner danger">${icon('warn')} OCR fehlgeschlagen: ${U.esc(e.message)}</div>`; }
      ob.disabled = false;
    };
  },
};

/* =====================================================================
   OCR: Tesseract.js (deu), lazy geladen
   ===================================================================== */
const Ocr = {
  async run(blob, onProgress = () => {}) {
    if (!navigator.onLine && !U._scripts['tesseract']) { /* SW-Cache kann trotzdem greifen */ }
    await U.loadScript(
      'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js',
      'https://unpkg.com/tesseract.js@5.1.1/dist/tesseract.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.1/tesseract.min.js'
    );
    const { data } = await Tesseract.recognize(blob, 'deu', {
      logger: (m) => { if (m.status === 'recognizing text') onProgress(m.progress || 0); },
    });
    return data.text || '';
  },
};

/* =====================================================================
   SPRACHNOTIZEN: MediaRecorder + Web Speech (live) + Whisper (offline)
   ===================================================================== */
const Voice = {
  _asr: null,
  webSpeechAvailable: () => !!(window.SpeechRecognition || window.webkitSpeechRecognition),
  /** Live-Diktat (de-DE) während der Aufnahme – nur Chrome/Edge, braucht Internet */
  startLive() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return null;
    const rec = new SR();
    rec.lang = 'de-DE'; rec.continuous = true; rec.interimResults = true;
    let finalText = '', interim = '';
    rec.onresult = (e) => {
      interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
        else interim += e.results[i][0].transcript;
      }
      if (this._liveCb) this._liveCb((finalText + interim).trim());
    };
    rec.onerror = () => {};
    try { rec.start(); } catch (e) { return null; }
    return { stop: () => { try { rec.stop(); } catch (e) {} }, getText: () => finalText.trim(), onUpdate: (cb) => { this._liveCb = cb; } };
  },
  /** Offline-Transkription mit Whisper (whisper-small, deutsch) über transformers.js */
  async whisper(blob, onProgress = () => {}) {
    if (!Voice._asr) {
      onProgress({ label: 'Whisper-Modell wird geladen (einmalig, danach im Cache) …', pct: 2 });
      let tf;
      try { tf = await import('https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2'); }
      catch (e) { tf = await import('https://unpkg.com/@xenova/transformers@2.17.2/dist/transformers.min.js'); }
      const { pipeline, env } = tf;
      env.allowLocalModels = false;
      Voice._asr = await pipeline('automatic-speech-recognition', 'Xenova/whisper-small', {
        quantized: true,
        progress_callback: (p) => { if (p.status === 'progress' && p.total) onProgress({ label: `Modell laden: ${p.file}`, pct: Math.round((p.loaded / p.total) * 100) }); },
      });
    }
    onProgress({ label: 'Audio wird vorbereitet …', pct: 100 });
    const audio = await Voice._decodeTo16k(blob);
    onProgress({ label: 'Transkription läuft …', pct: 100 });
    const out = await Voice._asr(audio, { language: 'german', task: 'transcribe', chunk_length_s: 30, stride_length_s: 5 });
    return (out.text || '').trim();
  },
  /** Audio-Blob → mono Float32Array mit 16 kHz (Whisper-Eingang) */
  async _decodeTo16k(blob) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = await ctx.decodeAudioData(await blob.arrayBuffer());
    ctx.close();
    const off = new OfflineAudioContext(1, Math.ceil(buf.duration * 16000), 16000);
    const src = off.createBufferSource(); src.buffer = buf; src.connect(off.destination); src.start();
    const out = await off.startRendering();
    return out.getChannelData(0);
  },
};

const Sprachnotiz = {
  /** Sprachnotiz-Bereich: Aufnahme, Liste, Transkription, Übernahme in Notiz */
  section({ parentTyp, parentId, onText = null }) {
    const el = document.createElement('div');
    let recorder = null, chunks = [], live = null, liveText = '';
    let blobUrls = []; // beim Re-Render alte Audio-URLs freigeben (sonst Speicherleck)
    const render = async () => {
      blobUrls.forEach((u) => URL.revokeObjectURL(u)); blobUrls = [];
      const items = await Anhang.list(parentTyp, parentId, ['audio']);
      const whisperOn = S.get('features').whisper;
      el.innerHTML = `
        <div class="flex-wrap mb8">
          <h3 style="flex:1">Sprachnotizen</h3>
          <button class="btn btn-sm ${recorder ? 'btn-danger' : 'btn-ghost'}" data-rec>${recorder ? `<span class="rec-pulse"></span> Aufnahme stoppen` : `${icon('mic')} Aufnehmen`}</button>
        </div>
        ${recorder ? `<div class="banner info" data-live>${icon('mic')} <span>Aufnahme läuft … ${Voice.webSpeechAvailable() ? 'Live-Diktat aktiv.' : ''}</span></div>` : ''}
        ${!Voice.webSpeechAvailable() && !whisperOn ? `<div class="hint small muted mb8">Live-Diktat (Web Speech) funktioniert nur in Chrome/Edge mit Internet. Alternativ in den Einstellungen die Offline-Transkription (Whisper) aktivieren.</div>` : ''}
        <div class="rows" data-list>
          ${items.map((a) => `<div class="audio-row" data-id="${a.id}">
            <audio controls preload="metadata"></audio>
            ${whisperOn ? `<button class="icon-btn" data-trans title="Transkribieren (Whisper offline)">${icon('doc')}</button>` : ''}
            <button class="icon-btn" data-del title="Löschen">${icon('trash')}</button>
          </div>
          ${a.transkript ? `<div class="small muted" style="padding:0 4px 10px">„${U.esc(a.transkript)}“ ${onText ? `<button class="btn btn-xs btn-ghost" data-take="${a.id}">In Notiz übernehmen</button>` : ''}</div>` : ''}`).join('') || '<div class="hint small muted">Noch keine Sprachnotizen.</div>'}
        </div>
        <div data-progress></div>`;
      for (const a of items) { const row = $(`[data-id="${a.id}"] audio`, el); if (row) { const u = URL.createObjectURL(a.blob); blobUrls.push(u); row.src = u; } }
      $('[data-rec]', el).onclick = () => (recorder ? stopRec() : startRec());
      $('[data-list]', el).addEventListener('click', async (e) => {
        const take = e.target.closest('[data-take]');
        if (take && onText) { const a = items.find((x) => x.id === take.dataset.take); await onText(a.transkript); UI.toast('In Notiz übernommen'); return; }
        const row = e.target.closest('.audio-row'); if (!row) return;
        const a = items.find((x) => x.id === row.dataset.id);
        if (e.target.closest('[data-del]')) {
          if (await UI.confirm({ title: 'Sprachnotiz löschen?', text: 'Wandert in den Papierkorb (30 Tage).' })) { await DB.softDel('anhaenge', a.id); render(); }
        } else if (e.target.closest('[data-trans]')) {
          const prog = $('[data-progress]', el);
          prog.innerHTML = `<div class="small muted mb8" data-label>Starte …</div><div class="progress"><div style="width:2%"></div></div>`;
          try {
            const text = await Voice.whisper(a.blob, (p) => { $('[data-label]', prog).textContent = p.label; $('.progress>div', prog).style.width = p.pct + '%'; });
            prog.innerHTML = '';
            a.transkript = a.transkript ? a.transkript + ' ' + text : text;
            await DB.put('anhaenge', a); render();
          } catch (err) { prog.innerHTML = `<div class="banner danger">${icon('warn')} Transkription fehlgeschlagen: ${U.esc(err.message)}</div>`; }
        }
      });
    };
    const startRec = async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        chunks = []; liveText = '';
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = async () => {
          stream.getTracks().forEach((t) => t.stop());
          const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
          const lt = live ? live.getText() || liveText : liveText;
          if (live) live.stop();
          recorder = null; live = null;
          await DB.put('anhaenge', { parentTyp, parentId, art: 'audio', name: `sprachnotiz-${U.todayIso()}.webm`, mime: blob.type, blob, groesse: blob.size, datum: U.nowIso(), transkript: lt || '' });
          UI.toast('Sprachnotiz gespeichert'); render();
        };
        recorder.start();
        live = Voice.startLive();
        if (live) live.onUpdate((t) => { liveText = t; const lv = $('[data-live] span', el); if (lv) lv.textContent = t || 'Aufnahme läuft …'; });
        render();
      } catch (e) { UI.toast('Mikrofon nicht verfügbar: ' + e.message, 'err'); }
    };
    const stopRec = () => { if (recorder && recorder.state !== 'inactive') recorder.stop(); };
    render();
    return el;
  },
};

Views.dashboard = {
  title: 'Dashboard',
  async render(main) {
    // Einmalige Migration: neue Widgets bei bestehenden Nutzern EINMAL einblenden
    // (Flag je Widget respektiert bewusstes Entfernen – wird nie erneut hinzugefügt)
    for (const [id, flag, pos] of [['fahrt', 'fahrtWidgetSeen', 2], ['zeiten', 'zeitenWidgetSeen', 3], ['lerntipp', 'lerntippWidgetSeen', 2]]) {
      if (S.get(flag)) continue;
      const dw = [...S.get('dashboardWidgets')];
      if (!dw.includes(id)) { dw.splice(Math.min(pos, dw.length), 0, id); await S.set('dashboardWidgets', dw); }
      await S.set(flag, true);
    }
    const vorname = S.get('profil').vorname || '';
    const h = new Date().getHours();
    const gruss = h < 5 ? 'Gute Nacht' : h < 11 ? 'Guten Morgen' : h < 18 ? 'Guten Tag' : 'Guten Abend';
    const enabled = S.get('dashboardWidgets');
    const blocks = [];
    for (const id of enabled) if (DASH_WIDGETS[id]) {
      try { const html = await DASH_WIDGETS[id].html(); if (html) blocks.push({ html, ziel: DASH_WIDGETS[id].ziel }); }
      catch (e) { console.error('Widget', id, e); }
    }
    main.innerHTML = pageHead(`${gruss}${vorname ? ', ' + vorname : ''}! 🐝`, new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }),
      `<button class="btn btn-ghost btn-sm no-print" id="dash-cfg">${icon('gear')} Widgets</button>`) +
      `<div class="grid2">${blocks.map((b) => `<div class="dash-klick" data-ziel="${b.ziel || ''}" role="link">${b.html}</div>`).join('')}</div>`;
    $('#dash-cfg').onclick = Views.dashboard.configure;
    // Kachel-Klick führt in den passenden Bereich – Buttons/Links in der Kachel behalten Vorrang
    main.addEventListener('click', (e) => {
      if (e.target.closest('button, a, input, select')) return;
      const k = e.target.closest('[data-ziel]');
      if (k && k.dataset.ziel) navTo(k.dataset.ziel);
    });
  },
  configure() {
    const enabled = S.get('dashboardWidgets');
    const order = [...enabled, ...Object.keys(DASH_WIDGETS).filter((k) => !enabled.includes(k))];
    const m = UI.modal({
      title: 'Dashboard anpassen',
      body: `<div class="rows" id="wcfg">${order.map((id) => `<div class="row" data-id="${id}" style="min-height:48px">
        <label class="check-line" style="flex:1;padding:0"><input type="checkbox" ${enabled.includes(id) ? 'checked' : ''}> <span>${DASH_WIDGETS[id].label}</span></label>
        <button class="icon-btn" data-up title="nach oben">▲</button><button class="icon-btn" data-down title="nach unten">▼</button></div>`).join('')}</div>`,
      footer: `<button class="btn btn-ghost" data-cancel>Abbrechen</button><button class="btn btn-primary" data-ok>Übernehmen</button>`,
    });
    $('#wcfg', m.el).addEventListener('click', (e) => {
      const row = e.target.closest('.row'); if (!row) return;
      if (e.target.closest('[data-up]') && row.previousElementSibling) row.parentNode.insertBefore(row, row.previousElementSibling);
      if (e.target.closest('[data-down]') && row.nextElementSibling) row.parentNode.insertBefore(row.nextElementSibling, row);
    });
    $('[data-cancel]', m.el).onclick = () => m.close();
    $('[data-ok]', m.el).onclick = async () => {
      const sel = $$('#wcfg .row', m.el).filter((r) => $('input', r).checked).map((r) => r.dataset.id);
      await S.set('dashboardWidgets', sel); m.close(true); renderRoute();
    };
  },
};

        <h2>Dein erstes Volk</h2>
        <div class="field mt16"><label>Bezeichnung</label><input class="inp" id="wz-volk" value="${U.esc(state.volkName)}" placeholder="z. B. Volk 1"></div>
        <div class="field"><label>Beutentyp</label><input class="inp" id="wz-beute" value="${U.esc(state.beutentyp)}" placeholder="z. B. Zander, DNM, Dadant"></div>`,
      () => `
        <div class="steps"><i class="done"></i><i class="done"></i><i class="done"></i><i class="done"></i></div>
        <h2>Fast fertig!</h2>
        <p class="muted small mt8">Möchtest du Beispieldaten laden, um dich umzusehen? Du kannst sie jederzeit wieder löschen (Einstellungen → Papierkorb bzw. Daten).</p>`,
    ];
    const renderStep = () => {
      bodyEl.innerHTML = steps[state.step]() + `
        <div class="flex mt24">
          ${state.step > 0 ? `<button class="btn btn-ghost" id="wz-back">Zurück</button>` : ''}
          <span class="spacer"></span>
          ${state.step === 3
            ? `<button class="btn btn-ghost" id="wz-nodemo">Ohne Demo starten</button><button class="btn btn-primary" id="wz-demo">Demo-Daten laden</button>`
            : `<button class="btn btn-primary" id="wz-next">Weiter</button>`}
        </div>`;
      const save = () => {
        const g = (id) => { const e = $('#' + id, bodyEl); return e ? e.value.trim() : undefined; };
        if (g('wz-vorname') !== undefined) state.vorname = g('wz-vorname');
        if (g('wz-imkerei') !== undefined) state.imkerei = g('wz-imkerei');
        if (g('wz-stand') !== undefined) state.standName = g('wz-stand');
        if (g('wz-volk') !== undefined) state.volkName = g('wz-volk');
        if (g('wz-beute') !== undefined) state.beutentyp = g('wz-beute');
      };
      const nb = $('#wz-next', bodyEl);
      if (nb) nb.onclick = () => {
        save();
        if (state.step === 0 && !state.vorname) { const f = $('#wz-vorname', bodyEl).closest('.field'); f.classList.add('invalid'); $('.err', f).textContent = 'Bitte gib deinen Vornamen an.'; return; }
        state.step++; renderStep();
      };
      const bb = $('#wz-back', bodyEl); if (bb) bb.onclick = () => { save(); state.step--; renderStep(); };
      const finish = async (withDemo) => {
        save();
        await S.set('profil', { vorname: state.vorname });
        const imk = S.get('imkerei'); imk.name = state.imkerei || imk.name; await S.set('imkerei', imk);
        let standId = null;
        if (state.standName) { const st = await DB.put('staende', { name: state.standName, lat: null, lng: null, notizen: '' }); standId = st.id; }
        if (state.volkName) await DB.put('voelker', { name: state.volkName, standId, koeniginId: null, funktion: 'Wirtschaftsvolk', beutentyp: state.beutentyp, beutenkennung: '', status: 'aktiv', historie: [{ datum: U.todayIso(), text: 'Volk angelegt' }], notizen: '' });
        if (withDemo) await Demo.create();
        await S.set('wizardDone', true);
        back.remove();
        UI.toast(`Los geht's, ${state.vorname}!`);
        renderRoute(); Backup.updateBanners();
      };
      const nd = $('#wz-nodemo', bodyEl); if (nd) nd.onclick = () => finish(false);
      const wd = $('#wz-demo', bodyEl); if (wd) wd.onclick = () => finish(true);
    };
    renderStep();
  },
};
